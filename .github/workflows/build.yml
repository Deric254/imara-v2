name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # Step 1: Install root-level node_modules (express, sqlite3, etc.)
    # electron-builder's "app": ".." points here, so node_modules must exist here.
    - name: Install root dependencies
      run: npm install
      working-directory: .

    # Step 2: Install backend devDependencies (electron, electron-builder, nodemon)
    - name: Install backend dev dependencies
      run: npm install
      working-directory: backend

    # Step 3: Build the Windows installer from the backend folder
    - name: Build Windows installer
      run: npm run build
      working-directory: backend
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release
      uses: softprops/action-gh-release@v2
      with:
        files: backend/dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
