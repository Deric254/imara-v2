name: Build and Release

on:
  push:
    tags:
      - 'v*'   # triggers on: git tag v2.0.1 && git push --tags

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # Step 1: Install root dependencies (express, sqlite3, etc.)
    # electron-builder "app": ".." points here so node_modules must be here.
    - name: Install root dependencies
      run: npm install
      working-directory: .

    # Step 2: Install backend devDependencies (electron, electron-builder)
    - name: Install backend dependencies
      run: npm install
      working-directory: backend

    # Step 3: Build the Windows installer + portable exe
    # GH_TOKEN lets electron-builder upload assets to the GitHub Release automatically.
    - name: Build Windows installer
      run: npm run build
      working-directory: backend
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Step 4: Attach .exe files to the GitHub Release created by the tag push
    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        files: |
          backend/dist/*.exe
          backend/dist/*.yml
          backend/dist/*.blockmap
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
