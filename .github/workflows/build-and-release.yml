name: Build & Auto-Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - '!*.md'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: |
          cd backend
          npm install
          cd ..

      - name: Get current version
        id: version
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $parts = $version.Split('.')
          [int]$patch = $parts[2]
          $newPatch = $patch + 1
          $newVersion = "$($parts[0]).$($parts[1]).$newPatch"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          $json = Get-Content package.json -Raw | ConvertFrom-Json
          $json.version = "${{ steps.version.outputs.NEW_VERSION }}"
          $json | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Build Windows installer
        run: npm run build:win

      - name: Commit & push version bump
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.NEW_VERSION }}" || true
          git push origin main || git push origin master

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.NEW_VERSION }}
          name: Version ${{ steps.version.outputs.NEW_VERSION }}
          body: |
            ## Auto-Release
            - Bug fixes and improvements
            - Deployed: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            
            **Installation:** Download the `.exe` below and run it. App updates automatically.
          files: dist/IMARA-LINKS-Setup-*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
