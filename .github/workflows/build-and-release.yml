name: Build & Auto-Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'electron-main.js'
      - 'preload.js'
      - 'package.json'
      - '!*.md'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: |
          cd backend
          npm install
          cd ..

      - name: Bump patch version
        id: version
        run: |
          $json = Get-Content package.json -Raw | ConvertFrom-Json
          $parts = $json.version.Split('.')
          [int]$patch = $parts[2]
          $newVersion = "$($parts[0]).$($parts[1]).$($patch + 1)"
          $json.version = $newVersion
          $json | ConvertTo-Json -Depth 10 | Set-Content package.json
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit & push version bump
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.NEW_VERSION }}" || echo "Nothing to commit"
          git push origin HEAD

      - name: Build & publish to GitHub Releases
        run: npm run publish:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
