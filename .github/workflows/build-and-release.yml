name: Build & Auto-Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'electron-main.js'
      - 'preload.js'
      - 'package.json'
      - 'electron-builder.yml'
      - '!*.md'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install root dependencies
        run: npm install

      - name: Install backend dependencies
        run: |
          cd backend
          npm install
          cd ..

      - name: Bump patch version
        id: version
        run: |
          $json = Get-Content package.json -Raw | ConvertFrom-Json
          $parts = $json.version.Split('.')
          [int]$patch = $parts[2]
          $newVersion = "$($parts[0]).$($parts[1]).$($patch + 1)"
          $json.version = $newVersion
          $json | ConvertTo-Json -Depth 10 | Set-Content package.json
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Commit & push version bump
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.NEW_VERSION }}" || echo "Nothing to commit"
          git push origin HEAD

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Create GitHub Release with installer
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.NEW_VERSION }}
          name: Version ${{ steps.version.outputs.NEW_VERSION }}
          body: |
            ## IMARA LINKS v${{ steps.version.outputs.NEW_VERSION }}
            - Bug fixes and improvements
            - Released: ${{ github.event.head_commit.timestamp }}

            **Installation:** Download the `.exe` below and run it.
          files: |
            dist/IMARA-LINKS-Setup-*.exe
            dist/IMARA-LINKS-Setup-*.exe.blockmap
            dist/latest.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
