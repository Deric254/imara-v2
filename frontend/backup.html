<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Backup IMARA LINKS</title>
<link rel="stylesheet" href="shared.css">
<style>
  .backup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
  @media(max-width:768px) { .backup-grid { grid-template-columns: 1fr; } }
  .backup-card { padding: 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .backup-icon { font-size: 3rem; margin-bottom: 1rem; color: var(--g500); }
  .backup-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--ink); }
  .backup-desc { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.5; }
  .file-input-wrap { position: relative; width: 100%; margin-bottom: 1rem; }
  .file-input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-label { display: block; padding: 0.75rem; border: 2px dashed var(--border); border-radius: var(--radius); color: var(--muted); font-size: 0.85rem; }
  .file-input-wrap:hover .file-label { border-color: var(--g400); color: var(--ink); }
  /* Backup health status */
  .bk-health { display:flex; align-items:center; gap:.75rem; padding:.9rem 1.1rem; border-radius:var(--radius); font-size:.88rem; margin-bottom:1rem; }
  .bk-health.ok      { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
  .bk-health.warn    { background:#fefce8; border:1px solid #fde047; color:#854d0e; }
  .bk-health.danger  { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
  .bk-health-icon    { font-size:1.4rem; flex-shrink:0; }
  .second-path-row   { display:flex; align-items:center; gap:.5rem; width:100%; margin-bottom:.75rem; }
  .second-path-val   { flex:1; font-size:.78rem; color:var(--muted); background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:.4rem .6rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
</style>
</head>
<body>
<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let _backupHealth = null;
let _secondPath   = '';

async function init() {
  const me = requireAuth(['owner', 'admin']);
  if (!me) return;
  const pg = renderLayout('backup.html');

  pg.innerHTML = `
<!-- ── Backup health banner ───────────────────────────────────────────────── -->
<div id="bk_health_banner"></div>

<div class="backup-grid">
  <!-- EXPORT -->
  <div class="card backup-card">
    <div class="backup-icon">📤</div>
    <div class="backup-title">Export Database</div>
    <div class="backup-desc">
      Download a complete backup of all records, users, and configuration.
      The file is also automatically written to your second backup location (if set).
      <br><strong>Available to Admins and System Owners.</strong>
    </div>
    <button class="btn btn-primary" onclick="exportBackup()" id="exportBtn" style="width:100%">
      Download Backup File
    </button>
    <div id="export_status" style="margin-top:.6rem;font-size:.8rem;color:var(--muted)"></div>
  </div>

  <!-- IMPORT -->
  <div class="card backup-card" id="importCard">
    <div class="backup-icon">📥</div>
    <div class="backup-title">Restore Database</div>
    <div class="backup-desc">
      Replace the current system data with a previously exported backup file.
      <br><strong style="color:var(--red)">Warning: This will overwrite all current data!</strong>
    </div>
    <div class="file-input-wrap">
      <input type="file" class="file-input" id="backupFile" accept=".json" onchange="updateFileName(this)">
      <div class="file-label" id="fileLabel">Click or drag backup file here (.json)</div>
    </div>
    <button class="btn btn-secondary" onclick="importBackup()" id="importBtn" style="width:100%; background:var(--surface); color:var(--ink); border:1px solid var(--border)">
      Restore System Data
    </button>
    <div id="import_err" class="err" style="margin-top:1rem"></div>
  </div>
</div>

<!-- ── Second backup location ────────────────────────────────────────────── -->
<div class="card" style="margin-top:1.5rem" id="secondPathCard">
  <div class="card-title">&#128190; Second Backup Location <span style="font-weight:400;font-size:.8rem;color:var(--muted)">(Owner only)</span></div>
  <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem">
    Set a USB drive or network folder as a second save location. Every export automatically
    writes a verified copy there — so one backup is on this machine, one is elsewhere.
    If the second write fails you are warned immediately.
  </p>
  <div class="second-path-row">
    <div class="second-path-val" id="second_path_display">Not set</div>
    <button class="btn btn-secondary" id="choosePathBtn" onclick="chooseSecondPath()" style="white-space:nowrap">
      &#128193; Choose Folder
    </button>
    <button class="btn" id="clearPathBtn" onclick="clearSecondPath()"
      style="white-space:nowrap;background:#fef2f2;color:#991b1b;border:1px solid #fecaca;display:none">
      &#x2715; Clear
    </button>
  </div>
  <div id="second_path_status" style="font-size:.8rem;color:var(--muted)"></div>
</div>

<div class="card" style="margin-top:1.5rem">
  <div class="card-title">Security &amp; Best Practices</div>
  <ul style="padding-left:1.25rem; color:var(--muted); font-size:0.85rem; line-height:1.6">
    <li>Export a backup at least once every 48 hours — daily is better.</li>
    <li>Set a second backup location pointing to a USB drive or network share so you always have a copy off this machine.</li>
    <li>Store backups in a safe, offline location away from the computer.</li>
    <li>Restoring data is permanent and cannot be undone.</li>
    <li>Only System Owners and Admins can perform database restorations.</li>
    <li>Ensure the system is idle before restoring to prevent data loss.</li>
  </ul>
</div>
`;

  // Restrict import and second-path to owner/admin
  if (me.role !== 'owner' && me.role !== 'admin') {
    const importCard = document.getElementById('importCard');
    importCard.style.opacity = '0.5';
    importCard.style.pointerEvents = 'none';
    importCard.querySelector('.backup-desc').innerHTML =
      '<strong style="color:var(--red)">Access Restricted: Only System Owners and Admins can restore data.</strong>';
  }
  if (me.role !== 'owner') {
    document.getElementById('secondPathCard').style.display = 'none';
  }

  await loadBackupHealth();
}

// ── Load and render backup health ─────────────────────────────────────────────
async function loadBackupHealth() {
  try {
    _backupHealth = await api('GET', '/backup/health');
    _secondPath   = _backupHealth.second_path || '';

    // Update second-path display
    const display  = document.getElementById('second_path_display');
    const clearBtn = document.getElementById('clearPathBtn');
    if (display) {
      display.textContent = _secondPath || 'Not set';
      display.title       = _secondPath || '';
      if (clearBtn) clearBtn.style.display = _secondPath ? '' : 'none';
    }

    // Render health banner
    const banner = document.getElementById('bk_health_banner');
    if (!banner) return;

    const last = _backupHealth.last_backup_at;
    const hrs  = _backupHealth.hours_since;

    if (!last) {
      banner.innerHTML = _healthBanner('danger', '⚠️',
        'No backup has ever been exported from this system.',
        'Export a backup now and store it somewhere safe.');
    } else if (_backupHealth.overdue) {
      const daysAgo = hrs ? Math.floor(hrs / 24) : '?';
      banner.innerHTML = _healthBanner('warn', '⏰',
        `Last backup was ${daysAgo > 1 ? daysAgo + ' days' : Math.round(hrs) + ' hours'} ago — more than 48 hours.`,
        'Export a backup now to protect your data.');
    } else {
      const when = last ? new Date(last).toLocaleString() : '—';
      banner.innerHTML = _healthBanner('ok', '✅',
        `Last backup: ${when}`,
        _backupHealth.second_path_set
          ? 'Second location is set — every export is written there automatically.'
          : 'Tip: set a second backup location (USB / network share) for extra safety.');
    }
  } catch(e) {
    // Non-fatal — don't break the page
    console.warn('Backup health check failed:', e);
  }
}

function _healthBanner(type, icon, main, sub) {
  return `<div class="bk-health ${type}">
    <span class="bk-health-icon">${icon}</span>
    <div><strong>${main}</strong><br><span style="font-size:.82rem">${sub}</span></div>
  </div>`;
}

// ── Choose second backup folder (Electron file dialog) ───────────────────────
async function chooseSecondPath() {
  const btn = document.getElementById('choosePathBtn');
  if (!window.electron?.chooseBackupFolder) {
    showToast('Folder picker only available in the desktop app', 'warn', 4000);
    return;
  }
  btn.disabled = true; btn.textContent = '⏳ Picking…';
  try {
    const chosen = await window.electron.chooseBackupFolder();
    if (!chosen) { btn.disabled = false; btn.textContent = '📁 Choose Folder'; return; }
    // Save to backend config
    await api('POST', '/backup/set-second-path', { path: chosen });
    _secondPath = chosen;
    document.getElementById('second_path_display').textContent = chosen;
    document.getElementById('second_path_display').title = chosen;
    document.getElementById('clearPathBtn').style.display = '';
    document.getElementById('second_path_status').textContent = '✅ Saved — this folder will receive a copy on every export.';
    showToast('Second backup location saved', 'success', 3000);
    await loadBackupHealth();
  } catch(e) {
    showToast('Failed to save path: ' + (e.message || e.error || 'Unknown error'), 'error', 5000);
  } finally {
    btn.disabled = false; btn.textContent = '📁 Choose Folder';
  }
}

async function clearSecondPath() {
  if (!confirm('Remove the second backup location? Future exports will only save to your Downloads folder.')) return;
  try {
    await api('POST', '/backup/set-second-path', { path: '' });
    _secondPath = '';
    document.getElementById('second_path_display').textContent = 'Not set';
    document.getElementById('second_path_display').title = '';
    document.getElementById('clearPathBtn').style.display = 'none';
    document.getElementById('second_path_status').textContent = '';
    showToast('Second backup location cleared', 'success', 3000);
    await loadBackupHealth();
  } catch(e) {
    showToast('Failed to clear path', 'error');
  }
}

// ── Export backup ─────────────────────────────────────────────────────────────
async function exportBackup() {
  const btn       = document.getElementById('exportBtn');
  const statusEl  = document.getElementById('export_status');
  btn.disabled    = true;
  btn.textContent = '⏳ Preparing…';
  statusEl.textContent = '';

  try {
    // 1. Fetch the backup JSON from the server (as text so we can re-use it)
    const resp = await fetch(API + '/backup/export', {
      headers: { 'Authorization': 'Bearer ' + Store.token }
    });
    if (!resp.ok) throw new Error('Export request failed: ' + resp.status);

    const jsonString = await resp.text();

    // Quick sanity parse — catches a corrupt response before we save anything
    JSON.parse(jsonString);

    // 2. Derive filename
    const ts       = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 16);
    const filename = `imara_links_backup_${ts}.json`;

    // 3. Trigger browser download (primary copy — goes to Downloads folder)
    const blob = new Blob([jsonString], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href     = url;
    link.download = filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    // 4. Write verified copy to second location (Electron only, non-blocking)
    let secondMsg = '';
    if (_secondPath && window.electron?.writeBackupSecond) {
      statusEl.textContent = '⏳ Writing to second location…';
      const result = await window.electron.writeBackupSecond({
        folderPath: _secondPath,
        filename,
        jsonString,
      });
      if (result.ok) {
        const kb = Math.round(result.bytes / 1024);
        secondMsg = ` · ✅ Second copy saved (${kb} KB)`;
      } else {
        // Second copy failed — warn clearly but don't fail the whole export
        showToast(
          `⚠️ Primary backup downloaded OK, but the second copy to "${_secondPath}" failed: ${result.error}. Check that the drive is connected.`,
          'error', 12000
        );
        secondMsg = ' · ⚠️ Second copy FAILED — check drive';
      }
    }

    // 5. Record the successful backup timestamp in the DB
    try {
      await api('POST', '/backup/stamp', {});
    } catch(_) { /* non-fatal */ }

    statusEl.textContent = `✅ Downloaded: ${filename}${secondMsg}`;
    showToast('Backup exported successfully', 'success', 4000);

    // Refresh health banner
    await loadBackupHealth();

  } catch(e) {
    statusEl.textContent = '';
    showToast('Export failed: ' + (e.message || 'Unknown error'), 'error', 6000);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Download Backup File';
  }
}

// ── Import / restore ──────────────────────────────────────────────────────────
function updateFileName(input) {
  const label = document.getElementById('fileLabel');
  if (input.files && input.files[0]) {
    label.textContent   = 'Selected: ' + input.files[0].name;
    label.style.borderColor = 'var(--g500)';
    label.style.color   = 'var(--ink)';
  } else {
    label.textContent   = 'Click or drag backup file here (.json)';
    label.style.borderColor = 'var(--border)';
  }
}

async function importBackup() {
  const fileInput = document.getElementById('backupFile');
  const err       = document.getElementById('import_err');
  const btn       = document.getElementById('importBtn');

  if (!fileInput.files || !fileInput.files[0]) {
    err.textContent  = 'Please select a backup file first';
    err.style.display = 'block';
    return;
  }
  if (!confirm('CRITICAL: This will replace ALL current data with the data from the backup file. Are you absolutely sure?')) return;

  err.style.display = 'none';
  btn.disabled      = true;
  btn.textContent   = 'Restoring system…';

  try {
    const file   = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const response = await fetch(API + '/backup/import', {
          method:  'POST',
          headers: { 'Authorization': 'Bearer ' + Store.token, 'Content-Type': 'application/json' },
          body:    e.target.result
        });
        const res = await response.json();
        if (!response.ok) throw res;
        showToast('System restored successfully!');
        alert('System data has been restored. You will now be signed out to refresh your session.');
        Store.clear();
        location.href = 'login.html';
      } catch(err_inner) {
        err.textContent  = err_inner.error || 'Restore failed';
        err.style.display = 'block';
        btn.disabled     = false;
        btn.textContent  = 'Restore System Data';
      }
    };
    reader.onerror = () => {
      err.textContent  = 'Failed to read file';
      err.style.display = 'block';
      btn.disabled     = false;
      btn.textContent  = 'Restore System Data';
    };
    reader.readAsText(file);
  } catch(e) {
    err.textContent  = e.error || 'Restore failed';
    err.style.display = 'block';
    btn.disabled     = false;
    btn.textContent  = 'Restore System Data';
  }
}

init();
</script>
</body>
</html>
