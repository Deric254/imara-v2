<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reconciliation — IMARA LINKS</title>
<link rel="stylesheet" href="shared.css">
<style>

@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.recon-tabs { display:flex; gap:.25rem; background:var(--g50); border-radius:var(--radius-sm);
              padding:.25rem; margin-bottom:1.5rem; border:1px solid var(--border); flex-wrap:wrap; }
.recon-tab  { flex:1; min-width:80px; padding:.5rem .6rem; text-align:center; border-radius:6px; font-size:.82rem;
              font-weight:500; cursor:pointer; color:var(--muted); background:none; border:none;
              font-family:var(--font); transition:all .15s; white-space:nowrap; }
.recon-tab.active { background:var(--surface); color:var(--g700); box-shadow:var(--shadow); }
.recon-section { display:none; }
.recon-section.active { display:block; }

.liability-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow);
                  padding:1.1rem 1.25rem; border-left:3px solid var(--g500); margin-bottom:.75rem; }
.liability-card.overdue { border-left-color:var(--red); }
.liability-card.partial { border-left-color:var(--amber); }
.liability-card.settled { border-left-color:#22c55e; opacity:.7; }

.liability-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:.5rem; }
.liability-name { font-weight:600; font-size:.92rem; color:var(--ink); }
.liability-meta { font-size:.78rem; color:var(--muted); margin-top:.2rem; }
.liability-amounts { display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap; }
.amt-block { text-align:right; }
.amt-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.amt-value { font-family:var(--font-mono); font-weight:600; font-size:.95rem; }
.amt-value.red   { color:var(--red); }
.amt-value.green { color:#16a34a; }
.amt-value.amber { color:var(--amber); }

.grand-banner { background:var(--g900); color:#fff; border-radius:var(--radius); padding:1.25rem 1.5rem;
                display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
                gap:1rem; margin-bottom:1.5rem; }
.grand-label  { font-size:.8rem; color:var(--g200); text-transform:uppercase; letter-spacing:.06em; }
.grand-value  { font-family:var(--font-mono); font-size:1.8rem; font-weight:700; }
.grand-value.ok   { color:#4ade80; }
.grand-value.warn { color:#fbbf24; }
.grand-value.bad  { color:#f87171; }

.settle-btn { background:var(--g500); color:#fff; border:none; border-radius:var(--radius-sm);
              padding:.4rem .9rem; font-size:.8rem; font-weight:600; font-family:var(--font);
              cursor:pointer; transition:all .15s; white-space:nowrap; }
.settle-btn:hover { background:var(--g600); }

.month-pill { display:inline-flex; align-items:center; gap:.4rem; padding:.25rem .65rem;
              border-radius:99px; font-size:.75rem; font-weight:600; }
.month-pill.paid   { background:#dcfce7; color:#166534; }
.month-pill.unpaid { background:#fee2e2; color:#991b1b; }

.period-bar { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
.period-bar label { font-size:.8rem; color:var(--muted); white-space:nowrap; }

/* ── Invoice styles ── */
.inv-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow);
            padding:1rem 1.25rem; margin-bottom:.6rem; border-left:3px solid var(--g400); }
.inv-card:hover { border-left-color:var(--g600); box-shadow:var(--shadow-md); }
.inv-number { font-family:var(--font-mono); font-size:.8rem; color:var(--g600); font-weight:600; }
.inv-customer { font-weight:600; font-size:.95rem; color:var(--ink); }
.inv-row { display:flex; justify-content:space-between; align-items:center; gap:.75rem; flex-wrap:wrap; }
.inv-meta { font-size:.78rem; color:var(--muted); }
.inv-amount { font-family:var(--font-mono); font-weight:700; font-size:1rem; color:var(--ink); }

/* ── Invoice print area ── */
.invoice-print-area {
  background:#fff; max-width:780px; margin:0 auto;
  padding:2.5rem 3rem; border-radius:var(--radius); box-shadow:var(--shadow-md);
  font-family:var(--font);
}
.inv-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; }
.inv-logo-area { display:flex; align-items:center; gap:1rem; }
.inv-logo { width:80px; height:80px; object-fit:contain; }
.inv-brand-name { font-family:var(--font-display); font-size:1.4rem; color:var(--g900); line-height:1.1; }
.inv-slogan { font-size:.75rem; color:var(--g600); font-style:italic; margin-top:.2rem; }
.inv-title-block { text-align:right; }
.inv-title { font-size:2rem; font-weight:700; color:var(--g800); letter-spacing:.05em; }
.inv-ref { font-family:var(--font-mono); font-size:.85rem; color:var(--muted); margin-top:.25rem; }
.inv-divider { border:none; border-top:2px solid var(--g100); margin:1.5rem 0; }
.inv-parties { display:grid; grid-template-columns:1fr 1fr; gap:2rem; margin-bottom:1.5rem; }
.inv-party-label { font-size:.68rem; text-transform:uppercase; letter-spacing:.08em; color:var(--g500); font-weight:600; margin-bottom:.4rem; }
.inv-party-name { font-weight:700; font-size:1rem; color:var(--ink); }
.inv-party-detail { font-size:.82rem; color:var(--muted); line-height:1.6; }
.inv-dates { display:flex; gap:2rem; margin-bottom:1.5rem; }
.inv-date-item label { font-size:.68rem; text-transform:uppercase; color:var(--g500); font-weight:600; display:block; }
.inv-date-item span { font-family:var(--font-mono); font-size:.88rem; color:var(--ink); }

.inv-items-table { width:100%; border-collapse:collapse; margin-bottom:1.5rem; }
.inv-items-table th { background:var(--g900); color:#fff; padding:.6rem .75rem; font-size:.75rem;
                      text-transform:uppercase; letter-spacing:.05em; text-align:left; }
.inv-items-table th:last-child,.inv-items-table td:last-child { text-align:right; }
.inv-items-table td { padding:.65rem .75rem; border-bottom:1px solid var(--border); font-size:.88rem; }
.inv-items-table tr:last-child td { border-bottom:none; }
.inv-items-table tr:nth-child(even) td { background:var(--g50); }

.inv-totals { margin-left:auto; width:260px; }
.inv-total-row { display:flex; justify-content:space-between; padding:.3rem 0;
                 font-size:.85rem; border-bottom:1px solid var(--border); }
.inv-total-row.grand { border-bottom:2px solid var(--g900); border-top:2px solid var(--g900);
                        font-weight:700; font-size:1rem; padding:.5rem 0; color:var(--g900); }
.inv-total-row.paid-row { color:#16a34a; font-weight:600; }
.inv-total-row.balance-row { color:var(--red); font-weight:700; font-size:.9rem; }

.inv-footer { margin-top:2rem; padding-top:1.5rem; border-top:1px solid var(--border);
              display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:1rem; }
.inv-notes-block label { font-size:.68rem; text-transform:uppercase; color:var(--g500); font-weight:600; margin-bottom:.3rem; display:block; }
.inv-notes-block p { font-size:.82rem; color:var(--muted); max-width:400px; line-height:1.5; }
.inv-stamp { text-align:center; }
.inv-stamp-seal { width:70px; height:70px; border-radius:50%; border:3px solid var(--g500);
                  display:flex; align-items:center; justify-content:center; color:var(--g600);
                  font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em;
                  text-align:center; line-height:1.3; }
.inv-kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:.75rem; margin-bottom:1.25rem; }
@media print{body>*{display:none!important}#printFrame{display:block!important;position:fixed;inset:0;background:#fff;z-index:99999;overflow:auto}@page{margin:1.5cm}}
#printFrame{display:none}
</style>
</head>
<body>
<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
let _productionStaff = [], _suppliers = [], _summary = null, _invoiceList = [], _pieceTypes = [];
// Submission locks — prevents any double-submit regardless of click speed
let _invoiceSavingR = false;
let _paymentSavingR = false;
let _rentSavingR = false;

async function init() {
  const me = requireAuth(['owner','admin']);
  if (!me) return;
  const pg = renderLayout('reconciliation.html');
  await loadGlobalConfig();

  pg.innerHTML = `
<!-- Period filter -->
<div class="period-bar">
  <label>Period:</label>
  <input type="date" class="input" id="fromDate" style="width:auto;padding:.3rem .6rem;font-size:.82rem">
  <span style="font-size:.8rem;color:var(--muted)">to</span>
  <input type="date" class="input" id="toDate" style="width:auto;padding:.3rem .6rem;font-size:.82rem">
  <button class="btn btn-primary btn-sm" onclick="loadAll()">Apply</button>
  <button class="btn btn-secondary btn-sm" onclick="applyPreset(30)">30d</button>
  <button class="btn btn-secondary btn-sm" onclick="applyPreset(90)">90d</button>
  <button class="btn btn-secondary btn-sm" onclick="applyMonth()">This month</button>
  <button class="btn btn-secondary btn-sm" onclick="applyAllTime()">All time</button>
  <button class="btn btn-secondary btn-sm" onclick="openReconStatement()">Statement</button>
</div>

<!-- Grand banner -->
<div class="grand-banner" id="grandBanner">
  <div>
    <div class="grand-label">Total Outstanding Liabilities (All-Time)</div>
    <div class="grand-value" id="grandValue">—</div>
    <div style="font-size:.72rem;color:var(--g300);margin-top:.2rem">Period view: <span id="grandPeriodValue">—</span></div>
  </div>
  <div style="display:flex;gap:2rem;flex-wrap:wrap">
    <div><div class="grand-label">Wages Due</div><div style="font-family:var(--font-mono);font-size:1.1rem;color:#fff" id="gWages">—</div></div>
    <div><div class="grand-label">Supplier Bills</div><div style="font-family:var(--font-mono);font-size:1.1rem;color:#fff" id="gSupplier">—</div></div>
    <div><div class="grand-label">Outstanding Rent Balance</div><div style="font-family:var(--font-mono);font-size:1.1rem;color:#fff" id="gRent">—</div></div>
    <div><div class="grand-label">Sack Costs</div><div style="font-family:var(--font-mono);font-size:1.1rem;color:#fff" id="gSack">—</div></div>
    <div><div class="grand-label">Transport</div><div style="font-family:var(--font-mono);font-size:1.1rem;color:#fff" id="gTransport">—</div></div>
  </div>
</div>

<!-- Tabs -->
<div class="recon-tabs">
  <button class="recon-tab active" onclick="switchTab('wages',this)">Wages</button>
  <button class="recon-tab" onclick="switchTab('suppliers',this)">Suppliers</button>
  <button class="recon-tab" onclick="switchTab('rent',this)">Rent</button>
  <button class="recon-tab" onclick="switchTab('sack',this)">Sack</button>
  <button class="recon-tab" onclick="switchTab('transport',this)">Transport</button>
  <button class="recon-tab" onclick="switchTab('history',this)">History</button>
</div>

<!-- WAGES -->
<div class="recon-section active" id="sec-wages">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">Wage Liabilities</div>
    <button class="settle-btn" onclick="openPayModal('wages_operator')">+ Record Wage Payment</button>
  </div>
  <div id="wagesList"><div style="color:var(--muted);font-size:.85rem">Loading…</div></div>
</div>

<!-- SUPPLIERS -->
<div class="recon-section" id="sec-suppliers">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">Supplier Liabilities</div>
    <button class="settle-btn" onclick="openPayModal('supplier')">+ Record Supplier Payment</button>
  </div>
  <div id="suppliersList"><div style="color:var(--muted);font-size:.85rem">Loading…</div></div>
</div>

<!-- RENT -->
<div class="recon-section" id="sec-rent">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">Rent Payable — Monthly</div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-secondary btn-sm" onclick="openAddRentMonth()">+ Add Month</button>
      <button class="settle-btn" onclick="openPayModal('rent')">+ Mark Paid</button>
    </div>
  </div>
  <div id="rentList"><div style="color:var(--muted);font-size:.85rem">Loading…</div></div>
</div>

<!-- SACK -->
<div class="recon-section" id="sec-sack">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">Sack Cost Liabilities</div>
    <button class="settle-btn" onclick="openPayModal('sack')">+ Record Sack Payment</button>
  </div>
  <div id="sackDetail"><div style="color:var(--muted);font-size:.85rem">Loading…</div></div>
</div>

<!-- TRANSPORT TO MARKET -->
<div class="recon-section" id="sec-transport">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">Transport to Market</div>
    <button class="settle-btn" onclick="openPayModal('transport_to_market')">+ Record Transport Payment</button>
  </div>
  <div id="transportDetail"><div style="color:var(--muted);font-size:.85rem">Loading…</div></div>
</div>

<!-- HISTORY -->
<div class="recon-section" id="sec-history">
  <div class="section-header" style="margin-bottom:1rem">
    <div class="section-title" style="font-size:.95rem">All Payments Recorded</div>
    <div style="display:flex;gap:.5rem">
      <button class="btn-export" onclick="exportHistoryCSV()" id="historyExportBtn" style="display:none">📥 Export Excel</button>
      <button class="btn btn-secondary btn-sm" onclick="loadHistory()">↻ Refresh</button>
    </div>
  </div>
  <div class="table-wrap">
    <table><thead><tr>
      <th>Date</th><th>Category</th><th>Payee</th><th>Amount</th><th>Running Total</th><th>Notes</th><th>By</th><th></th>
    </tr></thead>
    <tbody id="historyTable"><tr class="loading-row"><td colspan="8"><div class="spinner"></div></td></tr></tbody>
    </table>
  </div>
</div>

<!-- ══ Pay Modal ══ -->
<div class="modal-overlay" id="payModal" style="display:none" onclick="if(event.target===this)closePayModal()">
  <div class="modal" style="max-width:520px">
    <div class="modal-title" id="payModalTitle">Record Payment</div>
    <div class="form-row">
      <div class="form-group">
        <label class="label">Date *</label>
        <input class="input" type="date" id="pm_date">
      </div>
      <div class="form-group">
        <label class="label">Category *</label>
        <select class="input" id="pm_category" onchange="onCatChange()">
          <option value="wages_operator">Operator Wages</option>
          <option value="wages_knuckler">Knuckler Wages</option>
          <option value="supplier">Supplier Payment</option>
          <option value="rent">Rent</option>
          <option value="sack">Sack Costs</option>
          <option value="transport_to_market">Transport to Market</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>
    <div class="form-group" id="pm_worker_wrap">
      <label class="label">Production Staff *</label>
      <select class="input" id="pm_worker"></select>
    </div>
    <div class="form-group" id="pm_supplier_wrap" style="display:none">
      <label class="label">Supplier *</label>
      <select class="input" id="pm_supplier"></select>
    </div>
    <div class="form-group" id="pm_rentmonth_wrap" style="display:none">
      <label class="label">Rent Month *</label>
      <select class="input" id="pm_rentmonth">
        <option value="">— select month —</option>
      </select>
    </div>
    <div class="form-group" id="pm_payee_wrap" style="display:none">
      <label class="label">Payee / Description</label>
      <input class="input" id="pm_payee" placeholder="e.g. Sack supplier name">
    </div>
    <div class="form-group">
      <label class="label">Amount (KES) *</label>
      <input class="input" type="number" id="pm_amount" min="0.01" step="0.01" placeholder="0.00">
    </div>
    <div class="form-group">
      <label class="label">Notes</label>
      <input class="input" id="pm_notes" placeholder="Optional details…">
    </div>
    <div id="pm_err" class="err"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closePayModal()">Cancel</button>
      <button class="btn btn-primary" id="pm_save" onclick="savePayment()">Record Payment</button>
    </div>
  </div>
</div>

<!-- ══ Add Rent Month Modal ══ -->
<div class="modal-overlay" id="rentModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:380px">
    <div class="modal-title">Add Rent Month</div>
    <div class="form-group">
      <label class="label">Month *</label>
      <input class="input" type="month" id="rm_month">
    </div>
    <div class="form-group">
      <label class="label">Amount Due (KES) *</label>
      <input class="input" type="number" id="rm_amount" min="1" step="1" placeholder="e.g. 25000">
    </div>
    <div id="rm_err" class="err"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('rentModal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" onclick="saveRentMonth()">Add Month</button>
    </div>
  </div>
</div>

<!-- ══ Invoice Create/Edit Modal ══ -->
<div class="modal-overlay" id="invoiceModal" style="display:none" onclick="if(event.target===this)closeInvoiceModal()">
  <div class="modal" style="max-width:700px;max-height:90vh;overflow-y:auto">
    <div class="modal-title" id="invModalTitle">New Invoice</div>

    <div class="form-row">
      <div class="form-group">
        <label class="label">Customer Name *</label>
        <input class="input" id="inv_customer" list="inv_customer_list" placeholder="Customer name">
        <datalist id="inv_customer_list"></datalist>
      </div>
      <div class="form-group">
        <label class="label">Invoice Date *</label>
        <input class="input" type="date" id="inv_date">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="label">Phone</label>
        <input class="input" id="inv_phone" placeholder="+254…">
      </div>
      <div class="form-group">
        <label class="label">Due Date</label>
        <input class="input" type="date" id="inv_due">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="label">Email</label>
        <input class="input" id="inv_email" placeholder="customer@email.com">
      </div>
      <div class="form-group">
        <label class="label">Status</label>
        <select class="input" id="inv_status">
          <option value="partial_payment">Pending Payment</option>
          <option value="paid">Paid</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="label">Address</label>
      <input class="input" id="inv_address" placeholder="Customer address (optional)">
    </div>

    <!-- Line items -->
    <div style="margin:1rem 0 .5rem;font-weight:600;font-size:.88rem;color:var(--ink)">Line Items</div>
    <div id="invItems"></div>
    <button class="btn btn-secondary btn-sm" onclick="addInvItem()" style="margin-bottom:1rem">+ Add Line</button>

    <div class="form-row">
      <div class="form-group">
        <label class="label">Discount (%)</label>
        <input class="input" type="number" id="inv_discount" min="0" max="100" step="0.1" value="0" oninput="recalcInvTotals()">
      </div>
      <div class="form-group">
        <label class="label">Amount Paid (KES)</label>
        <input class="input" type="number" id="inv_paid" min="0" step="0.01" value="0">
      </div>
    </div>
    <div class="form-group">
      <label class="label">Notes / Terms</label>
      <textarea class="input" id="inv_notes" rows="2" placeholder="Payment terms, delivery info, thank you message…" style="resize:vertical"></textarea>
    </div>

    <!-- Live totals preview -->
    <div style="background:var(--g50);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem 1rem;margin-bottom:1rem;font-size:.85rem">
      <div style="display:flex;justify-content:space-between;margin-bottom:.25rem"><span>Subtotal</span><span class="mono" id="inv_prev_sub">KES 0.00</span></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:.25rem;color:var(--amber)"><span>Discount</span><span class="mono" id="inv_prev_disc">- KES 0.00</span></div>
      <div style="display:flex;justify-content:space-between;font-weight:700;border-top:1px solid var(--border);padding-top:.4rem"><span>TOTAL</span><span class="mono" id="inv_prev_total">KES 0.00</span></div>
    </div>

    <div id="inv_err" class="err"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeInvoiceModal()">Cancel</button>
      <button class="btn btn-primary" id="inv_save" onclick="saveInvoice()">Save Invoice</button>
    </div>
  </div>
</div>

<!-- ══ Invoice View/Print Modal ══ -->
<div class="modal-overlay" id="invViewModal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:820px;max-height:92vh;overflow-y:auto">
    <div class="no-print" style="display:flex;gap:.5rem;justify-content:flex-end;margin-bottom:1rem;flex-wrap:wrap">
      <button class="btn-export" onclick="printInvoice()">🖨 Print</button>
      <button class="btn-export" onclick="shareInvoice()">📤 Share</button>
      <button class="btn btn-secondary btn-sm" onclick="editCurrentInvoice()">✏️ Edit</button>
      <button class="btn btn-secondary btn-sm" onclick="document.getElementById('invViewModal').style.display='none'">Close</button>
    </div>
    <div id="invPrintArea"></div>
  </div>
</div>

<div id="printFrame" style="display:none"></div>
`;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.recon-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.recon-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + name)?.classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'history') loadHistory();
}

// ── Period helpers ────────────────────────────────────────────────────────────
function _reconLocalDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function applyPreset(days) {
  const to = new Date();
  const from = new Date(to.getFullYear(), to.getMonth(), to.getDate() - days);
  document.getElementById('toDate').value   = _reconLocalDate(to);
  document.getElementById('fromDate').value = _reconLocalDate(from);
  loadAll();
}
function applyMonth() {
  const now  = new Date();
  const from = new Date(now.getFullYear(), now.getMonth(), 1);
  document.getElementById('fromDate').value = _reconLocalDate(from);
  document.getElementById('toDate').value   = _reconLocalDate(now);
  loadAll();
}
function applyAllTime() {
  document.getElementById('fromDate').value = '2000-01-01';
  document.getElementById('toDate').value   = _reconLocalDate(new Date());
  loadAll();
}

async function loadAll() {
  const from = document.getElementById('fromDate').value;
  const to   = document.getElementById('toDate').value;
  if (!from || !to) return;
  PageProgress.show(10, 'Loading reconciliation…');

  // Show loading skeleton in active section immediately
  const skelHtml = `<div style="display:flex;flex-direction:column;gap:.5rem">
    ${Array(3).fill('<div style="height:72px;border-radius:8px;background:linear-gradient(90deg,#d6f2e4 25%,#f0faf5 50%,#d6f2e4 75%);background-size:800px 100%;animation:shimmer 1.4s infinite linear"></div>').join('')}
  </div>`;
  ['wagesList','suppliersList','rentList','sackDetail','transportDetail'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = skelHtml;
  });
  const banner = document.getElementById('grandValue');
  if (banner) banner.textContent = '…';

  try {
    [_productionStaff, _suppliers, _summary] = await Promise.all([
      api('GET', '/reconciliation/workers'),
      api('GET', '/suppliers'),
      api('GET', `/reconciliation/summary?from=${from}&to=${to}`),
    ]);
    if (!_productionStaff || !_suppliers || !_summary) {
      showToast('Reconciliation data returned empty', 'error');
      return;
    }

    // ── Auto-ensure current month rent row exists ─────────────────────────
    // If current month has no rent entry yet, silently create it using the
    // configured rent_allocation. Owner can still add/edit previous months manually.
    const _nowM = new Date();
    const _curMonth = `${_nowM.getFullYear()}-${String(_nowM.getMonth()+1).padStart(2,'0')}`;
    const _hasThisMonth = (_summary.rent?.months || []).some(m => m.month === _curMonth);
    if (!_hasThisMonth) {
      await loadGlobalConfig();
      const _rentAmt = parseFloat(getConfig('rent_allocation', '0'));
      if (_rentAmt > 0) {
        try {
          await api('POST', '/reconciliation/rent-months', { month: _curMonth, amount_due: _rentAmt });
          // Re-fetch summary with the new rent row included
          _summary = await api('GET', `/reconciliation/summary?from=${from}&to=${to}`);
        } catch(_e) {
          // 409 = already exists (race condition) — ignore silently
          if (!(_e?.status === 409 || _e?.error?.includes('already'))) {
            console.warn('Auto-rent month skipped:', _e?.error || _e);
          }
        }
      }
    }
    // ─────────────────────────────────────────────────────────────────────

    renderGrandBanner(); renderWages(); renderSuppliers(); renderRent(); renderSack(); renderTransport();
    PageProgress.done();
  } catch(e) {
    console.error('Recon load error:', e);
    const msg = e?.error || e?.message || 'Network error';
    PageProgress.error();
    showToast('Failed to load reconciliation data: ' + msg, 'error');
    ['wagesList','suppliersList','rentList','sackDetail','transportDetail'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = `<div style="color:var(--red);padding:.75rem;background:#fee2e2;border-radius:8px;font-size:.85rem">⚠ ${msg}</div>`;
    });
  }
}

function renderGrandBanner() {
  const s = _summary;
  const grand = s.grand_total_outstanding;   // all-time true liability
  const period = s.grand_total_period;       // period-filtered view
  const el = document.getElementById('grandValue');
  if (!el) return;
  el.textContent = 'KES ' + fmt(grand, 2);
  el.className = 'grand-value ' + (grand <= 0 ? 'ok' : grand > 100000 ? 'bad' : 'warn');
  const periodEl = document.getElementById('grandPeriodValue');
  if (periodEl) {
    if (period < 0) {
      // Negative means more was paid this period than was accrued — settling old debts
      periodEl.textContent = 'KES ' + fmt(Math.abs(period), 2) + ' net paid out (more paid than accrued — clearing older debts)';
      periodEl.style.color = '#86efac'; // light green — this is a good thing
    } else {
      periodEl.textContent = 'KES ' + fmt(period, 2) + ' net owed this period';
      periodEl.style.color = '';
    }
  }
  // Clamp period balances to 0 for the "outstanding" banner — a negative value
  // means the period filter captured more payments than accruals (e.g. you paid
  // March wages in April and filtered for April), which is valid data but should
  // never display as a negative outstanding amount in this summary strip.
  document.getElementById('gWages').textContent    = 'KES ' + fmt(Math.max(0, s.wages.balance), 2);
  document.getElementById('gSupplier').textContent = 'KES ' + fmt(Math.max(0, s.suppliers.balance), 2);
  document.getElementById('gRent').textContent     = 'KES ' + fmt(Math.max(0, s.rent.balance), 2);
  document.getElementById('gSack').textContent     = 'KES ' + fmt(Math.max(0, s.sack.balance), 2);
  document.getElementById('gTransport').textContent = 'KES ' + fmt(Math.max(0, (s.transport_to_market||{balance:0}).balance), 2);
}

function renderWages() {
  const w = _summary.wages, el = document.getElementById('wagesList');
  if (!w.workers.length) { el.innerHTML = `<div class="card" style="color:var(--muted);text-align:center;padding:2rem">No wages in this period.</div>`; return; }
  const overpaid = w.total_paid > w.total_accrued;
  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1.25rem">
    <div class="kpi"><div class="kpi-label">Accrued This Period</div><div class="kpi-value mono">${fmt(w.total_accrued,2)}</div><div class="kpi-sub">Wages earned by workers</div></div>
    <div class="kpi"><div class="kpi-label">Paid This Period</div><div class="kpi-value mono" style="color:#16a34a">${fmt(w.total_paid,2)}</div><div class="kpi-sub">Cash paid out${overpaid?' (incl. older debts)':''}</div></div>
    <div class="kpi ${!overpaid && w.balance>0?'danger':''}"><div class="kpi-label">${overpaid?'Period Net':'Outstanding'}</div><div class="kpi-value mono" style="font-size:${overpaid?'.85':'1.25'}rem;margin-top:${overpaid?'.3':'0'}rem">${overpaid?`<span style="color:var(--g600)">KES ${fmt(w.total_paid-w.total_accrued,2)} extra paid — clearing old balance</span>`:fmt(Math.max(0,w.balance),2)}</div></div>
  </div>`;
  for (const wk of w.workers) {
    const ta = wk.accrued_operator + wk.accrued_knuckler;
    const tp = wk.paid_operator    + wk.paid_knuckler;
    const bal = wk.balance_operator + wk.balance_knuckler;
    const cls = bal <= 0 ? 'settled' : bal < ta ? 'partial' : 'overdue';
    html += `<div class="liability-card ${cls}"><div class="liability-row">
      <div><div class="liability-name">${escHtml(wk.name||'Unknown')}</div>
        <div class="liability-meta">
          ${wk.accrued_operator>0?`Op: KES ${fmt(wk.accrued_operator,2)} accrued / KES ${fmt(wk.paid_operator,2)} paid`:''}
          ${wk.accrued_operator>0&&wk.accrued_knuckler>0?' &middot; ':''}
          ${wk.accrued_knuckler>0?`Kn: KES ${fmt(wk.accrued_knuckler,2)} accrued / KES ${fmt(wk.paid_knuckler,2)} paid`:''}
        </div></div>
      <div class="liability-amounts">
        <div class="amt-block"><div class="amt-label">Balance</div><div class="amt-value ${bal>0?'red':'green'}">KES ${fmt(Math.max(0,bal),2)}</div></div>
        ${bal>0?`<div style="display:flex;flex-direction:column;gap:.3rem">
          ${wk.accrued_operator>0&&wk.balance_operator>0?`<button class="settle-btn" onclick="openPayModal('wages_operator',${wk.user_id},null,null,${wk.balance_operator})">Pay Op</button>`:''}
          ${wk.accrued_knuckler>0&&wk.balance_knuckler>0?`<button class="settle-btn" onclick="openPayModal('wages_knuckler',${wk.user_id},null,null,${wk.balance_knuckler})">Pay Kn</button>`:''}
        </div>`:`<span class="badge badge-green">✓ Settled</span>`}
      </div>
    </div></div>`;
  }
  el.innerHTML = html;
}

function renderSuppliers() {
  const s = _summary.suppliers, el = document.getElementById('suppliersList');
  if (!s.breakdown.length) { el.innerHTML = `<div class="card" style="color:var(--muted);text-align:center;padding:2rem">No purchases in this period.</div>`; return; }
  const overpaid = s.total_paid > s.total_billed;
  const netLabel = overpaid
    ? `<span style="color:var(--g600);font-size:.75rem;font-weight:400">KES ${fmt(s.total_paid - s.total_billed,2)} more paid than billed — settling older debts</span>`
    : `<span style="color:var(--red);font-size:.75rem;font-weight:400">KES ${fmt(s.total_billed - s.total_paid,2)} still owed to suppliers</span>`;
  let html = `
    <div style="background:var(--g50);border:1px solid var(--border);border-radius:var(--radius);padding:.6rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--muted);line-height:1.5">
      <strong style="color:var(--ink)">How to read this:</strong>
      <em>Billed</em> = value of goods received this period (accrual).
      <em>Paid</em> = cash paid to suppliers this period (may include settling older debts).
      All-time outstanding is shown in the banner above.
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1.25rem">
      <div class="kpi">
        <div class="kpi-label">Billed This Period</div>
        <div class="kpi-value mono">${fmt(s.total_billed,2)}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.15rem">Value of goods received</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Paid This Period</div>
        <div class="kpi-value mono" style="color:#16a34a">${fmt(s.total_paid,2)}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.15rem">Cash paid out to suppliers</div>
      </div>
      <div class="kpi ${!overpaid && s.balance>0?'danger':''}">
        <div class="kpi-label">Period Net</div>
        <div class="kpi-value mono" style="font-size:1rem;margin-top:.25rem">${netLabel}</div>
      </div>
    </div>`;
  for (const sup of s.breakdown) {
    const cls = sup.balance<=0?'settled':sup.balance<sup.total_billed?'partial':'overdue';
    html += `<div class="liability-card ${cls}"><div class="liability-row">
      <div><div class="liability-name">${escHtml(sup.supplier_name)}</div>
        <div class="liability-meta">Billed: KES ${fmt(sup.total_billed,2)} &middot; Paid: KES ${fmt(sup.total_paid,2)}</div></div>
      <div class="liability-amounts">
        <div class="amt-block"><div class="amt-label">Balance</div><div class="amt-value ${sup.balance>0?'red':'green'}">KES ${fmt(Math.max(0,sup.balance),2)}</div></div>
        ${sup.balance>0?`<button class="settle-btn" onclick="openPayModal('supplier',null,${sup.supplier_id},null,${sup.balance})">Pay</button>`:`<span class="badge badge-green">✓ Settled</span>`}
      </div>
    </div></div>`;
  }
  el.innerHTML = html;
}

function renderRent() {
  const r = _summary.rent, el = document.getElementById('rentList');
  let html = `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.75rem;margin-bottom:1.25rem">
    <div class="kpi"><div class="kpi-label">Total Due</div><div class="kpi-value mono">${fmt(r.total_accrued,2)}</div></div>
    <div class="kpi"><div class="kpi-label">Paid</div><div class="kpi-value mono" style="color:#16a34a">${fmt(r.total_paid,2)}</div></div>
    <div class="kpi ${r.balance>0?'danger':''}"><div class="kpi-label">Outstanding</div><div class="kpi-value mono">${fmt(Math.max(0,r.balance),2)}</div></div>
  </div>`;
  if (!r.months.length) {
    html += `<div class="card" style="color:var(--muted);text-align:center;padding:2rem">No rent months. Click Add Month.</div>`;
  } else {
    for (const m of r.months) {
      // Use status from backend: 'paid' | 'partial' | 'unpaid'
      const status  = m.status || (m.paid ? 'paid' : 'unpaid');
      const balance = parseFloat(m.balance ?? (m.amount_due - (m.total_paid_amount||0)));
      const paid    = parseFloat(m.total_paid_amount || 0);
      const cls     = status==='paid' ? 'settled' : status==='partial' ? 'partial' : 'overdue';
      const label   = new Date(m.month+'-01').toLocaleDateString('en-KE',{month:'long',year:'numeric'});

      let metaText, amtBlock, actionBtn;
      if (status === 'paid') {
        metaText  = `Fully paid — KES ${fmt(m.amount_due,2)}`;
        amtBlock  = `<div class="amt-block"><div class="amt-label">Amount Due</div><div class="amt-value green">KES ${fmt(m.amount_due,2)}</div></div>`;
        actionBtn = `<span class="month-pill paid">✓ Paid</span>`;
      } else if (status === 'partial') {
        metaText  = `Partial: KES ${fmt(paid,2)} paid — KES ${fmt(balance,2)} remaining`;
        amtBlock  = `<div class="amt-block"><div class="amt-label">Remaining</div><div class="amt-value red">KES ${fmt(balance,2)}</div></div>
                     <div class="amt-block"><div class="amt-label">Paid So Far</div><div class="amt-value" style="color:var(--g600)">KES ${fmt(paid,2)}</div></div>`;
        actionBtn = `<button class="settle-btn" onclick="openPayModal('rent',null,null,'${m.month}',${balance})">Pay Remaining</button>`;
      } else {
        metaText  = `KES ${fmt(m.amount_due,2)} due`;
        amtBlock  = `<div class="amt-block"><div class="amt-label">Amount Due</div><div class="amt-value red">KES ${fmt(m.amount_due,2)}</div></div>`;
        actionBtn = `<button class="settle-btn" onclick="openPayModal('rent',null,null,'${m.month}',${m.amount_due})">Mark Paid</button>`;
      }

      html += `<div class="liability-card ${cls}"><div class="liability-row">
        <div><div class="liability-name">${label}</div>
          <div class="liability-meta">${metaText}</div></div>
        <div class="liability-amounts">
          ${amtBlock}
          ${actionBtn}
        </div>
      </div></div>`;
    }
  }
  el.innerHTML = html;
}

async function openReconStatement() {
  const from = document.getElementById('fromDate')?.value || '2000-01-01';
  const to = document.getElementById('toDate')?.value || _reconLocalDate(new Date());
  let ov = document.getElementById('stmtModal');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'stmtModal';
    ov.className = 'modal-overlay';
    ov.addEventListener('click', e => { if (e.target === ov) closeReconStatement(); });
    document.body.appendChild(ov);
  }
  ov.innerHTML = `
    <div class="modal" style="max-width:960px;max-height:92vh;overflow-y:auto">
      <div style="display:flex;gap:.5rem;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
        <div class="modal-title" style="margin:0">Reconciliation Statement</div>
        <div style="display:flex;gap:.5rem;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="printReconStatement()">Print</button>
          <button class="btn btn-secondary btn-sm" onclick="closeReconStatement()">Close</button>
        </div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-bottom:1rem">
        <input type="date" class="input" id="recon_stmt_from" value="${from}" style="width:auto;padding:.3rem .6rem;font-size:.82rem">
        <span style="color:var(--muted);font-size:.8rem">to</span>
        <input type="date" class="input" id="recon_stmt_to" value="${to}" style="width:auto;padding:.3rem .6rem;font-size:.82rem">
        <button class="btn btn-secondary btn-sm" onclick="loadReconStatement()">Load</button>
      </div>
      <div id="reconStmtContent"><div style="text-align:center;padding:2rem"><div class="spinner"></div></div></div>
    </div>`;
  ov.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  await loadReconStatement();
}

function closeReconStatement() {
  const ov = document.getElementById('stmtModal');
  if (ov) {
    ov.style.display = 'none';
    ov.innerHTML = '';
  }
  document.body.style.overflow = '';
}

async function doInvSearch(q) {
  const el = document.getElementById('invList');
  if (!el) return;
  el.innerHTML = '<div style="color:var(--muted);font-size:.82rem">Searching…</div>';
  try {

function openInvoiceModal(inv = null) {

  document.getElementById('invModalTitle').textContent = inv ? `Edit Invoice ${inv.invoice_number}` : 'New Invoice';

  document.getElementById('inv_phone').value     = inv?.customer_phone || '';
  document.getElementById('inv_email').value     = inv?.customer_email || '';
  document.getElementById('inv_address').value   = inv?.customer_address || '';

  document.getElementById('inv_due').value       = inv?.due_date || '';
  document.getElementById('inv_status').value    = inv?.status || 'partial_payment';
  document.getElementById('inv_discount').value  = inv?.discount_pct || 0;
  document.getElementById('inv_paid').value      = inv?.amount_paid || 0;
  document.getElementById('inv_notes').value     = inv?.notes || '';
  document.getElementById('invItems').innerHTML  = '';
  showErr('inv_err', '');

  // Populate customer autocomplete

  if (dl) {

    }).catch(() => {});
  }

  if (inv?.items?.length) {
    for (const item of inv.items) addInvItem(item);

  }

function addInvItem(item = null) {
  _invItemCount++;
  const id = _invItemCount;
  const gauges = (getConfig('wire_gauges','12,14,16')).split(',').map(g => g.trim());
  const gOpts = `<option value="">—</option>` + gauges.map(g => `<option value="${g}" ${item?.gauge===g?'selected':''}>${g}</option>`).join('');
  const ptOpts = '<option value="">— type —</option>' + (_pieceTypes||[]).map(p =>
    `<option value="${p.id}" ${item?.piece_type_id==p.id?'selected':''}>${escHtml(p.name)}</option>`
  ).join('');

  const div = document.createElement('div');
  div.id = `invItem_${id}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr auto 1fr auto;gap:.4rem;align-items:center;margin-bottom:.4rem;';
  div.innerHTML = `
    <input class="input inv-desc" placeholder="Description *" value="${escHtml(item?.description||'')}" oninput="recalcInvTotals()" style="font-size:.82rem">
    <select class="input inv-gauge" style="font-size:.8rem">${gOpts}</select>
    <input class="input inv-qty" type="number" min="1" step="1" placeholder="Qty" value="${item?.quantity||''}" oninput="recalcInvTotals()" style="font-size:.82rem">
    <input class="input inv-price" type="number" min="0" step="0.01" placeholder="Unit Price" value="${item?.unit_price||''}" oninput="recalcInvTotals()" style="font-size:.82rem">
    <span class="mono inv-line-total" style="font-size:.8rem;text-align:right;white-space:nowrap;padding:.25rem .4rem;background:var(--g50);border-radius:4px">KES 0.00</span>
    <button onclick="document.getElementById('invItem_${id}').remove();recalcInvTotals()" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:1.1rem;padding:.25rem">✕</button>`;
  document.getElementById('invItems').appendChild(div);
  if (item?.unit_price) recalcInvTotals();
}

function recalcInvTotals() {
  let subtotal = 0;
  document.querySelectorAll('#invItems > div').forEach(row => {
    const qty   = parseFloat(row.querySelector('.inv-qty')?.value) || 0;
    const price = parseFloat(row.querySelector('.inv-price')?.value) || 0;
    const line  = parseFloat((qty * price).toFixed(2));
    subtotal   += line;
    const lt = row.querySelector('.inv-line-total');
    if (lt) lt.textContent = `KES ${fmt(line,2)}`;
  });
  const discPct = parseFloat(document.getElementById('inv_discount')?.value) || 0;
  const disc    = parseFloat((subtotal * discPct / 100).toFixed(2));
  const total   = parseFloat((subtotal - disc).toFixed(2));
  const s = document.getElementById('inv_prev_sub');
  const d = document.getElementById('inv_prev_disc');
  const t = document.getElementById('inv_prev_total');
  if (s) s.textContent = `KES ${fmt(subtotal,2)}`;
  if (d) d.textContent = `- KES ${fmt(disc,2)}`;
  if (t) t.textContent = `KES ${fmt(total,2)}`;
  // Keep amount_paid capped at invoice total to prevent overpayment
  const paidEl = document.getElementById('inv_paid');
  if (paidEl) {
    paidEl.max = total;
    if (parseFloat(paidEl.value) > total) paidEl.value = total.toFixed(2);
  }
}

function getInvItems() {
  const items = [];
  document.querySelectorAll('#invItems > div').forEach(row => {
    const desc  = row.querySelector('.inv-desc')?.value?.trim();
    const qty   = parseInt(row.querySelector('.inv-qty')?.value);
    const price = parseFloat(row.querySelector('.inv-price')?.value);
    const gauge = row.querySelector('.inv-gauge')?.value || '';
    if (!desc || !(qty > 0)) return;
    items.push({ description: desc, gauge, quantity: qty, unit_price: price || 0, line_total: parseFloat((qty * (price||0)).toFixed(2)) });
  });
  return items;
}

async function saveInvoice() {
  showErr('inv_err', '');
  const customer_name = document.getElementById('inv_customer').value.trim();
  const invoice_date  = document.getElementById('inv_date').value;
  if (!customer_name) return showErr('inv_err', 'Customer name required');
  if (!invoice_date)  return showErr('inv_err', 'Invoice date required');
  const items = getInvItems();
  if (!items.length) return showErr('inv_err', 'Add at least one line item with description and quantity');

  const payload = {
    customer_name,
    customer_phone:   document.getElementById('inv_phone').value.trim(),
    customer_email:   document.getElementById('inv_email').value.trim(),
    customer_address: document.getElementById('inv_address').value.trim(),
    invoice_date,
    due_date:    document.getElementById('inv_due').value || '',
    status:      document.getElementById('inv_status').value,
    discount_pct:parseFloat(document.getElementById('inv_discount').value)||0,
    amount_paid: parseFloat(document.getElementById('inv_paid').value)||0,
    notes:       document.getElementById('inv_notes').value.trim(),
    items,
  };

  if (_invoiceSavingR) return;
  _invoiceSavingR = true;
  const btn = document.getElementById('inv_save');
  btn.disabled = true; btn.textContent = _editingInvoiceId ? '⏳ Updating…' : '⏳ Creating…';
  try {
    const res = _editingInvoiceId
      ? await api('PUT',  `/invoices/${_editingInvoiceId}`, payload)
      : await api('POST', '/invoices', payload);
    if (!res) return;
    closeInvoiceModal();
    await loadInvoices();
    showToast(_editingInvoiceId ? 'Invoice updated ✓' : 'Invoice created ✓');
    setTimeout(() => viewInvoice(res.id), 400);
  } catch(e) {
    showErr('inv_err', e.error || 'Save failed — please check all fields');
  } finally {
    _invoiceSavingR = false;
    btn.disabled = false; btn.textContent = 'Save Invoice';
  }
}

async function editInvoice(id) {
  try {
    PageProgress.show(25, 'Loading invoice…');
    const inv = await api('GET', `/invoices/${id}`);
    if (!inv) { PageProgress.error(); return; }
    _pieceTypes = _pieceTypes.length ? _pieceTypes : (await api('GET', '/piece-types') || []);
    PageProgress.done();
    openInvoiceModal(inv);

    PageProgress.error();
    showToast('Failed to load invoice', 'error');

async function deleteInvoice(id) {

  try {
    await api('DELETE', `/invoices/${id}`);
    showToast('Invoice deleted');
    loadInvoices();
  } catch(e) { showToast(e.error || 'Failed to delete', 'error'); }
}

  _editingInvoiceId = null;
}

function exportInvoicesExcel() {
  const from = document.getElementById('fromDate').value || '2000-01-01';
  const to   = document.getElementById('toDate').value   || '2099-12-31';
  apiDownload(`/export/invoices?from=${from}&to=${to}`, `imara_invoices_${from}_to_${to}.csv`);
}

// ── Payment history ───────────────────────────────────────────────────────────
async function loadHistory() {
  const from = document.getElementById('fromDate').value || '2000-01-01';
  const to   = document.getElementById('toDate').value   || '2099-12-31';
  const tb   = document.getElementById('historyTable');
  const btn  = document.getElementById('historyExportBtn');
  if (!tb) return;
  tb.innerHTML = '<tr class="loading-row"><td colspan="8"><div class="spinner"></div></td></tr>';
  if (btn) btn.style.display = 'none';
  try {
    const rows = await api('GET', `/reconciliation/payments?from=${from}&to=${to}`);
    if (!rows) return;
    window._lastHistoryData = rows;
    if (!rows.length) { tb.innerHTML = '<tr><td colspan="8" class="empty"><div class="empty-text">No payments in this period</div></td></tr>'; return; }
    if (btn) btn.style.display = 'inline-flex';
    const catLabel = { wages_operator:'Op Wages', wages_knuckler:'Kn Wages', supplier:'Supplier', rent:'Rent', sack:'Sack', transport_to_market:'Transport', other:'Other' };
    const catBadge = { wages_operator:'badge-blue', wages_knuckler:'badge-blue', supplier:'badge-amber', rent:'badge-green', sack:'badge-gray', transport_to_market:'badge-blue', other:'badge-gray' };
    let running = 0;
    tb.innerHTML = rows.map(r => {
      running += parseFloat(r.amount) || 0;
      const payee = r.payee_user_name || r.payee_supplier_name || r.payee_name || '—';
      return `<tr>
        <td class="mono" style="white-space:nowrap">${r.payment_date}</td>
        <td><span class="badge ${catBadge[r.category]||'badge-gray'}" style="font-size:.7rem">${catLabel[r.category]||r.category}</span></td>
        <td>${escHtml(payee)}</td>
        <td class="mono"><strong>KES ${fmt(r.amount,2)}</strong></td>
        <td class="mono" style="color:var(--g600);font-size:.82rem">KES ${fmt(running,2)}</td>
        <td style="font-size:.8rem;color:var(--muted)">${escHtml(r.notes||'')}</td>
        <td style="font-size:.78rem">${escHtml(r.recorded_by_name||'')}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deletePayment(${r.id})">✕</button></td>
      </tr>`;
    }).join('');
  } catch(e) { tb.innerHTML = '<tr><td colspan="8" class="empty"><div class="empty-text">Failed to load</div></td></tr>'; }
}

async function deletePayment(id) {
  if (!confirm('Delete payment? Liability will re-open.')) return;
  try { await api('DELETE', `/reconciliation/payments/${id}`); showToast('Payment deleted'); loadAll(); loadHistory(); }
  catch(e) { showToast(e.error||'Failed','error'); }
}

function exportHistoryCSV() {
  const data = window._lastHistoryData;
  if (!data?.length) return;
  const catLabel = { wages_operator:'Op Wages', wages_knuckler:'Kn Wages', supplier:'Supplier', rent:'Rent', sack:'Sack', transport_to_market:'Transport', other:'Other' };
  const headers = ['Date','Category','Payee','Amount (KES)','Notes','Recorded By'];
  const rows = data.map(r => [r.payment_date, catLabel[r.category]||r.category,
    r.payee_user_name||r.payee_supplier_name||r.payee_name||'—', r.amount, r.notes||'', r.recorded_by_name||'']);
  const from = document.getElementById('fromDate').value||'start';
  const to   = document.getElementById('toDate').value  ||'end';
  downloadCSV(`imara_payments_${from}_to_${to}`, headers, rows);
}

// ── Pay modal ─────────────────────────────────────────────────────────────────
function openPayModal(cat, workerId, supplierId, rentMonth, amount) {
  document.getElementById('pm_date').value   = today();
  document.getElementById('pm_amount').value = amount||'';
  document.getElementById('pm_notes').value  = '';
  showErr('pm_err','');
  const sel = document.getElementById('pm_category');
  sel.value = cat || 'wages_operator';
  const wSel = document.getElementById('pm_worker');
  wSel.innerHTML = (_productionStaff||[]).map(w=>`<option value="${w.id}">${escHtml(w.full_name)} (${w.role})</option>`).join('');
  if (workerId) wSel.value = workerId;
  const sSel = document.getElementById('pm_supplier');
  sSel.innerHTML = (_suppliers||[]).map(s=>`<option value="${s.id}">${escHtml(s.name)}</option>`).join('');
  if (supplierId) sSel.value = supplierId;
  const rmSel = document.getElementById('pm_rentmonth');
  // Show all months that are not fully paid (includes partial and unpaid)
  const unpaid = (_summary?.rent?.months||[]).filter(m => (m.status || (m.paid?'paid':'unpaid')) !== 'paid');
  rmSel.innerHTML = '<option value="">— select month —</option>' + unpaid.map(m=>{
    const label   = new Date(m.month+'-01').toLocaleDateString('en-KE',{month:'long',year:'numeric'});
    const balance = parseFloat(m.balance ?? (m.amount_due - (m.total_paid_amount||0)));
    const statusTag = (m.status==='partial') ? ' (partial)' : '';
    return `<option value="${m.month}" data-amount="${balance}" data-due="${m.amount_due}">${label}${statusTag} — KES ${fmt(balance,2)} remaining</option>`;
  }).join('');
  if (rentMonth) {
    rmSel.value = rentMonth;
    const opt = rmSel.querySelector(`option[value="${rentMonth}"]`);
    if (opt) document.getElementById('pm_amount').value = opt.dataset.amount;
  }
  rmSel.onchange = function() {
    const opt = this.options[this.selectedIndex];
    if (opt?.dataset?.amount) document.getElementById('pm_amount').value = opt.dataset.amount;
  };
  onCatChange();
  document.getElementById('payModal').style.display = 'flex';
}

function onCatChange() {
  const cat = document.getElementById('pm_category').value;
  document.getElementById('pm_worker_wrap').style.display    = ['wages_operator','wages_knuckler'].includes(cat)?'block':'none';
  document.getElementById('pm_supplier_wrap').style.display  = cat==='supplier'?'block':'none';
  document.getElementById('pm_rentmonth_wrap').style.display = cat==='rent'?'block':'none';
  document.getElementById('pm_payee_wrap').style.display     = ['sack','other','transport_to_market'].includes(cat)?'block':'none';
}

function closePayModal() { document.getElementById('payModal').style.display='none'; }

async function savePayment() {
  showErr('pm_err','');
  const payment_date = document.getElementById('pm_date').value;
  const category     = document.getElementById('pm_category').value;
  const amount       = parseFloat(document.getElementById('pm_amount').value);
  const notes        = document.getElementById('pm_notes').value.trim();
  if (!payment_date) return showErr('pm_err','Date required');
  if (isNaN(amount)||amount<=0) return showErr('pm_err','Enter a valid amount > 0');
  const body = { payment_date, category, amount, notes };
  if (['wages_operator','wages_knuckler'].includes(category)) {
    body.payee_user_id = document.getElementById('pm_worker').value;
    if (!body.payee_user_id) return showErr('pm_err','Select a staff member');
  }
  if (category==='supplier') {
    body.payee_supplier_id = document.getElementById('pm_supplier').value;
    if (!body.payee_supplier_id) return showErr('pm_err','Select a supplier');
  }
  if (category==='rent') {
    body.rent_month = document.getElementById('pm_rentmonth').value;
    if (!body.rent_month) return showErr('pm_err','Select a rent month');
  }
  if (['sack','other','transport_to_market'].includes(category)) body.payee_name = document.getElementById('pm_payee').value.trim();
  if (_paymentSavingR) return;
  _paymentSavingR = true;
  const btn = document.getElementById('pm_save');
  btn.disabled=true; btn.textContent='⏳ Recording…';
  try {
    await api('POST','/reconciliation/payments',body);
    closePayModal();
    await loadAll();
    showToast('Payment recorded ✓');
  } catch(e) {
    showErr('pm_err',e.error||'Failed to record payment');
  } finally {
    _paymentSavingR = false;
    btn.disabled=false; btn.textContent='Record Payment';
  }
}

// ── Add rent month ────────────────────────────────────────────────────────────
async function openAddRentMonth() {
  const _n = new Date(); document.getElementById('rm_month').value = `${_n.getFullYear()}-${String(_n.getMonth()+1).padStart(2,'0')}`;
  await loadGlobalConfig();
  document.getElementById('rm_amount').value = getConfig('rent_allocation','');
  showErr('rm_err','');
  document.getElementById('rentModal').style.display='flex';
}

async function saveRentMonth() {
  if (_rentSavingR) return;
  showErr('rm_err','');
  const month      = document.getElementById('rm_month').value;
  const amount_due = parseFloat(document.getElementById('rm_amount').value);
  if (!month) return showErr('rm_err','Select a month');
  if (isNaN(amount_due)||amount_due<=0) return showErr('rm_err','Enter valid amount');
  _rentSavingR = true;
  const btn = document.querySelector('#rentModal .btn-primary');
  if (btn) { btn.disabled=true; btn.textContent='⏳ Saving…'; }
  try {
    await api('POST','/reconciliation/rent-months',{month,amount_due});
    document.getElementById('rentModal').style.display='none';
    await loadAll();
    showToast('Rent month added ✓');
  } catch(e) {
    showErr('rm_err',e.error||'Failed to save rent month');
  } finally {
    _rentSavingR = false;
    if (btn) { btn.disabled=false; btn.textContent='Add Rent Month'; }
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
init().then(() => applyMonth());
</script>
