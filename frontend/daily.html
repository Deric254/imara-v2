.section { display:none; } .section.active { display:block; }
.item-row { display:grid; grid-template-columns:1fr 1fr auto; gap:.75rem; align-items:end; margin-bottom:.75rem; }
.add-item-btn { background:var(--g50); border:1px dashed var(--g300,#70cfa4); border-radius:var(--radius-sm);
                width:100%; padding:.6rem; font-family:var(--font); font-size:.85rem; color:var(--g700);

               padding:.85rem 1rem; margin:1rem 0; font-size:.85rem; }

/* Autocomplete styles */
.suggestions-dropdown {
  font-family: var(--font);
  font-size: 0.85rem;
}

.suggestion-item {

}

.suggestion-item:last-child {

.suggestion-item strong {

// ── Global submission locks — ONE active submission at a time, period ────────
// These are set TRUE the moment a submit starts and only cleared AFTER the form
// is fully wiped AND the tab has reloaded. A fast user cannot trigger a second
// submit because the lock check happens at the very top of each function.
let _purchaseSubmitting = false;
let _productionSubmitting = false;
let _saleSubmitting = false;

// ── Real-time warning cache & debounce ──────────────────────────────────────
// Cache gauge stock so we don't hit the API on every keystroke
let _gaugeStockCache = null;
let _gaugeStockExpiry = 0;
const GAUGE_CACHE_MS = 8000; // refresh every 8 seconds max

async function getGaugeStockCached() {
  if (_gaugeStockCache && Date.now() < _gaugeStockExpiry) return _gaugeStockCache;
  try {
    _gaugeStockCache = await api('GET', '/daily/gauge-stock');
    _gaugeStockExpiry = Date.now() + GAUGE_CACHE_MS;
  } catch(e) { _gaugeStockCache = _gaugeStockCache || []; }
  return _gaugeStockCache || [];
}

// Cache available inventory for sales check
let _invCache = null;
let _invCacheExpiry = 0;
const INV_CACHE_MS = 8000;

async function getAvailableInventoryCached() {
  if (_invCache && Date.now() < _invCacheExpiry) return _invCache;
  try {
    _invCache = await api('GET', '/daily/available-inventory');
    _invCacheExpiry = Date.now() + INV_CACHE_MS;
  } catch(e) { _invCache = _invCache || []; }
  return _invCache || [];
}

// Invalidate caches after a successful save so next check is fresh
// Disable Save Production if any gauge has insufficient wire.
// Reads the warning divs that calcWireNeeded already populated — no extra fetch.
function _updateProdSubmitBtn() {
  const btn = document.querySelector('button[onclick="submitProduction()"]');
  if (!btn) return;
  let hasInsufficient = false;
  document.querySelectorAll('#pr_items .pr-item-gauge').forEach(gaugeEl => {
    const row = gaugeEl.closest('[data-pr-row]') || gaugeEl.closest('div');
    if (!row) return;
    const warnEl = row.querySelector('.pr-wire-warn');
    if (warnEl && warnEl.textContent.includes('⚠')) hasInsufficient = true;
  });
  // Also check the summary availability div if present
  const availDiv = document.getElementById('pr_availability');
  if (availDiv && availDiv.textContent.includes('⚠ Insufficient')) hasInsufficient = true;

  btn.disabled = hasInsufficient;
  btn.title = hasInsufficient
    ? 'Insufficient wire stock — buy more wire before saving this production'
    : '';
}

function invalidateStockCaches() {
  _gaugeStockCache = null; _gaugeStockExpiry = 0;
  _invCache = null; _invCacheExpiry = 0;
}

// ── Wire batch selection (rule 4: real per-batch landing costs) ────────────
let _batchCache = {};        // gauge -> { ts, batches }
let _selectedBatchByGauge = {}; // gauge -> purchase_id chosen in the dropdown
const BATCH_CACHE_MS = 8000;

async function getBatchesForGauge(gauge) {
  const key = gauge || '';
  const c = _batchCache[key];
  if (c && Date.now() < c.ts) return c.batches;
  let batches = [];
  try { batches = await api('GET', `/daily/batches?gauge=${encodeURIComponent(key)}`); } catch(e) { batches = []; }
  _batchCache[key] = { ts: Date.now() + BATCH_CACHE_MS, batches };
  return batches;
}

function invalidateBatchCache() {
  _batchCache = {};
}

// "" = no preference (cascade). Any id = deliberate pick (single batch only).
function onBatchSelectChange(gauge, value) {
  if (value === '') {
    delete _selectedBatchByGauge[gauge];
  } else {
    _selectedBatchByGauge[gauge] = parseInt(value);
  }
  calcOverhead();
}

// Mirrors backend exactly: no batch chosen → cascade all batches FIFO; batch chosen → that batch only, no fallback.
function simulateCascade(batches, preferredId, kgNeeded) {
  let drawOrder = batches;
  if (preferredId) {
    const idx = batches.findIndex(b => b.id === preferredId);
    if (idx !== -1) drawOrder = [batches[idx]];
  }

  let need = kgNeeded;
  const draws = [];
  for (const b of drawOrder) {
    if (need <= 0.001) break;
    const take = Math.min(b.kgs_remaining, need);
    if (take <= 0.001) continue;
    draws.push({ batch: b, kgs_drawn: take });
    need -= take;
  }
  const covered = kgNeeded - Math.max(need, 0);
  const totalCost = draws.reduce((s, d) => s + d.kgs_drawn * d.batch.landed_cost_per_kg, 0);
  return {
    draws,
    shortBy: Math.max(need, 0),
    blendedRate: covered > 0.001 ? totalCost / covered : 0,
  };
}

// Generic debounce
function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

// Tab switching
function switchTab(name) {
  _activeTab = name;
  pg.querySelectorAll('.tab,.section').forEach(e => e.classList.remove('active'));
  pg.querySelector(`#tab-${name}`).classList.add('active');
  const tabs = ['purchases','production','sales'];
  pg.querySelectorAll('.tab').forEach((t,i) => { if (tabs[i]===name) t.classList.add('active'); });
  loadTabData(name);
}

// Live purchase summary
['p_kgs','p_cost_kg','p_transport'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', () => {
    const kgs = parseFloat(document.getElementById('p_kgs').value)||0;
    const cpk = parseFloat(document.getElementById('p_cost_kg').value)||0;
    const tr  = parseFloat(document.getElementById('p_transport').value)||0;
    if (kgs>0||cpk>0) {
      const total  = kgs*cpk+tr;
      const landed = kgs>0 ? total/kgs : 0;
      document.getElementById('p_total_cost').textContent = fmtMoney(total);
      document.getElementById('p_landed').textContent     = fmtMoney(landed);
      document.getElementById('p_summary').style.display  = 'block';
    }
  });
});

  const gauges = (getConfig('wire_gauges') || '12,14,16').split(',').map(g => g.trim());
  const gaugeOptions = gauges.map(g =>
    `<option value="${g}" ${g === defaultGauge ? 'selected' : ''}>${g}</option>`
  ).join('');
  div.innerHTML=`
    <div class="form-group" style="margin:0">
      <label class="label">Piece Type</label>
      <select class="input pr-piece" onchange="calcWireNeeded()">${pieceTypes.map(p=>`<option value="${p.id}">${escHtml(p.name)}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin:0">
      <label class="label">Pieces Produced</label>
      <input class="input pr-qty" type="number" min="0" step="1" placeholder="0" oninput="calcWireNeeded()">
    </div>
    <div class="form-group" style="margin:0">
      <label class="label">Wire Gauge</label>
      <select class="input pr-item-gauge" onchange="calcWireNeeded()">${gaugeOptions}</select>
    </div>
    <button class="remove-btn" onclick="document.getElementById('prItem_${prItemCount}').remove();calcWireNeeded()">✕</button>`;
  document.getElementById('pr_items').appendChild(div);
  // Wire quantity input to live overhead calculator
  div.querySelector('.pr-qty').addEventListener('input', calcWireNeeded);
  div.querySelector('.pr-piece').addEventListener('change', calcWireNeeded);
  div.querySelector('.pr-item-gauge').addEventListener('change', calcWireNeeded);
  calcWireNeeded();
}

// Calculate wire needed based on pieces produced — uses cache for real-time warnings
function calcWireNeeded() {
  const itemEls = document.querySelectorAll('#pr_items .item-row');
  let totalExpectedKgs = 0;
  // Also build per-gauge totals for the live stock warning
  const perGauge = {};

  itemEls.forEach(el => {
    const qty = parseInt(el.querySelector('.pr-qty').value) || 0;
    const pieceId = el.querySelector('.pr-piece').value;
    const pt = pieceTypes.find(p=>p.id==pieceId);
    const gauge = el.querySelector('.pr-item-gauge')?.value || document.getElementById('pr_gauge')?.value || '';
    if (pt && qty > 0) {
      const kgs = qty * pt.weight_kg;
      totalExpectedKgs += kgs;
      perGauge[gauge] = (perGauge[gauge] || 0) + kgs;
    }
  });

  // Auto-fill wire used field with expected amount
  const wireInput = document.getElementById('pr_kgs');
  const wireNote  = document.getElementById('pr_wire_note');
  if (totalExpectedKgs > 0) {
    wireInput.value = totalExpectedKgs.toFixed(2);
    wireNote.textContent = `Deducting: ${totalExpectedKgs.toFixed(2)} kg across ${Object.keys(perGauge).length} gauge(s)`;
  } else {
    wireInput.value = '';
    wireNote.textContent = 'Calculated from pieces produced';
  }

  // Run once with cached data now, again after renderBatchSelectors resolves
  // (when _batchCache first populates for a new gauge).
  calcOverhead();

  // Update Save Production button state based on live wire availability
  _updateProdSubmitBtn();
  // Show live gauge-specific availability — debounced, uses cache
  _calcWireWarningDebounced(perGauge);
  // Debounced: renderBatchSelectors does an async fetch + innerHTML rebuild.
  // Calling it directly on every 'input' keystroke (e.g. typing a quantity)
  // fired one overlapping async chain per character, with no cancellation —
  // the stacked chains racing to rewrite the same DOM node is what caused
  // the intermittent freeze on this tab. Debouncing lets only the last
  // keystroke in a burst actually trigger the fetch/render.
  _renderBatchSelectorsDebounced(perGauge);
}

// Render one FIFO-defaulted, manually-overridable batch dropdown per gauge in use.
// This is the "Selection Dropdown" required by rule 4 — production must draw
// from a SPECIFIC purchase batch so its real landed cost (no averaging) is used.
async function renderBatchSelectors(perGauge) {
  const wrap = document.getElementById('pr_batch_selectors');
  if (!wrap) return;
  const gauges = Object.keys(perGauge).filter(g => perGauge[g] > 0);
  if (!gauges.length) { wrap.style.display = 'none'; return; }

  // Preserve current dropdown picks before rebuild ("" parses to NaN, skipped).
  wrap.querySelectorAll('select[data-gauge]').forEach(sel => {
    const g = sel.dataset.gauge;
    const v = parseInt(sel.value);
    if (g && v) _selectedBatchByGauge[g] = v;
  });

  const blocks = await Promise.all(gauges.map(async gauge => {
    const batches = await getBatchesForGauge(gauge);
    if (!batches.length) {
      delete _selectedBatchByGauge[gauge];
      return `<div style="font-size:.75rem;color:var(--red);margin-bottom:.35rem">No wire batches available for gauge ${escHtml(gauge||'—')}.</div>`;
    }
    // Never default to a batch id here — that would be read downstream as a deliberate pick.
    if (_selectedBatchByGauge[gauge] && !batches.some(b => b.id === _selectedBatchByGauge[gauge])) {
      delete _selectedBatchByGauge[gauge];
    }
    const hasChoice = !!_selectedBatchByGauge[gauge];
    const opts = `<option value="" ${!hasChoice ? 'selected' : ''}>Auto batch</option>` +
      batches.map(b => `<option value="${b.id}" ${hasChoice && b.id===_selectedBatchByGauge[gauge]?'selected':''}>
      ${escHtml(b.label)} — ${fmt(b.kgs_remaining,1)} kg left @ KES ${fmt(b.landed_cost_per_kg,2)}/kg
    </option>`).join('');
    return `<div style="margin-bottom:.35rem">
      <label class="label" style="font-size:.72rem">Preferred Wire Batch — Gauge ${escHtml(gauge||'—')} <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <select class="input" style="font-size:.8rem" data-gauge="${escHtml(gauge)}" onchange="onBatchSelectChange('${gauge}', this.value)">${opts}</select>
    </div>`;
  }));

  wrap.innerHTML = blocks.join('');
  wrap.style.display = 'block';
}

const _renderBatchSelectorsDebounced = debounce((perGauge) => {
  renderBatchSelectors(perGauge).then(() => calcOverhead());
}, 300);

const _calcWireWarningDebounced = debounce(async function(perGauge) {
  const statusDiv = document.getElementById('pr_material_status');
  if (!statusDiv) return;
  const gauges = Object.keys(perGauge);
  if (!gauges.length) {
    statusDiv.style.display = 'none';
    return;
  }
  try {
    const gaugeStock = await getGaugeStockCached();
    const lines = [];
    for (const gauge of gauges) {
      const needed = perGauge[gauge];
      const gs = (gaugeStock || []).find(g => g.gauge === gauge);
      const available = gs ? parseFloat(gs.kgs_stock) : 0;
      if (available <= 0) {
        lines.push(`<span style="color:var(--red)">❌ Gauge ${gauge}: No wire in stock (need ${needed.toFixed(2)} kg). Buy wire first.</span>`);
      } else if (needed > available + 0.001) {
        lines.push(`<span style="color:var(--red)">⚠ Gauge ${gauge}: ${available.toFixed(2)} kg available, ${needed.toFixed(2)} kg needed</span>`);
      } else {
        lines.push(`<span style="color:var(--g600)">✅ Gauge ${gauge}: ${available.toFixed(2)} kg available, ${needed.toFixed(2)} kg needed</span>`);
      }
    }
    statusDiv.innerHTML = lines.join('<br>');
    statusDiv.style.display = 'block';
  } catch(e) { statusDiv.style.display = 'none'; }
}, 280);

// Load reference data
async function loadRefs() {
  PageProgress.show(10, 'Loading form data…');
  showPageLoader('Loading data…');
  try {
    await loadGlobalConfig();

    const [costInputsResult, suppliersResult, pieceTypesResult, productionStaffResult] = await Promise.allSettled([
      api('GET','/daily/production-cost-inputs'),
      api('GET','/suppliers'),
      api('GET','/piece-types'),
      api('GET','/workers'),
    ]);

    _prodRates = costInputsResult.status === 'fulfilled' && costInputsResult.value
      ? costInputsResult.value
      : _prodRates;
    suppliers = suppliersResult.status === 'fulfilled' ? (suppliersResult.value || []) : [];
    pieceTypes = pieceTypesResult.status === 'fulfilled' ? (pieceTypesResult.value || []) : [];
    productionStaff = productionStaffResult.status === 'fulfilled' ? (productionStaffResult.value || []) : [];

    const supSel = document.getElementById('p_supplier');
    supSel.innerHTML = suppliers.length
      ? suppliers.map(s=>`<option value="${s.id}">${escHtml(s.name)}</option>`).join('')
      : '<option value="">— no suppliers —</option>';

    const gaugeSel = document.getElementById('p_gauge');
    const gauges = (getConfig('wire_gauges') || '12,14,16').split(',');
    gaugeSel.innerHTML = gauges.map(g=>`<option value="${g.trim()}">${g.trim()}</option>`).join('');
    const prGaugeSel = document.getElementById('pr_gauge');
    if (prGaugeSel) {
      prGaugeSel.innerHTML = gauges.map(g=>`<option value="${g.trim()}">${g.trim()}</option>`).join('');
      // When the default gauge changes, invalidate cache and update rows that were using the old default
      prGaugeSel.addEventListener('change', () => {
        _gaugeStockCache = null; _gaugeStockExpiry = 0;
        // Update per-row gauge selectors that haven't been manually changed (i.e., still match old default)
        document.querySelectorAll('#pr_items .pr-item-gauge').forEach(sel => {
          sel.value = prGaugeSel.value;
        });
        calcWireNeeded();
      });
    }

    // Load customer names for autocomplete and seed the first sale row
    loadCustomers();
    // Seed the first item row now that pieceTypes is loaded
    if (!document.querySelector('#sale_items_container > div')) {
      _saleRowCount = 0;
      addSaleItemRow();
    }

    [document.getElementById('pr_operator'),document.getElementById('pr_knuckler')].forEach(sel=>{
      sel.innerHTML='<option value="">— select —</option>'+
        productionStaff.map(w=>`<option value="${w.id}">${escHtml(w.full_name)}</option>`).join('');
    });

    // Populate default values from config — updateConfigField now sets .value (not just placeholder)
    updateConfigField('p_cost_kg', 'cost_per_kg', '0.00');
    updateConfigField('p_transport', 'transport_cost', '0');

    // If kgs already entered, re-fire live calc so summary shows immediately
    const kgsEl = document.getElementById('p_kgs');
    if (kgsEl && parseFloat(kgsEl.value) > 0) {
      kgsEl.dispatchEvent(new Event('input'));
    }

    calcOverhead();

    if (document.getElementById('pr_items').children.length===0) addPrItem();
    // Initialize wire calculation
    calcWireNeeded();

    if (
      costInputsResult.status === 'rejected' ||
      suppliersResult.status === 'rejected' ||
      pieceTypesResult.status === 'rejected' ||
      productionStaffResult.status === 'rejected'
    ) {
      console.error('loadRefs partial failure:', {
        costInputs: costInputsResult.status,
        suppliers: suppliersResult.status,
        pieceTypes: pieceTypesResult.status,
        workers: productionStaffResult.status,
      });
      showToast('Some form data could not be loaded. Available data is still usable.','error');
      PageProgress.done();
    }
  } catch(e) {
    console.error('loadRefs error:',e);
    PageProgress.error();
    showToast('Failed to load form data','error');
  } finally {
    hidePageLoader();
    PageProgress.done();
  }
}

async function deleteRecord(type, id) {
  const labels = { purchases: 'purchase', production: 'production record', sales: 'sale' };

  // Build context-specific confirmation with implications
  let confirmMsg = '';
  if (type === 'sales') {
    const row = (window._lastSales || []).find(r => r.id === id);
    confirmMsg = `Delete this sale?\n\n`;
    if (row) {
      confirmMsg += `Product: ${row.piece_name || '—'}\n`;
      confirmMsg += `Quantity: ${row.quantity} pieces\n`;
      confirmMsg += `Revenue: KES ${parseFloat(row.revenue || 0).toLocaleString()}\n`;
      confirmMsg += `Buyer: ${row.buyer_name || 'Walk-in'}\n`;
      confirmMsg += `\n⚠️  Implications:\n`;
      confirmMsg += `• The sold stock will be restored to inventory\n`;
      confirmMsg += `• Its auto-generated invoice will be reversed and kept for your records (if unpaid)\n`;
      confirmMsg += `• If the invoice has payments already collected, deletion will be blocked\n`;
    }
    confirmMsg += `\nThis cannot be undone. Proceed?`;
  } else if (type === 'production') {
    const row = (window._lastProduction || []).find(r => r.id === id);
    confirmMsg = `Delete this production record?\n\n`;
    if (row) {
      confirmMsg += `Date: ${row.entry_date || '—'}\n`;
      confirmMsg += `Wire Used: ${row.kgs_used} kg\n`;
      confirmMsg += `\n⚠️  Implications:\n`;
      confirmMsg += `• All pieces produced in this batch will be removed from inventory\n`;
      confirmMsg += `• Deletion will be blocked if any pieces from this batch have been sold\n`;
    }
    confirmMsg += `\nThis cannot be undone. Proceed?`;
  } else if (type === 'purchases') {
    const row = (window._lastPurchases || []).find(r => r.id === id);
    confirmMsg = `Delete this purchase record?\n\n`;
    if (row) {
      confirmMsg += `Supplier: ${row.supplier_name || '—'}\n`;
      confirmMsg += `Wire Bought: ${row.kgs_bought} kg\n`;
      confirmMsg += `\n⚠️  Implications:\n`;
      confirmMsg += `• This wire will be removed from raw material stock\n`;
      confirmMsg += `• Deletion will be blocked if this wire has already been used in production\n`;
    }
    confirmMsg += `\nThis cannot be undone. Proceed?`;
  } else {
    confirmMsg = `Delete this ${labels[type]}? This cannot be undone.`;
  }

  if (!(await appConfirm(confirmMsg))) return;

  // ── Pre-flight checks before hitting the server ──────────────────────────────
  // For purchases: check locally whether this wire gauge has been used in production.
  // If it has, we know the delete will be blocked — tell the user now without a
  // wasted round-trip or a confusing server error message.
  if (type === 'purchases') {
    const purchaseRow = (window._lastPurchases || []).find(r => r.id === id);
    if (purchaseRow) {
      const gauge = (purchaseRow.gauge || '').trim();
      // Find all production records that used this same gauge
      const prodUsingGauge = (window._lastProduction || []).filter(p =>
        (p.gauge || '').trim() === gauge && parseFloat(p.kgs_used) > 0
      );
      if (prodUsingGauge.length > 0) {
        const gLabel = gauge ? `Gauge ${gauge}` : 'This gauge';
        const totalUsed = prodUsingGauge.reduce((s,p) => s + parseFloat(p.kgs_used||0), 0);
        showToast(
          `Cannot delete: ${gLabel} wire has already been used in ${prodUsingGauge.length} production record(s) totalling ${totalUsed.toFixed(1)} kg. Delete those production records first.`,
          'error', 10000
        );
        return;
      }
    }
  }

  // For production records: check locally whether any pieces from this record were sold.
  if (type === 'production') {
    const prodRow = (window._lastProduction || []).find(r => r.id === id);
    if (prodRow && prodRow.items) {
      const soldItems = (window._lastSales || []).filter(s =>
        prodRow.items.some(item => item.piece_type_id === s.piece_type_id)
      );
      if (soldItems.length > 0) {
        showToast(
          `Cannot delete: pieces produced in this batch have already been sold (${soldItems.length} sale record(s)). Delete those sales first.`,
          'error', 10000
        );
        return;
      }
    }
  }

  try {
    const result = await api('DELETE', `/daily/${type}/${id}`);
    showToast(result.message || 'Deleted successfully', 'success', 5000);
    // Production delete may return cost warnings (accrued wages not reversed)
    if (result.cost_warnings && result.cost_warnings.length) {
      result.cost_warnings.forEach((w, i) =>
        setTimeout(() => showToast('⚠️ Cost note: ' + w, 'warn', 8000), (i+1)*1000)
      );
    }
    loadTabData(_activeTab);
  } catch(e) {
    // This should rarely fire now that pre-flight catches most cases.
    // If it does, show the server's exact message — it's always human-readable.
    const msg = e.error === 'INTEGRITY_VIOLATION'
      ? (e.message || 'This record cannot be deleted — it is linked to other data. Please refresh and check.')
      : (e.error || e.message || 'Delete failed. Please refresh and try again.');
    showToast(msg, 'error', 10000);
  }
}

function exportDailyCSV(type) {
  const d = document.getElementById('entryDate').value;
  let headers, rows, filename;

  if (type === 'purchases') {
    const data = window._lastPurchases;
    if (!data || !data.length) return;
    headers = ['Batch', 'Supplier', 'Kgs', 'Remaining', 'Cost/kg', 'Transport', 'Total', 'Landed/kg', 'Entered By'];
    rows = data.map(r => [r.batch_name || '—', r.supplier_name, r.kgs_bought, r.kgs_remaining, r.cost_per_kg, r.transport_cost, r.total_cost, r.landed_cost_per_kg, r.entered_by_name]);
    filename = `purchases_${d}`;
  } else if (type === 'production') {
    const data = window._lastProduction;
    if (!data || !data.length) return;
    headers = ['Kgs Used', 'Gauge', 'Batches Used', 'Wire Cost/kg (blended)', 'Operator', 'Knuckler', 'Pieces Produced', 'Total Cost', 'Entered By'];
    rows = data.map(r => [
      r.kgs_used,
      r.gauge || '—',
      (r.batches && r.batches.length)
        ? r.batches.map(b => `${b.batch_label} (${b.kgs_drawn.toFixed(2)}kg @ ${b.landed_cost_per_kg})`).join('; ')
        : (r.batch_name || (r.purchase_id ? `Batch #${r.purchase_id}` : '—')),
      r.wire_cost_per_kg != null ? r.wire_cost_per_kg : '—',
      r.operator_name || '—', 
      r.knuckler_name || '—', 
      (r.items || []).map(i => `${i.piece_name}: ${i.pieces_produced}`).join('; '),
      r.total_cost,
      r.entered_by_name
    ]);
    filename = `production_${d}`;
  } else if (type === 'orders') {
    const data = window._lastOrders;
    if (!data || !data.length) return;
    headers = ['Date', 'Buyer', 'Items', 'Status'];
    rows = data.map(o => [
      o.order_date,
      o.buyer_name,
      (o.items || []).map(it => `${it.piece_name} x ${it.quantity}`).join('; ') || '—',
      o.status === 'pending' ? 'Pending' : o.status === 'converted' ? 'Finalized' : 'Cancelled'
    ]);
    filename = `orders_${d}`;
  } else {
    const data = window._lastSales;
    if (!data || !data.length) return;
    headers = ['Piece', 'Qty', 'Price', 'Revenue', 'Kgs Sold', 'Meters Sold', 'Entered By'];
    rows = data.map(r => [
      r.piece_name, 
      r.quantity, 
      r.selling_price, 
      r.revenue, 
      r.kgs_sold, 
      r.meters_sold,
      r.entered_by_name
    ]);
    filename = `sales_${d}`;
  }

  downloadCSV(filename, headers, rows);
}

function calcOverhead() {
  const rates = _prodRates;
  if (!rates) return;
  const itemEls = document.querySelectorAll('#pr_items .item-row');
  let totalPieces = 0;
  let totalSacks = 0;
  let expectedKgs = 0;
  const perGaugeKgs = {};

  itemEls.forEach(el => {
    const qty = parseInt(el.querySelector('.pr-qty').value) || 0;
    if (qty > 0) {
      totalPieces += qty;
      totalSacks += qty * 2;
      const pieceId = el.querySelector('.pr-piece').value;
      const pt = pieceTypes.find(p => p.id == pieceId);
      const gauge = el.querySelector('.pr-item-gauge')?.value || document.getElementById('pr_gauge')?.value || '';
      if (pt) {
        const kgs = qty * pt.weight_kg;
        expectedKgs += kgs;
        perGaugeKgs[gauge] = (perGaugeKgs[gauge] || 0) + kgs;
      }
    }
  });

  const kgsUsed = parseFloat(document.getElementById('pr_kgs').value) || 0;

  // Wire cost must ALWAYS come from real purchase batch data — never from the
  // config average rate. If no pieces are entered yet, or batches haven't
  // loaded from the API yet, hide the summary and return. The async
  // renderBatchSelectors().then(() => calcOverhead()) call will re-run this
  // once real data is available.
  let wireCost = 0, wireCostLabel = '';
  const gaugeKeys = Object.keys(perGaugeKgs);
  if (!gaugeKeys.length) {
    // No pieces entered — nothing to show yet
    document.getElementById('pr_summary').style.display = 'none';
    return;
  }
  const parts = [];
  let shortfall = null; // honest blocker message, set the moment a gauge can't actually be covered
  for (const gauge of gaugeKeys) {
    const kg = perGaugeKgs[gauge];
    const batches = (_batchCache[gauge] && _batchCache[gauge].batches) || [];
    if (!batches.length) {
      // Batch fetch still in-flight — wait for the async callback
      document.getElementById('pr_summary').style.display = 'none';
      return;
    }
    const sim = simulateCascade(batches, _selectedBatchByGauge[gauge], kg);
    if (sim.shortBy > 0.001) {
      // Don't price the uncovered kg — show the real blocker instead.
      const chosenId = _selectedBatchByGauge[gauge];
      shortfall = chosenId
        ? `Insufficient wire. Pick another batch or deselect.`
        : `Insufficient wire for this gauge.`;
      break;
    }
    wireCost += sim.blendedRate * kg;
    parts.push(`${fmtMoney(sim.blendedRate)}/kg×${fmt(kg,1)}kg`);
  }

  document.getElementById('pr_total_pieces').textContent = totalPieces || '—';
  document.getElementById('pr_expected_kgs').textContent = fmt(expectedKgs, 2) + ' kg';

  const el = document.getElementById('pr_overhead');
  if (el) {
    if (shortfall) {
      el.innerHTML = `<div style="color:var(--red);font-size:.82rem">⚠️ ${shortfall}</div>`;
    } else {
      wireCostLabel = parts.join(' + ');
      const opCost = rates.operator_rate * totalPieces;
      const knCost = rates.knuckler_rate * totalPieces;
      const sackCost = rates.sack_rate * totalSacks;
      const total = wireCost + opCost + knCost + sackCost;
      el.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr auto;gap:.15rem .5rem;font-size:.82rem">
          <span style="color:var(--muted)" title="Per-batch landed cost">Total wire cost (${wireCostLabel})</span><span class="mono">${fmtMoney(wireCost)}</span>
          <span style="color:var(--muted)">Operator (${fmtMoney(rates.operator_rate)} × ${totalPieces} pcs)</span><span class="mono">${fmtMoney(opCost)}</span>
          <span style="color:var(--muted)">Knuckler (${fmtMoney(rates.knuckler_rate)} × ${totalPieces} pcs)</span><span class="mono">${fmtMoney(knCost)}</span>
          <span style="color:var(--muted)">Sacks (${fmtMoney(rates.sack_rate)} × ${totalSacks} sacks)</span><span class="mono">${fmtMoney(sackCost)}</span>
          <span style="font-weight:600;border-top:1px solid var(--border);padding-top:.2rem">Total production cost</span>
          <span class="mono" style="font-weight:600;border-top:1px solid var(--border);padding-top:.2rem">${fmtMoney(total)}</span>
        </div>`;
    }
    document.getElementById('pr_summary').style.display = 'block';
  }
}

// Submit purchase
async function submitPurchase() {
  // LOCK: if already submitting, ignore all clicks — even from keyboard Enter spam
  if (_purchaseSubmitting) return;
  showErr('p_err','');

  const d            = document.getElementById('entryDate').value;
  const supplier_id  = parseInt(document.getElementById('p_supplier').value);
  const kgs_bought   = parseFloat(document.getElementById('p_kgs').value);
  const cost_per_kg  = parseFloat(document.getElementById('p_cost_kg').value);
  const transport_cost = parseFloat(document.getElementById('p_transport').value)||0;
  const gauge          = document.getElementById('p_gauge').value;
  const batch_name      = document.getElementById('p_batch_name').value.trim();

  // Validate first — before locking, so user can correct errors freely
  if (!supplier_id)                        return showErr('p_err','Select a supplier');
  if (isNaN(kgs_bought)||kgs_bought <= 0)  return showErr('p_err','Enter valid Kgs (must be > 0)');
  if (isNaN(cost_per_kg)||cost_per_kg < 0) return showErr('p_err','Enter valid cost per kg');

  // Acquire lock and disable button simultaneously
  _purchaseSubmitting = true;
  const purchaseBtn = document.querySelector('button[onclick="submitPurchase()"]');
  if (purchaseBtn) { purchaseBtn.disabled = true; purchaseBtn.textContent = '⏳ Saving…'; }

  try {
    await api('POST','/daily/purchases',{entry_date:d,supplier_id,kgs_bought,cost_per_kg,transport_cost,gauge,batch_name});
    _prodRates = await api('GET','/daily/production-cost-inputs');
    invalidateStockCaches(); // fresh stock data for next entry
    invalidateBatchCache();  // new batch now available for production selection

    // Clear the form BEFORE re-enabling — user sees blank form, not the old values
    document.getElementById('p_kgs').value = '';
    document.getElementById('p_transport').value = '0';
    document.getElementById('p_batch_name').value = '';
    updateConfigField('p_cost_kg', 'cost_per_kg', '0.00');
    document.getElementById('p_summary').style.display = 'none';
    showErr('p_err','');

    // Reload list so user sees the entry just saved
    await loadTabData('purchases');

    if (typeof BroadcastChannel !== 'undefined') {
      new BroadcastChannel('daily_entry_updates').postMessage({ type: 'purchases', date: d });
    }
    // Push activity notification to bell
    const kgsLabel = `${kgs_bought} kg @ KES ${parseFloat(cost_per_kg).toLocaleString()}/kg`;
    api('POST', '/notifications', {
      type: 'info', category: 'purchases',
      title: `Wire Purchase Recorded — ${d}`,
      message: `${kgsLabel} (Gauge ${gauge || 'unset'}) entered by ${window._currentUser?.full_name || 'staff'}.`,
      roleTarget: 'owner',
    }).catch(() => {});
    if (typeof _loadGlobalNotifs === 'function') setTimeout(_loadGlobalNotifs, 600);
    showToast('✅ Purchase saved successfully');
  } catch(e){
    showErr('p_err',e.error||(e.errors&&e.errors[0]?.msg)||'Failed to save purchase. Please try again.');
  } finally {
    // Release lock and re-enable ONLY after form is clear and list has reloaded
    _purchaseSubmitting = false;
    if (purchaseBtn) { purchaseBtn.disabled = false; purchaseBtn.textContent = 'Save Purchase'; }
  }
}

// Rename a batch any time — the default name is just a starting point
async function renameBatch(btn) {
  const id = parseInt(btn.dataset.id);
  const current = btn.dataset.name || '';
  const next = prompt('Batch name:', current);
  if (next === null || next.trim() === current) return; // cancelled or unchanged
  try {
    await api('PUT', `/daily/purchases/${id}/batch-name`, { batch_name: next.trim() });
    invalidateBatchCache();
    showToast('✅ Batch renamed');
    loadTabData('purchases');
  } catch(e) {
    showToast(e.error || (e.errors && e.errors[0]?.msg) || 'Could not rename batch', 'error');
  }
}

// Submit production with integrity checks — supports mixed gauges in one session.
// Items are grouped by their per-row gauge, and one POST is fired per gauge group.
async function submitProduction() {
  // LOCK: block every re-entry — button, keyboard, any source — until fully done
  if (_productionSubmitting) return;
  showErr('pr_err','');

  const d           = document.getElementById('entryDate').value;
  const operator_id = parseInt(document.getElementById('pr_operator').value)||null;
  const knuckler_id = parseInt(document.getElementById('pr_knuckler').value)||null;
  const defaultGauge = document.getElementById('pr_gauge')?.value || '';

  // Validate BEFORE acquiring lock so errors stay responsive
  if (!operator_id) return showErr('pr_err','Select an operator — production cannot be saved without one');
  if (!knuckler_id) return showErr('pr_err','Select a knuckler — production cannot be saved without one');

  // Collect items and group by gauge
  const itemEls = document.querySelectorAll('#pr_items .item-row');
  const gaugeGroups = {}; // gauge → [{piece_type_id, pieces_produced, weight_kg}]
  itemEls.forEach(row => {
    const ptId  = parseInt(row.querySelector('.pr-piece').value);
    const qty   = parseInt(row.querySelector('.pr-qty').value) || 0;
    const gauge = row.querySelector('.pr-item-gauge')?.value || defaultGauge;
    if (ptId && qty > 0) {
      if (!gaugeGroups[gauge]) gaugeGroups[gauge] = [];
      const pt = pieceTypes.find(p => p.id == ptId);
      gaugeGroups[gauge].push({ piece_type_id: ptId, pieces_produced: qty, weight_kg: pt?.weight_kg || 0 });
    }
  });

  if (!Object.keys(gaugeGroups).length) return showErr('pr_err','Add at least one piece type with pieces produced');

  // No hard requirement to pick a batch here anymore — it's a PREFERENCE.
  // The backend FIFO-cascades through a gauge's batches automatically
  // (oldest first) if no preference is set, or if the preferred one alone
  // doesn't cover kgs_used. The aggregate stock check just below is the
  // real gate: it only blocks when the gauge genuinely doesn't have enough
  // wire in total, never because of "wrong batch."

  // Acquire lock + disable button
  _productionSubmitting = true;
  const prodBtn = document.querySelector('button[onclick="submitProduction()"]');
  if (prodBtn) { prodBtn.disabled = true; prodBtn.textContent = '⏳ Checking stock…'; }

  try {
    // Per-gauge stock pre-check (live, not cached)
    const gaugeStock = await api('GET', '/daily/gauge-stock');
    for (const [gauge, items] of Object.entries(gaugeGroups)) {
      const kgsNeeded = items.reduce((s, i) => s + i.pieces_produced * i.weight_kg, 0);
      const gs = (gaugeStock || []).find(g => g.gauge === gauge);
      const available = gs ? parseFloat(gs.kgs_stock) : 0;
      if (kgsNeeded > available + 0.001) {
        showErr('pr_err', `Insufficient wire for gauge ${gauge}. Available: ${available.toFixed(2)} kg, Needed: ${kgsNeeded.toFixed(2)} kg. Buy more wire of this gauge first.`);
        return;
      }
      // If a specific batch was chosen, it must cover kgsNeeded on its own.
      const chosenBatchId = _selectedBatchByGauge[gauge];
      if (chosenBatchId) {
        const batches = (_batchCache[gauge] && _batchCache[gauge].batches) || [];
        const chosen = batches.find(b => b.id === chosenBatchId);
        if (chosen && kgsNeeded > parseFloat(chosen.kgs_remaining) + 0.001) {
          const bLabel = chosen.label || ('Batch #' + chosen.id);
          showErr('pr_err', `${bLabel}: ${parseFloat(chosen.kgs_remaining).toFixed(2)} kg available, ${kgsNeeded.toFixed(2)} kg needed. Choose a different batch or deselect to use available stock.`);
          return;
        }
      }
    }

    if (prodBtn) prodBtn.textContent = '⏳ Saving…';

    // Submit one POST per gauge group — the backend handles each atomically,
    // charging the true FIFO-cascaded, weighted-average landed cost (rule 4).
    const gaugeList = Object.keys(gaugeGroups);
    for (const gauge of gaugeList) {
      const items = gaugeGroups[gauge];
      const kgsUsed = parseFloat(items.reduce((s, i) => s + i.pieces_produced * i.weight_kg, 0).toFixed(3));
      await api('POST', '/daily/production', {
        entry_date: d,
        kgs_used: kgsUsed,
        gauge,
        purchase_id: _selectedBatchByGauge[gauge],
        operator_id,
        knuckler_id,
        items: items.map(i => ({ piece_type_id: i.piece_type_id, pieces_produced: i.pieces_produced }))
      });
    }

    // Clear form BEFORE re-enabling
    document.getElementById('pr_kgs').value = '';
    document.getElementById('pr_items').innerHTML = '';
    document.getElementById('pr_material_status').style.display = 'none';
    document.getElementById('pr_batch_selectors').style.display = 'none';
    _selectedBatchByGauge = {};
    showErr('pr_err','');
    prItemCount = 0; addPrItem();

    invalidateStockCaches();
    invalidateBatchCache();
    await loadTabData('production');

    if (typeof BroadcastChannel !== 'undefined') {
      new BroadcastChannel('daily_entry_updates').postMessage({ type: 'production', date: d });
    }
    if (typeof _loadGlobalNotifs === 'function') setTimeout(_loadGlobalNotifs, 600);
    const gaugesSummary = gaugeList.length > 1 ? `(gauges: ${gaugeList.join(', ')})` : `(gauge ${gaugeList[0]})`;
    showToast(`✅ Production saved successfully ${gaugesSummary}`);
  } catch(e){
    showErr('pr_err', e.error||(e.errors&&e.errors[0]?.msg)||'Failed to save production. Please try again.');
  } finally {
    // Lock released + button re-enabled only after form cleared and list reloaded
    _productionSubmitting = false;
    if (prodBtn) { prodBtn.disabled = false; prodBtn.textContent = 'Save Production'; }
  }
}

// ── Sale Multi-Item Form ────────────────────────────────────────────────────
// Replaces the old queue model. One buyer, multiple item rows, one submit.
let _saleRowCount = 0;
// _saleSubmitting declared at top of script

function _makeGaugeOptions(selectedGauge) {
  return gaugeOptionsHtml(selectedGauge, { blankLabel: '— gauge —' });
}

// After a piece type is selected, patch the gauge <select> so zero-stock options
// are disabled and labelled — user cannot accidentally select an unavailable gauge.
async function _patchGaugeOptionsForPiece(rid, pieceTypeId) {
  const gaugeEl = document.getElementById(`srow_gauge_${rid}`);
  if (!gaugeEl || !pieceTypeId) return;
  try {
    const inv = await getAvailableInventoryCached();
    const availByGauge = {};
    (inv || []).filter(i => i.piece_type_id === pieceTypeId).forEach(i => {
      availByGauge[i.gauge] = (availByGauge[i.gauge] || 0) + i.available;
    });
    // NOTE: options are labelled but never disabled. Orders must be placeable
    // even when a gauge is fully out of stock (stock is only enforced at
    // Finalize/immediate-sale time, inside submitAllSales()) — a disabled
    // <option> can't be selected by the browser at all, which silently
    // blocked the "Save Order" (pending) path whenever every gauge was at
    // zero stock. Real stock integrity is untouched: it still gets checked,
    // just later, at the moment stock is actually committed.
    [...gaugeEl.options].forEach(opt => {
      if (!opt.value) return; // keep the placeholder
      const avail = availByGauge[opt.value] || 0;
      opt.disabled = false;
      opt.textContent = avail <= 0 ? `${opt.value} — OUT OF STOCK` : `${opt.value}  (${avail} in stock)`;
    });
  } catch(_) { /* non-fatal — UI degrades gracefully */ }
}

function _makePieceOptions(selectedId) {
  return `<option value="">— piece type —</option>` +
    pieceTypes.map(pt =>
      `<option value="${pt.id}" data-price="${pt.default_price != null ? pt.default_price : ''}" data-wt="${pt.weight_kg||0}" data-len="${pt.length_m||0}"${pt.id == selectedId ? ' selected' : ''}>${escHtml(pt.name)}</option>`
    ).join('');
}

function addSaleItemRow(prefill) {
  _saleRowCount++;
  const rid = _saleRowCount;
  const container = document.getElementById('sale_items_container');
  const div = document.createElement('div');
  div.id = `srow_${rid}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr 1fr 34px;gap:.5rem;align-items:start;margin-bottom:.6rem;';

  div.innerHTML = `
    <div>
      <select class="input" id="srow_pt_${rid}" onchange="onSaleRowPieceChange(${rid})" style="font-size:.84rem">
        ${_makePieceOptions(prefill && prefill.piece_type_id)}
      </select>
      <div id="srow_avail_${rid}" style="font-size:.72rem;margin-top:.2rem;min-height:1rem;color:var(--g600)"></div>
    </div>
    <select class="input" id="srow_gauge_${rid}" onchange="onSaleRowChange(${rid})" style="font-size:.84rem">
      ${_makeGaugeOptions(prefill && prefill.gauge_source)}
    </select>
    <input class="input" type="number" id="srow_qty_${rid}" min="1" step="1" placeholder="0"
      value="${prefill ? prefill.quantity : ''}" oninput="onSaleRowChange(${rid})" style="font-size:.84rem;text-align:right">
    <input class="input" type="number" id="srow_price_${rid}" min="0" step="0.01" placeholder="0.00"
      value="${prefill ? prefill.selling_price : ''}" oninput="onSaleRowChange(${rid})" style="font-size:.84rem;text-align:right">
    <button class="remove-btn" onclick="removeSaleItemRow(${rid})" title="Remove row" style="${_saleRowCount === 1 ? 'visibility:hidden' : ''}">✕</button>
  `;

  container.appendChild(div);

  // If prefill had a piece, trigger the piece-change to pre-fill price
  if (prefill && prefill.piece_type_id) {
    onSaleRowPieceChange(rid, true);
  }

  _updateRemoveButtons();
  calcSaleTotals();
}

function removeSaleItemRow(rid) {
  const el = document.getElementById(`srow_${rid}`);
  if (el) el.remove();
  _updateRemoveButtons();
  calcSaleTotals();
}

function _updateRemoveButtons() {
  const rows = document.querySelectorAll('#sale_items_container > div[id^="srow_"]');
  rows.forEach(row => {
    const btn = row.querySelector('.remove-btn');
    if (btn) btn.style.visibility = rows.length > 1 ? 'visible' : 'hidden';
  });
}

function onSaleRowPieceChange(rid, skipPriceOverwrite) {
  const sel = document.getElementById(`srow_pt_${rid}`);
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const priceEl = document.getElementById(`srow_price_${rid}`);
  if (priceEl && !skipPriceOverwrite) {
    if (opt && opt.value) {
      const defaultPrice = opt.dataset.price;
      priceEl.value = (defaultPrice !== '' && defaultPrice != null) ? parseFloat(defaultPrice).toFixed(2) : '';
    } else {
      priceEl.value = '';
    }
  }
  // Immediately disable zero-stock gauges for this piece type so the user
  // cannot accidentally select a gauge with no available inventory.
  const gaugeEl = document.getElementById(`srow_gauge_${rid}`);
  const ptId = opt && opt.value ? parseInt(opt.value) : 0;
  if (gaugeEl && ptId) {
    _patchGaugeOptionsForPiece(rid, ptId).then(() => {
      // After patching, default to the gauge with the most stock (if not already set)
      if (!gaugeEl.value) {
        getAvailableInventoryCached().then(inv => {
          if (gaugeEl.value) return;
          const matches = (inv || []).filter(i => i.piece_type_id === ptId && i.available > 0);
          if (!matches.length) return;
          const best = matches.reduce((a, b) => (b.available > a.available ? b : a));
          if ([...gaugeEl.options].some(o => o.value === best.gauge && !o.disabled)) {
            gaugeEl.value = best.gauge;
            onSaleRowChange(rid);
          }
        }).catch(() => {});
      }
    }).catch(() => {});
  }
  onSaleRowChange(rid);
}

async function onSaleRowChange(rid) {
  calcSaleTotals();
  const sel    = document.getElementById(`srow_pt_${rid}`);
  const gaugeEl = document.getElementById(`srow_gauge_${rid}`);
  const qtyEl  = document.getElementById(`srow_qty_${rid}`);
  const availDiv = document.getElementById(`srow_avail_${rid}`);
  if (!sel || !availDiv) return;
  const ptId  = parseInt(sel.value) || 0;
  const gauge = gaugeEl ? gaugeEl.value.trim() : '';
  const qty   = parseInt(qtyEl ? qtyEl.value : 0) || 0;
  if (!ptId || !gauge) {
    availDiv.textContent = '';
    if (qtyEl) qtyEl.removeAttribute('max');
    _updateSaleSubmitBtn();
    return;
  }
  try {
    const inv = await getAvailableInventoryCached();
    if (!document.getElementById(`srow_avail_${rid}`)) return; // row removed
    const match = (inv || []).find(i => i.piece_type_id === ptId && i.gauge === gauge);
    const avail = match ? match.available : 0;

    // NOTE: quantity is never capped or cleared based on stock here. That's
    // deliberate — this same row is used both for an immediate sale AND for
    // building a pending Order (which must be enterable with zero stock on
    // hand, so it can be finalized once stock exists — an advance booking).
    // The label below is informational only. Real stock protection for an
    // immediate sale doesn't live here at all: submitAllSales() re-checks
    // live stock right before submitting, and the backend re-checks again
    // inside the database transaction that actually deducts it. Removing
    // this field-level cap doesn't weaken either of those.
    if (qtyEl) qtyEl.removeAttribute('max');

    if (avail <= 0) {
      availDiv.innerHTML = `<span style="color:var(--red)">❌ Out of stock in gauge ${gauge} — choose a different gauge</span>`;
    } else if (avail < 5) {
      availDiv.innerHTML = `<span style="color:#b45309">⚠ Only ${avail} left in gauge ${gauge}</span>`;
    } else {
      availDiv.innerHTML = `<span style="color:var(--g600)">✅ ${avail} available in gauge ${gauge}</span>`;
    }
  } catch(e) {
    if (document.getElementById(`srow_avail_${rid}`)) availDiv.textContent = '';
  }
  _updateSaleSubmitBtn();
}

// Availability is shown per-row as information (see onSaleRowChange), but the
// Finalize/Submit button is never pre-emptively disabled from it — that used
// the same signal that also blocked entering an Order for stock you don't
// have yet. The actual gate for an immediate sale is submitAllSales()'s own
// live re-check right before it submits, backed by the database transaction
// that performs the real deduction — both untouched and still fully strict.
function _updateSaleSubmitBtn() {
  // intentionally a no-op now; kept as a named hook in case future UI wants
  // a non-blocking indicator here.
}

function calcSaleTotals() {
  const rows = document.querySelectorAll('#sale_items_container > div[id^="srow_"]');
  let totalRev = 0, totalKgs = 0, totalMeters = 0, hasAny = false;
  rows.forEach(row => {
    const rid = row.id.slice(5);
    const sel = document.getElementById(`srow_pt_${rid}`);
    const qtyEl = document.getElementById(`srow_qty_${rid}`);
    const priceEl = document.getElementById(`srow_price_${rid}`);
    if (!sel || !qtyEl || !priceEl) return;
    const opt = sel.options[sel.selectedIndex];
    const qty = parseInt(qtyEl.value) || 0;
    const price = parseFloat(priceEl.value) || 0;
    if (!opt || !opt.value || !qty || !price) return;
    hasAny = true;
    totalRev += qty * price;
    totalKgs += qty * (parseFloat(opt.dataset.wt) || 0);
    totalMeters += qty * (parseFloat(opt.dataset.len) || 0);
  });
  const sumEl = document.getElementById('s_summary');
  if (hasAny && sumEl) {
    document.getElementById('s_revenue').textContent = fmtMoney(totalRev);
    document.getElementById('s_kgs').textContent = fmt(totalKgs, 2) + ' kg';
    document.getElementById('s_meters').textContent = fmt(totalMeters, 1) + ' m';
    sumEl.style.display = 'block';
  } else if (sumEl) {
    sumEl.style.display = 'none';
  }
}

function resetSaleForm() {
  document.getElementById('sale_items_container').innerHTML = '';
  document.getElementById('s_buyer_name').value = '';
  document.getElementById('s_transport').value = '';
  document.getElementById('s_buyer_name_suggestions').style.display = 'none';
  document.getElementById('s_summary').style.display = 'none';
  showErr('s_err', '');
  _saleRowCount = 0;
  addSaleItemRow();
}

function _getSaleRows() {
  const rows = document.querySelectorAll('#sale_items_container > div[id^="srow_"]');
  const items = [];
  rows.forEach(row => {
    const rid = row.id.slice(5); // strip 'srow_'
    const sel = document.getElementById(`srow_pt_${rid}`);
    const gaugeEl = document.getElementById(`srow_gauge_${rid}`);
    const qtyEl = document.getElementById(`srow_qty_${rid}`);
    const priceEl = document.getElementById(`srow_price_${rid}`);
    if (!sel || !gaugeEl || !qtyEl || !priceEl) return;
    const piece_type_id = parseInt(sel.value) || 0;
    const opt = sel.options[sel.selectedIndex];
    const pt = pieceTypes.find(p => p.id == piece_type_id);
    const gauge_source = gaugeEl.value.trim();
    const quantity = parseInt(qtyEl.value) || 0;
    let selling_price = parseFloat(priceEl.value) || 0;
    // Auto-fill default price only when user left price blank AND default exists
    if (!selling_price && pt && pt.default_price) selling_price = parseFloat(pt.default_price) || 0;
    // Always push every row — validation in submitAllSales will catch missing fields
    items.push({ rid, piece_type_id, pt, gauge_source, quantity, selling_price });
  });
  return items;
}

// Applies the single order-level Transport field (if any) to a set of rows.
// Blank = every row falls back to its own normal default calc, unchanged.
// A typed value (incl. 0) is charged ONCE for the whole order — placed on the
// first row only, with every other row explicitly set to 0 — so multi-item
// orders are never silently charged transport more than once.
function _applyOrderLevelTransport(rows) {
  const el = document.getElementById('s_transport');
  const raw = el ? el.value.trim() : '';
  if (raw === '') return rows; // no override — every row uses its own default
  const total = parseFloat(raw) || 0;
  return rows.map((r, i) => ({ ...r, transport_to_market: i === 0 ? total : 0 }));
}

// Main submit — validates all rows, checks live stock, writes each to DB
async function submitAllSales() {
  if (_saleSubmitting) return;
  showErr('s_err', '');

  const buyer_name = document.getElementById('s_buyer_name').value.trim();
  if (!buyer_name) return showErr('s_err', 'Buyer name is required');

  const rows = _applyOrderLevelTransport(_getSaleRows());
  if (!rows.length) return showErr('s_err', 'Add at least one item');
  for (const r of rows) {
    const rowEl = document.getElementById(`srow_${r.rid}`);
    const highlight = (fieldId) => {
      const el = document.getElementById(`${fieldId}_${r.rid}`);
      if (el) { el.style.borderColor = 'var(--red)'; setTimeout(() => { if (el) el.style.borderColor = ''; }, 3000); }
    };
    if (!r.piece_type_id) { highlight('srow_pt'); return showErr('s_err', 'Select a piece type for every row'); }
    if (!r.gauge_source)  { highlight('srow_gauge'); return showErr('s_err', 'Select a wire gauge for every row'); }
    if (!r.quantity || r.quantity < 1) { highlight('srow_qty'); return showErr('s_err', 'Enter a valid quantity (≥ 1) for every row'); }
    if (!r.selling_price || r.selling_price <= 0) { highlight('srow_price'); return showErr('s_err', 'Enter a selling price for every row'); }
  }

  // Detect duplicate rows (same piece + gauge in multiple rows) — merge them for stock check
  const demand = {}; // key = "ptId|gauge" → total qty demanded
  for (const r of rows) {
    const key = `${r.piece_type_id}|${r.gauge_source}`;
    demand[key] = (demand[key] || 0) + r.quantity;
  }

  // Cross-row stock check — always invalidate first for a live read
  invalidateStockCaches();
  let liveInv;
  try {
    liveInv = await getAvailableInventoryCached();
  } catch(e) {
    return showErr('s_err', 'Could not verify stock levels. Please try again.');
  }

  for (const [key, totalQty] of Object.entries(demand)) {
    const [ptId, gauge] = key.split('|');
    const inv = liveInv.find(i => i.piece_type_id == ptId && i.gauge === gauge);
    const avail = inv ? parseInt(inv.available) : 0;
    const pt = pieceTypes.find(p => p.id == parseInt(ptId));
    const ptName = pt ? pt.name : 'item';
    if (avail <= 0) {
      return showErr('s_err', `❌ Out of stock: ${ptName} gauge ${gauge}. Cannot save.`);
    }
    if (totalQty > avail) {
      return showErr('s_err', `⚠ ${ptName} gauge ${gauge}: need ${totalQty}, only ${avail} available.`);
    }
  }

  _saleSubmitting = true;
  const submitBtn = document.getElementById('queue_submit_btn');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '⏳ Saving…'; }

  const d = document.getElementById('entryDate').value;

  try {
    // Send ALL items in ONE request → ONE invoice, ONE receipt
    await api('POST', '/daily/sales/batch', {
      entry_date: d,
      buyer_name,
      items: rows.map(r => ({
        piece_type_id: r.piece_type_id,
        quantity:      r.quantity,
        selling_price: r.selling_price,
        gauge_source:  r.gauge_source,
        ...(r.transport_to_market !== undefined ? { transport_to_market: r.transport_to_market } : {}),
      })),
    });

    invalidateStockCaches();
    await loadTabData('sales');

    if (typeof BroadcastChannel !== 'undefined') {
      new BroadcastChannel('daily_entry_updates').postMessage({ type: 'sales', date: d });
    }

    const totalRev = rows.reduce((s, r) => s + (r.quantity * r.selling_price), 0);
    const itemSummary = rows.map(r => `${r.quantity}× ${r.pt ? r.pt.name : 'item'}`).join(', ');
    api('POST', '/notifications', {
      type: 'info', category: 'sales',
      title: `Sale to ${buyer_name} — KES ${totalRev.toLocaleString()}`,
      message: `${itemSummary}. All items saved — 1 invoice generated.`,
      roleTarget: 'owner',
    }).catch(() => {});
    if (typeof _loadGlobalNotifs === 'function') setTimeout(_loadGlobalNotifs, 600);

    showToast(`✅ ${rows.length} item${rows.length > 1 ? 's' : ''} saved — 1 invoice generated`);
    resetSaleForm();
  } catch(e) {
    const msg = e.error || (e.errors && e.errors[0]?.msg) || 'Save failed';
    showErr('s_err', `Failed: ${msg}`);
  } finally {
    _saleSubmitting = false;
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '✅ Submit Sale'; }
  }
}

// Keep submitSale as alias for Ctrl+Enter shortcut compatibility
async function submitSale() { return submitAllSales(); }

// ─────────────────────────────────────────────────────────────────────────────
// ORDERS — one form drives both outcomes:
//   Finalize Order → same proven path as the old "Submit Sale" (unchanged),
//                     stock checked immediately, sale created immediately.
//   Save Order     → stored as a pending order, stock NOT checked yet;
//                     finalized or cancelled later from the list below.
// Both read the exact same rows via _getSaleRows() — one form, no duplication.
// ─────────────────────────────────────────────────────────────────────────────

// "Finalize Order" is the same action as before, just relabeled to match the
// new order-first language. No new code path — same validation, same result.
async function finalizeOrderNow() { return submitAllSales(); }

async function saveOrderPending() {
  showErr('s_err', '');
  const buyer_name = document.getElementById('s_buyer_name').value.trim();
  const rows = _applyOrderLevelTransport(_getSaleRows());
  if (!rows.length) return showErr('s_err', 'Add at least one item');
  for (const r of rows) {
    if (!r.piece_type_id) return showErr('s_err', 'Select a piece type for every row');
    if (!r.quantity || r.quantity < 1) return showErr('s_err', 'Enter a valid quantity (≥ 1) for every row');
  }

  const btn = document.getElementById('save_order_btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Saving…'; }

  try {
    const d = document.getElementById('entryDate').value;
    const items = rows.map(r => ({
      piece_type_id: r.piece_type_id,
      quantity:      r.quantity,
      gauge_source:  r.gauge_source,
      selling_price: r.selling_price,
      ...(r.transport_to_market !== undefined ? { transport_to_market: r.transport_to_market } : {}),
    }));
    await api('POST', '/orders', { order_date: d, buyer_name, items });
    showToast('✅ Order saved (pending)');
    resetSaleForm();
    await loadTabData('sales');
  } catch(e) {
    const msg = e.error || (e.errors && e.errors[0]?.msg) || 'Save failed';
    showErr('s_err', `Failed: ${msg}`);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '💾 Save Order'; }
  }
}

// Returns the subset of an order's items missing a gauge and/or a valid price —
// exactly the two fields /orders/:id/convert requires before it will accept
// a conversion. Empty array = order is already complete, nothing to ask.
function _missingOrderFields(order) {
  return (order.items || []).filter(it => {
    const noGauge = !it.gauge_source || !String(it.gauge_source).trim();
    const noPrice = it.selling_price === null || it.selling_price === undefined || parseFloat(it.selling_price) <= 0;
    return noGauge || noPrice;
  });
}

// Small self-contained modal (no shared modal infra exists yet) asking only
// for the fields a specific order is actually missing, then finalizes with
// those as overrides. Only ever shown when something is truly missing —
// a fully-specified order still finalizes in one click, same as before.
function _showFinalizeOrderModal(order, missingItems) {
  const existing = document.getElementById('finalizeOrderModal');
  if (existing) existing.remove();

  const rowsHtml = missingItems.map(it => {
    const pt = pieceTypes.find(p => p.id === it.piece_type_id);
    const needGauge = !it.gauge_source || !String(it.gauge_source).trim();
    const needPrice = it.selling_price === null || it.selling_price === undefined || parseFloat(it.selling_price) <= 0;
    const defaultPrice = (pt && pt.default_price != null) ? pt.default_price : (it.selling_price || '');
    return `
      <div style="display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:.5rem;align-items:center;margin-bottom:.5rem" data-oi="${it.id}">
        <div style="font-size:.86rem">${escHtml(it.piece_name)} × ${fmt(it.quantity)}</div>
        <select class="input fo_gauge" style="font-size:.84rem" ${needGauge ? '' : 'disabled'}>${_makeGaugeOptions(it.gauge_source || '')}</select>
        <input class="input fo_price" type="number" step="0.01" min="0.01" placeholder="Price"
               value="${needPrice ? '' : it.selling_price}" ${needPrice ? '' : 'disabled'} />
      </div>`;
  }).join('');

  const modal = document.createElement('div');
  modal.id = 'finalizeOrderModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:9999';
  modal.innerHTML = `
    <div style="background:var(--surface,#fff);border-radius:12px;padding:1.25rem;max-width:460px;width:92%;max-height:80vh;overflow:auto">
      <h3 style="margin:0 0 .3rem">Finish this order to finalize</h3>
      <p style="font-size:.84rem;color:var(--muted);margin:0 0 .9rem">
        These items are missing a gauge and/or price from when the order was placed.
        Stock will still be checked normally once you confirm — nothing is deducted by this step.
      </p>
      ${rowsHtml}
      <div id="fo_err" style="color:var(--red);font-size:.82rem;margin:.4rem 0;display:none"></div>
      <div style="display:flex;gap:.5rem;justify-content:flex-end;margin-top:.8rem">
        <button class="btn btn-sm" onclick="document.getElementById('finalizeOrderModal').remove()">Cancel</button>
        <button class="btn btn-primary btn-sm" id="fo_confirm_btn" onclick="_confirmFinalizeOrder(${order.id})">Finalize Order</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function _confirmFinalizeOrder(orderId) {
  const modal = document.getElementById('finalizeOrderModal');
  const errEl = document.getElementById('fo_err');
  errEl.style.display = 'none';

  const overrides = [];
  for (const row of modal.querySelectorAll('[data-oi]')) {
    const order_item_id = parseInt(row.dataset.oi);
    const gaugeSel = row.querySelector('.fo_gauge');
    const priceInp = row.querySelector('.fo_price');
    const gauge_source = gaugeSel.value.trim();
    const selling_price = parseFloat(priceInp.value);
    if (!gauge_source) { errEl.textContent = 'Select a gauge for every highlighted item.'; errEl.style.display = 'block'; return; }
    if (!selling_price || selling_price <= 0) { errEl.textContent = 'Enter a valid price for every highlighted item.'; errEl.style.display = 'block'; return; }
    overrides.push({ order_item_id, gauge_source, selling_price });
  }

  const btn = document.getElementById('fo_confirm_btn');
  btn.disabled = true; btn.textContent = '⏳ Finalizing…'; btn.blur();
  try {
    const d = document.getElementById('entryDate').value;
    await api('POST', `/orders/${orderId}/convert`, { entry_date: d, items: overrides });
    modal.remove();
    showToast('✅ Order finalized');
    invalidateStockCaches();
    await loadTabData('sales');
    document.activeElement?.blur();
  } catch(e) {
    const msg = e.error || 'Finalize failed';
    errEl.textContent = msg; errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Finalize Order';
  }
}

// Shared busy-set: prevents double-fire when Cancel or Finalize Order is
// clicked twice fast on the same order.
const _orderActionBusy = new Set();

async function convertOrder(orderId, btn) {
  if (_orderActionBusy.has(orderId)) return;
  const order = (window._lastOrders || []).find(o => o.id === orderId);
  const missing = order ? _missingOrderFields(order) : [];
  if (missing.length) { _showFinalizeOrderModal(order, missing); return; }

  _orderActionBusy.add(orderId);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Finalizing…'; btn.blur(); }
  try {
    const d = document.getElementById('entryDate').value;
    await api('POST', `/orders/${orderId}/convert`, { entry_date: d });
    showToast('✅ Order finalized');
    invalidateStockCaches();
    await loadTabData('sales');
    document.activeElement?.blur();
  } catch(e) {
    const msg = e.error || 'Finalize failed';
    showToast(`❌ ${msg}`, 'error', 5000);
  } finally {
    _orderActionBusy.delete(orderId);
    if (btn && btn.isConnected) { btn.disabled = false; btn.textContent = 'Finalize Order'; }
  }
}

async function cancelOrder(orderId, btn) {
  if (_orderActionBusy.has(orderId)) return;
  _orderActionBusy.add(orderId);
  if (btn) { btn.disabled = true; btn.textContent = 'Cancelling…'; btn.blur(); }
  try {
    await api('POST', `/orders/${orderId}/cancel`, {});
    showToast('Order cancelled');
    await loadTabData('sales');
    document.activeElement?.blur(); // defensive backstop
  } catch(e) {
    const msg = e.error || 'Cancel failed';
    showToast(`❌ ${msg}`, 'error', 5000);
  } finally {
    _orderActionBusy.delete(orderId);
    if (btn && btn.isConnected) { btn.disabled = false; btn.textContent = 'Cancel'; }
  }
}

// Customer Autocomplete — simple, clean, reliable
let _customerCache = [];

async function loadCustomers() {
  try {
    _customerCache = await api('GET', '/daily/customers/distinct') || [];
  } catch(e) { _customerCache = []; }
}

function onBuyerInput(val) {
  const q = val.trim().toLowerCase();
  const dd = document.getElementById('s_buyer_name_suggestions');
  if (!dd) return;
  if (!q) { dd.style.display='none'; return; }
  const matches = _customerCache.filter(n => n && n.toLowerCase().includes(q)).slice(0,8);
  if (!matches.length) { dd.style.display='none'; return; }
  dd.innerHTML = matches.map(n =>
    `<div class="suggestion-item" data-name="${escHtml(n)}">${escHtml(n)}</div>`
  ).join('');
  dd.style.display = 'block';
}

function selectBuyer(name) {
  const inp = document.getElementById('s_buyer_name');
  if (inp) inp.value = name;
  const dd = document.getElementById('s_buyer_name_suggestions');
  if (dd) dd.style.display = 'none';
}

// Event delegation instead of building onmousedown="selectBuyer('${name}')" per
// suggestion — a customer name containing a single quote (e.g. "O'Brien")
// would break out of that inline attribute string and corrupt the dropdown's
// HTML, with effects on that field ranging from a broken suggestion to the
// whole dropdown misrendering. This removes that whole class of bug.
document.getElementById('s_buyer_name_suggestions')?.addEventListener('mousedown', e => {
  const item = e.target.closest('.suggestion-item');
  if (item) selectBuyer(item.dataset.name);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-container')) {
    const dd = document.getElementById('s_buyer_name_suggestions');
    if (dd) dd.style.display = 'none';
  }
});

  try {
    const s = await api('GET','/daily/status');
    if (s.blocked) {
      document.getElementById('blockedAlert').style.display='flex';

  } catch(e){
    document.getElementById('mainContent').style.display='block';
    await loadRefs();
    updateDateLabel();
    loadTabData('purchases');
  }
}

  document.getElementById('blockedAlert').style.display='none';
  // Log the dismissal to audit silently
  try { await api('POST', '/daily/dismiss-warning', {}); } catch(_) {}
}

checkStatus();

// ── Ctrl+Enter submits the active tab's form ───────────────────────────────────
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    if (_activeTab === 'purchases')  { submitPurchase();   return; }
    if (_activeTab === 'production') { submitProduction();  return; }
    if (_activeTab === 'sales')      { submitSale();        return; }
  }
});
