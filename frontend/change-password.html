<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Change Password IMARA LINKS</title>
<link rel="stylesheet" href="shared.css">
</head>
<body>
<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
const user = requireAuth();
if (!user) throw '';
const pg = renderLayout('change-password.html');

pg.innerHTML = `
<div style="max-width:440px">
  <div class="card">
    <div class="card-title">Change Password</div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:1.25rem">
      Changing password for: <strong>${escHtml(user.full_name || user.username)}</strong>
    </p>
    <div class="form-group">
      <label class="label">Current Password *</label>
      <input class="input" type="password" id="cur_pass" placeholder="Current password" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label class="label">New Password *</label>
      <input class="input" type="password" id="new_pass" placeholder="Min 8 characters" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="label">Confirm New Password *</label>
      <input class="input" type="password" id="conf_pass" placeholder="Repeat new password" autocomplete="new-password">
    </div>
    <div id="cp_err" class="err"></div>
    <div style="display:flex;gap:.75rem;margin-top:1rem">
      <button class="btn btn-secondary" onclick="history.back()">Cancel</button>
      <button class="btn btn-primary" id="saveBtn" onclick="doChange()">Change Password</button>
    </div>
  </div>

  <div class="card" style="margin-top:1rem">
    <div class="card-title">My Profile</div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:1rem">
      Click your name in the sidebar to edit your profile (name, phone, email).
    </p>
    <div style="display:grid;gap:.5rem;font-size:.85rem">
      <div style="display:flex;gap:1rem"><span style="color:var(--muted);width:80px">Username</span><strong class="mono">${escHtml(user.username)}</strong></div>
      <div style="display:flex;gap:1rem"><span style="color:var(--muted);width:80px">Role</span><strong style="text-transform:capitalize">${escHtml(user.role)}</strong></div>
      <div style="display:flex;gap:1rem"><span style="color:var(--muted);width:80px">Name</span><strong id="dispName">${escHtml(user.full_name)}</strong></div>
      <div style="display:flex;gap:1rem"><span style="color:var(--muted);width:80px">Phone</span><span id="dispPhone">${escHtml(user.phone||'—')}</span></div>
      <div style="display:flex;gap:1rem"><span style="color:var(--muted);width:80px">Email</span><span id="dispEmail">${escHtml(user.email||'—')}</span></div>
    </div>
  </div>
</div>
`;

// Enter key on last field
document.getElementById('conf_pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doChange();
});

async function doChange() {
  showErr('cp_err', '');
  const cur  = document.getElementById('cur_pass').value;
  const nw   = document.getElementById('new_pass').value;
  const conf = document.getElementById('conf_pass').value;

  if (!cur)              return showErr('cp_err', 'Enter current password');
  if (!nw || nw.length < 8) return showErr('cp_err', 'New password must be at least 8 characters');
  if (nw !== conf)       return showErr('cp_err', 'Passwords do not match');

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  try {
    await api('POST', '/auth/change-password', { current_password: cur, new_password: nw });
    showToast('Password changed successfully');
    document.getElementById('cur_pass').value  = '';
    document.getElementById('new_pass').value  = '';
    document.getElementById('conf_pass').value = '';
    setTimeout(() => history.back(), 1200);
  } catch(e) {
    showErr('cp_err', e.error || (e.errors?.[0]?.msg) || 'Failed to change password');
  } finally {
    btn.disabled = false; btn.textContent = 'Change Password';
  }

}

// ── Security Questions (owner only) ──────────────────────────────────────────
if (user.role === 'owner') {
  // Append card to page
  const sqCard = document.createElement('div');
  sqCard.className = 'card';
  sqCard.style.cssText = 'margin-top:1rem;max-width:440px';
  sqCard.innerHTML = [
    '<div class="card-title">Security Questions</div>',
    '<p style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem">',
    'Set 3 secret questions so you can reset your own password from the login screen if you ever get locked out.',
    '</p>',
    '<div id="sq_current" style="font-size:.82rem;margin-bottom:1rem;color:var(--muted)">Loading\u2026</div>',
    '<div class="form-group"><label class="label">Question 1 *</label>',
    '<input class="input" id="sq_q1" type="text" placeholder="e.g. What was your first pet\'s name?"></div>',
    '<div class="form-group"><label class="label">Answer 1 *</label>',
    '<input class="input" id="sq_a1" type="text" placeholder="Your answer" autocomplete="off"></div>',
    '<div class="form-group"><label class="label">Question 2 *</label>',
    '<input class="input" id="sq_q2" type="text" placeholder="e.g. What city were you born in?"></div>',
    '<div class="form-group"><label class="label">Answer 2 *</label>',
    '<input class="input" id="sq_a2" type="text" placeholder="Your answer" autocomplete="off"></div>',
    '<div class="form-group"><label class="label">Question 3 *</label>',
    '<input class="input" id="sq_q3" type="text" placeholder="e.g. What is your mother\'s maiden name?"></div>',
    '<div class="form-group"><label class="label">Answer 3 *</label>',
    '<input class="input" id="sq_a3" type="text" placeholder="Your answer" autocomplete="off"></div>',
    '<div id="sq_err" class="err"></div>',
    '<button class="btn btn-primary" onclick="saveSQ()" style="margin-top:.5rem">Save Security Questions</button>'
  ].join('');

  // Find the outer wrapper div the page uses and append
  const wrapper = document.querySelector('.card') && document.querySelector('.card').parentElement;
  if (wrapper) wrapper.appendChild(sqCard);

  // Load current status
  api('GET', '/auth/security-questions/status').then(function(r) {
    const el = document.getElementById('sq_current');
    if (!el) return;
    if (r.set) {
      el.innerHTML = '\u2705 Questions set (updated ' + (r.updated_at || '').slice(0, 10) + '):'
        + '<ol style="margin:.3rem 0 0 1.2rem;line-height:1.8">'
        + r.questions.map(function(q) { return '<li>' + escHtml(q) + '</li>'; }).join('')
        + '</ol><span style="color:var(--muted)">Update them below at any time.</span>';
    } else {
      el.style.color = '#d97706';
      el.innerHTML = '\u26a0\ufe0f No questions set yet. Without them you\'ll need your admin to issue a reset token if you forget your password.';
    }
  }).catch(function() {});
}

async function saveSQ() {
  const get = function(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; };
  var q1=get('sq_q1'),a1=get('sq_a1'),q2=get('sq_q2'),a2=get('sq_a2'),q3=get('sq_q3'),a3=get('sq_a3');
  var errEl = document.getElementById('sq_err');
  errEl.textContent = '';
  if (!q1||!a1||!q2||!a2||!q3||!a3) { errEl.textContent = 'All 6 fields are required.'; return; }
  try {
    await api('POST', '/auth/security-questions/set', { q1:q1, a1:a1, q2:q2, a2:a2, q3:q3, a3:a3 });
    showToast('Security questions saved \u2713');
    ['sq_q1','sq_a1','sq_q2','sq_a2','sq_q3','sq_a3'].forEach(function(id) {
      var el = document.getElementById(id); if (el) el.value = '';
    });
    api('GET', '/auth/security-questions/status').then(function(r) {
      var el = document.getElementById('sq_current');
      if (el && r.set) {
        el.style.color = '';
        el.innerHTML = '\u2705 Questions updated:'
          + '<ol style="margin:.3rem 0 0 1.2rem;line-height:1.8">'
          + r.questions.map(function(q) { return '<li>' + escHtml(q) + '</li>'; }).join('')
          + '</ol>';
      }
    }).catch(function() {});
  } catch(e) { errEl.textContent = e.error || 'Failed to save.'; }
}
</script>

</body>
</html>
