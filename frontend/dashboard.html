<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — IMARA LINKS</title>
<link rel="stylesheet" href="shared.css">
<script src="chart.umd.min.js"></script>
<script src="chartjs-plugin-datalabels.min.js"></script>
<script src="hammer.min.js"></script>
<script src="chartjs-plugin-zoom.min.js"></script>
<script src="jspdf.umd.min.js"></script>
<script src="jspdf.plugin.autotable.min.js"></script>
<style>
/* ── Period bar ─────────────────────────────────────────────── */
.period-bar{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.period-bar label{font-size:.8rem;color:var(--muted);white-space:nowrap}
.period-preset{background:var(--g50);border:1px solid var(--border);border-radius:6px;
               padding:.3rem .65rem;font-size:.78rem;font-family:var(--font);color:var(--g700);
               cursor:pointer;transition:all .15s}
.period-preset:hover,.period-preset.active{background:var(--g500);color:#fff;border-color:var(--g500)}
.gran-badge{background:var(--g100);color:var(--g700);padding:.2rem .5rem;border-radius:99px;
            font-size:.75rem;font-weight:600}

/* ── Charts ─────────────────────────────────────────────────── */
.chart-pair{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-pair>.card{min-width:0;overflow:hidden}
@media(max-width:720px){.chart-pair{grid-template-columns:1fr}}
.chart-container{position:relative;height:290px;width:100%;overflow:auto;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.chart-reset-btn{position:absolute;top:6px;right:6px;background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.2rem .55rem;font-size:.72rem;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font);display:none;z-index:10;transition:all .15s}
.chart-reset-btn:hover{background:var(--g50);color:var(--g700);border-color:var(--g400)}
.chart-reset-btn.visible{display:block}
.chart-wrap-rel{position:relative}
.chart-container canvas{display:block}
@media(max-width:768px){.chart-container{height:240px}}
@media(max-width:480px){.chart-container{height:200px}.chart-pair{gap:.5rem}}
/* No-data placeholder */
.chart-no-data{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:.5rem;color:var(--muted);font-size:.85rem;font-weight:500;
  background:var(--g50);border-radius:var(--radius-sm)
}
.chart-no-data span:first-child{font-size:2rem;opacity:.4}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
      box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .2s ease}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}

/* ── KPI cards — compact, dense, scan-friendly ─────────────── */
.kpi{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:.5rem .7rem .5rem .85rem;
  transition:box-shadow .18s,border-color .18s;
  position:relative;cursor:default;
  display:flex;flex-direction:row;align-items:center;
  gap:.6rem;min-width:0;
}
/* Coloured left accent bar */
.kpi::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--g400),var(--g600));
  border-radius:var(--radius) 0 0 var(--radius);
}
.kpi:hover{box-shadow:0 3px 12px rgba(0,0,0,.08);border-color:var(--g200)}
.kpi.danger::before{background:linear-gradient(180deg,#f87171,#dc2626)}
.kpi.warning::before{background:linear-gradient(180deg,#fbbf24,#d97706)}
.kpi.info::before{background:linear-gradient(180deg,#60a5fa,#2563eb)}
.kpi.amber::before{background:linear-gradient(180deg,#fcd34d,#d97706)}

/* Icon — left side, compact */
.kpi-icon{
  flex-shrink:0;width:30px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
  background:var(--g50);border:1px solid var(--g100);
}
.kpi.danger .kpi-icon{background:#fef2f2;border-color:#fecaca}
.kpi.warning .kpi-icon,.kpi.amber .kpi-icon{background:#fffbeb;border-color:#fde68a}
.kpi.info .kpi-icon{background:#eff6ff;border-color:#bfdbfe}

/* Text block — fills remaining width */
.kpi-header{ display:none }
.kpi-body{ flex:1;min-width:0;display:flex;flex-direction:column;gap:.05rem }
.kpi-label{
  font-size:.62rem;color:var(--muted);font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;line-height:1;
  white-space:nowrap;
}
/* Value: full width, whole-word wrap only, never mid-digit */
.kpi-value{
  font-size:1.15rem;font-weight:700;color:var(--ink);
  line-height:1.15;font-family:var(--font-mono);
  white-space:normal;overflow-wrap:break-word;word-break:normal;
}
.kpi-value.text-val{
  font-size:.95rem;font-family:var(--font);font-weight:700;
  white-space:normal;overflow-wrap:break-word;word-break:normal;
}
/* Suffix letter K / M / B — styled, prominent, never ambiguous */
.kpi-sfx{
  display:inline-block;
  font-size:.68em;
  font-weight:900;
  font-family:var(--font);
  letter-spacing:.02em;
  opacity:.55;
  margin-left:.06em;
  vertical-align:baseline;
}
.kpi-sub{
  font-size:.62rem;color:var(--muted);font-weight:500;
  display:flex;align-items:center;gap:.25rem;flex-wrap:wrap;line-height:1.3;
  margin-top:.08rem;
}
.kpi-sub .dot{width:4px;height:4px;border-radius:50%;background:var(--g400);flex-shrink:0}
.kpi-sub.warn{color:var(--amber)}.kpi-sub.danger{color:var(--red)}.kpi-sub.ok{color:var(--g600)}

/* ── Notification bell ──────────────────────────────────────── */
.notif-btn{position:relative;background:none;border:none;cursor:pointer;
           padding:.4rem;border-radius:8px;display:flex;align-items:center;justify-content:center;
           transition:background .15s;line-height:1;margin-right:.25rem}
.notif-btn:hover{background:var(--g50)}
.notif-btn svg{width:22px;height:22px;transition:color .2s}
.notif-btn.state-none svg{color:var(--muted,#9ca3af)}
.notif-btn.state-info  svg{color:#3b82f6}
.notif-btn.state-warn  svg{color:#f59e0b}
.notif-btn.state-alert svg{color:#dc2626;animation:bellRing .5s ease-in-out}
@keyframes bellRing{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.notif-badge{position:absolute;top:1px;right:1px;min-width:17px;height:17px;
             background:#dc2626;color:#fff;border-radius:99px;font-size:.62rem;
             font-weight:700;display:flex;align-items:center;justify-content:center;
             padding:0 3px;pointer-events:none;border:2px solid white}

/* ── Notification panel ─────────────────────────────────────── */
.notif-panel{position:fixed;top:58px;right:1rem;width:390px;max-width:calc(100vw - 1.5rem);
             background:var(--surface,#fff);border:1px solid var(--border,#e5e7eb);
             border-radius:var(--radius,10px);box-shadow:0 12px 40px rgba(0,0,0,.18);
             z-index:800;display:none;flex-direction:column;max-height:530px;overflow:hidden}
.notif-panel.open{display:flex}
.notif-header{display:flex;align-items:center;justify-content:space-between;
              padding:.875rem 1rem;border-bottom:1px solid var(--border);flex-shrink:0}
.notif-header h4{margin:0;font-size:.95rem;font-weight:700}
.notif-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.notif-tab{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;
           padding:.55rem .4rem;font-size:.75rem;font-weight:600;cursor:pointer;
           color:var(--muted);transition:all .15s;font-family:var(--font);white-space:nowrap}
.notif-tab.active{color:var(--g600,#16a34a);border-bottom-color:var(--g500,#22c55e)}
.notif-tab:hover:not(.active){color:var(--ink,#111)}
.notif-list{overflow-y:auto;flex:1}
.notif-item{display:flex;gap:.75rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);
            cursor:pointer;transition:background .1s;align-items:flex-start}
.notif-item:hover{background:var(--g50)}
.notif-item.unread{background:#f0fdf4}
.notif-item.unread:hover{background:#dcfce7}
.notif-item.read{opacity:.68}
.ndot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ndot.info{background:#3b82f6}
.ndot.warn{background:#f59e0b}
.ndot.alert{background:#dc2626}
.ndot.ok{background:#22c55e}
.ndot.read-dot{background:#9ca3af;opacity:.5}
.notif-body{flex:1;min-width:0}
.notif-title{font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:.15rem;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-msg{font-size:.77rem;color:var(--muted);line-height:1.4}
.notif-time{font-size:.7rem;color:var(--muted);margin-top:.2rem}
.notif-goto{font-size:.72rem;color:var(--g600);font-weight:600;margin-top:.25rem;display:inline-block}
.notif-empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:.85rem}
.notif-footer{padding:.6rem 1rem;border-top:1px solid var(--border);display:flex;
              justify-content:space-between;align-items:center;flex-shrink:0}
.notif-footer button{background:none;border:none;cursor:pointer;font-size:.75rem;
                      color:var(--g600);font-family:var(--font);font-weight:600;padding:.2rem .4rem}
.notif-footer button:hover{color:var(--g700);text-decoration:underline}

/* ── Admin modal ────────────────────────────────────────────── */
.admin-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
             display:flex;align-items:center;justify-content:center}
.admin-modal-content{background:var(--surface);border-radius:var(--radius);
                     box-shadow:var(--shadow-md);width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.admin-modal-header{padding:1.25rem;border-bottom:1px solid var(--border);
                    display:flex;justify-content:space-between;align-items:center}
.admin-modal-header h3{margin:0;font-size:1.1rem;font-weight:600;color:var(--ink)}
.admin-modal-close{background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted);
                   padding:0;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.admin-modal-close:hover{color:var(--ink)}
.admin-modal-body{padding:1.25rem}
.admin-modal-footer{padding:1rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.75rem;justify-content:flex-end}
.module-health-card{background:var(--g50);border:1px solid var(--border);border-radius:var(--radius-sm);
                    padding:1rem;transition:all .2s}
.module-health-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}

@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.chart-pair>.card{animation:fadeInUp .45s ease-out both}
.chart-pair>.card:nth-child(2){animation-delay:.07s}
.chart-pair>.card:nth-child(3){animation-delay:.14s}
.chart-pair>.card:nth-child(4){animation-delay:.21s}

/* ── Skeleton loading ───────────────────────────────────────── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{border-radius:6px;background:linear-gradient(90deg,var(--g100) 25%,var(--g50) 50%,var(--g100) 75%);
      background-size:800px 100%;animation:shimmer 1.4s infinite linear}
.skel-kpi{height:80px;border-radius:var(--radius);margin-bottom:.5rem}
.skel-chart{height:290px;border-radius:var(--radius)}
.skel-text{height:14px;border-radius:4px;margin-bottom:.5rem}
.skel-text.w60{width:60%}.skel-text.w80{width:80%}.skel-text.w40{width:40%}
.chart-loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:var(--surface);border-radius:var(--radius);
  z-index:5;gap:.75rem}
.chart-loading-spinner{width:36px;height:36px;border:3px solid var(--g100);
  border-top-color:var(--g500);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-loading-text{font-size:.8rem;color:var(--muted);font-weight:500}
</style>
</head>
<body>
<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
const user = requireAuth();
if (!user) throw '';
const pg = renderLayout('dashboard.html');

/* ═══════════════════════════════════════════════════════════════
   CHART HELPERS
═══════════════════════════════════════════════════════════════ */
Chart.register(ChartDataLabels, ChartZoom);
const chartRegistry = new Map();

/* Reset zoom on a named chart and hide the reset button */
function resetChartZoom(id) {
  const chart = chartRegistry.get(id);
  if (chart && chart.resetZoom) chart.resetZoom();
  const btn = document.getElementById(id + 'Reset');
  if (btn) btn.classList.remove('visible');
}

/* ── Loading helpers ─────────────────────────────────────────── */
function showSkeletonKpis() {
  const el = document.getElementById('kpiGrid');
  if (!el) return;
  el.innerHTML = Array(7).fill(0).map(() =>
    `<div class="kpi"><div class="skel skel-kpi"></div></div>`
  ).join('');
}

function showChartLoading(canvasId, label) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const wrap = canvas.parentElement;
  if (wrap.querySelector('.chart-loading-overlay')) return;
  wrap.style.position = 'relative';
  const ov = document.createElement('div');
  ov.className = 'chart-loading-overlay';
  ov.innerHTML = `<div class="chart-loading-spinner"></div><div class="chart-loading-text">Loading ${label}…</div>`;
  wrap.appendChild(ov);
}

function hideChartLoading(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ov = canvas.parentElement.querySelector('.chart-loading-overlay');
  if (ov) {
    ov.style.transition = 'opacity .2s';
    ov.style.opacity = '0';
    setTimeout(() => ov.remove(), 220);
  }
}

function showAllChartLoaders() {
  const charts = [
    ['revenueChart','Revenue Trend'],['prodChart','Production'],
    ['bestCustomersChart','Top Customers'],['gaugeBreakdownChart','Gauge Breakdown'],
    ['workerProductionChart','Worker Output'],['salesByPieceChart','Sales Mix'],
    ['revenueBreakdownChart','Revenue Breakdown'],['costAnalysisChart','Cost Analysis']
  ];
  charts.forEach(([id, label]) => showChartLoading(id, label));
}

function hideAllChartLoaders() {
  ['revenueChart','prodChart','bestCustomersChart','gaugeBreakdownChart',
   'workerProductionChart','salesByPieceChart','revenueBreakdownChart','costAnalysisChart'
  ].forEach(hideChartLoading);
}

function destroyChart(id) {
  const c = chartRegistry.get(id);
  if (c) {
    try { if (c.resetZoom) c.resetZoom(); } catch(e){}
    try { c.destroy(); } catch(e){}
    chartRegistry.delete(id);
  }
  const resetBtn = document.getElementById(id + 'Reset');
  if (resetBtn) resetBtn.classList.remove('visible');
  // Also clear any "no data" overlay left from a previous load
  const canvas = document.getElementById(id);
  if (canvas) {
    const nd = canvas.parentElement.querySelector('.chart-no-data');
    if (nd) nd.remove();
    canvas.style.display = '';
  }
}
/** Show a friendly "No data for this period" message instead of a blank chart */
function showNoData(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const wrap = canvas.parentElement;
  canvas.style.display = 'none'; // hide the blank canvas
  if (wrap.querySelector('.chart-no-data')) return;
  const el = document.createElement('div');
  el.className = 'chart-no-data';
  el.innerHTML = '<span>📭</span><span>No data for this period</span>';
  wrap.appendChild(el);
}

/** Format large numbers for chart axes/labels: 1500 → 1.5K, 1200000 → 1.2M */
function smartVal(v) {
  if (v == null || isNaN(v)) return '—';
  const n = Number(v);
  if (Math.abs(n) >= 1e9)  return (n/1e9).toFixed(1).replace(/\.0$/,'') + 'B';
  if (Math.abs(n) >= 1e6)  return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  if (Math.abs(n) >= 1)    return n.toFixed(0);
  return n.toFixed(2);
}
/** Compact KES for KPI values — always 2 decimal places, styled suffix.
 *  Returns HTML: the number part plain, the suffix (K/M/B) in a bold styled span.
 *  e.g.  10490  →  KES 10.49<span class="kpi-suffix">K</span>
 *        1500000 →  KES 1.50<span class="kpi-suffix">M</span>
 *        850     →  KES 850.00  (no suffix below 1 000)
 */
function compactKES(v) {
  if (v == null || isNaN(v)) return 'KES —';
  const n   = Number(v);
  const neg = n < 0 ? '-' : '';
  const abs = Math.abs(n);
  const sfx = s => `${neg}KES ${s}`;
  const suf = (num, unit) =>
    sfx(num.toFixed(2) + `<span class="kpi-sfx">${unit}</span>`);
  if (abs >= 1e9)  return suf(abs / 1e9,  'B');
  if (abs >= 1e6)  return suf(abs / 1e6,  'M');
  if (abs >= 1e3)  return suf(abs / 1e3,  'K');
  return sfx(abs.toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }));
}
/** Accurate financial formatter — full precision for tooltips/reports */
function fmtKES(v) {
  if (v == null || isNaN(v)) return 'KES —';
  return 'KES ' + Number(v).toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function smartKES(v) { return fmtKES(v); }
function numVal(v) {
  const n = typeof v === 'number' ? v : parseFloat(v);
  return Number.isFinite(n) ? n : 0;
}
function compactTrendData(trends=[]) {
  if (!trends || !trends.length) return [];

  // Dashboard sends: [{ date, type:"sales"|"production"|"purchases", value }, ...]
  // Reports sends:   [{ date, date_label, revenue, kgs_produced }, ...]
  // Detect which shape we have by checking the first row
  const first = trends[0];
  const isFlat = first && ('type' in first) && ('value' in first);

  if (isFlat) {
    // Pivot flat rows into one object per date
    const byDate = {};
    trends.forEach(t => {
      const d = t.date || '—';
      if (!byDate[d]) byDate[d] = { date: d, revenue: 0, production: 0 };
      const v = parseFloat(t.value) || 0;
      if (t.type === 'sales')      byDate[d].revenue    += v;
      if (t.type === 'production') byDate[d].production += v;
    });
    return Object.values(byDate)
      .sort((a, b) => a.date < b.date ? -1 : 1)
      .map(r => ({
        label:      r.date.slice(5), // "MM-DD"
        revenue:    r.revenue,
        production: r.production
      }));
  }

  // Reports shape — already has revenue + kgs_produced per row
  return trends.map(t => ({
    label:      t.date_label || t.date?.slice(5) || '—',
    revenue:    parseFloat(t.revenue)      || 0,
    production: parseFloat(t.kgs_produced) || 0
  }));
}
function setChartViewport(canvasId, { xPoints=0, yPoints=0, circularItems=0 } = {}) {
  const canvas = document.getElementById(canvasId);
  const wrap = canvas?.parentElement;
  if (!canvas || !wrap) return;

  const narrow = window.innerWidth <= 600;
  const baseHeight = window.innerWidth <= 480 ? 200 : window.innerWidth <= 768 ? 240 : 290;

  // CRITICAL FIX: clientWidth=0 means card not painted yet — never set canvas to 0px.
  // Walk up the DOM to get a real width; fall back to a viewport-based estimate.
  let viewportWidth = wrap.clientWidth || wrap.getBoundingClientRect().width;
  if (!viewportWidth) {
    let el = wrap.parentElement;
    while (el && !viewportWidth) { viewportWidth = el.clientWidth; el = el.parentElement; }
    const cols = window.innerWidth <= 720 ? 1 : 2;
    viewportWidth = viewportWidth
      ? Math.floor((viewportWidth - (cols > 1 ? 32 : 16)) / cols)
      : Math.floor(window.innerWidth * 0.45);
  }

  // Width is fixed to the container — zoom/pan handles X-axis navigation
  let targetHeight = baseHeight;

  if (yPoints > 0) targetHeight = Math.max(baseHeight, yPoints * 42);
  if (circularItems > 0) {
    const legendExtra = narrow ? Math.min(circularItems, 8) * 18 : 0;
    const overflowExtra = circularItems > 8 ? (circularItems - 8) * 22 : 0;
    targetHeight = Math.max(baseHeight + legendExtra, baseHeight + overflowExtra);
  }

  // Only override container height when content needs more space (tall bar/circular charts)
  // For normal charts: leave the CSS height alone — it's correct from the media queries
  if (targetHeight > baseHeight) {
    wrap.style.height = `${Math.min(targetHeight, 720)}px`;
  } else {
    wrap.style.height = ''; // let CSS control it (290px / 240px / 200px)
  }
  wrap.style.overflowX = 'hidden';
  wrap.style.overflowY = targetHeight > baseHeight ? 'auto' : 'hidden';
  // Never set explicit canvas dimensions — let Chart.js responsive:true fill the container
  canvas.style.width = '';
  canvas.style.minWidth = '';
  canvas.style.height = '';
}


const PALETTE = ['#1e9a62','#d97706','#dc2626','#2563eb','#7c3aed',
                 '#0891b2','#ea580c','#be123c','#15803d','#4338ca'];

const BASE_TOOLTIP = {
  backgroundColor:'rgba(255,255,255,.97)', borderColor:'#e5e7eb', borderWidth:1,
  titleColor:'#1f2937', bodyColor:'#4b5563',
  titleFont:{weight:'600',size:12}, bodyFont:{size:11}, padding:12
};
const BASE_SCALES = {
  x:{ grid:{display:false}, ticks:{font:{size:10,family:'var(--font)'},color:'#64748b',maxRotation:45,maxTicksLimit:10} },
  y:{ grid:{color:'#f1f5f9',borderDash:[2,2]}, ticks:{font:{size:10,family:'var(--font)'},color:'#64748b'} }
};

/* Responsive legend: bottom on narrow screens, right on wide */
function legendOpts(overrides={}) {
  const narrow = window.innerWidth <= 600;
  return {
    position: narrow ? 'bottom' : 'right',
    align: 'center',
    labels: {
      font:{size:10, family:'var(--font)'},
      color:'#5a7a68',
      boxWidth:12,
      padding:10,
      usePointStyle:true,
      ...overrides
    }
  };
}

function cartesianOpts(extra={}, dataPoints=0) {
  const { plugins: extraPlugins, scales: extraScales, layout: extraLayout, ...extraRest } = extra;
  // For large datasets: disable animations (faster render) and auto-limit x-axis ticks
  const large = dataPoints > 30;
  const huge  = dataPoints > 90;
  const smartX = {
    ...BASE_SCALES.x,
    ticks: {
      ...BASE_SCALES.x.ticks,
      maxTicksLimit: huge ? 12 : large ? 18 : 20,
      maxRotation: large ? 60 : 45,
    }
  };
  return {
    responsive: true,
    maintainAspectRatio: false,
    animation: large ? { duration: 400 } : { duration: 700, easing: 'easeOutQuart' },
    interaction: { mode: 'index', intersect: false },
    layout: { padding: { top: 36, right: 48, bottom: 4, left: 4 }, ...(extraLayout || {}) },
    plugins: {
      legend: { display: false },
      datalabels: { display: false },
      tooltip: { ...BASE_TOOLTIP },
      zoom: {
        pan: {
          enabled: true, mode: 'x', modifierKey: null,
          onPanComplete({ chart }) {
            const id = chart.canvas?.id;
            const btn = id ? document.getElementById(id + 'Reset') : null;
            if (btn) btn.classList.add('visible');
          }
        },
        zoom: {
          wheel: { enabled: true },
          pinch: { enabled: true },
          mode: 'x',
          onZoomComplete({ chart }) {
            const id = chart.canvas?.id;
            const btn = id ? document.getElementById(id + 'Reset') : null;
            if (btn) btn.classList.add('visible');
          }
        },
        limits: { x: { min: 'original', max: 'original' } }
      },
      ...(extraPlugins || {}),
    },
    scales: { x: smartX, ...BASE_SCALES, ...(extraScales || {}) },
    ...extraRest,
  };
}
function circularOpts(extra={}) {
  const { plugins: extraPlugins, ...extraRest } = extra;
  return {
    responsive: true,
    maintainAspectRatio: false,
    // Give the chart room so slice labels don't bleed into the legend area
    layout: { padding: { top: 20, bottom: 20, left: 24, right: 24 } },
    plugins: {
      legend: legendOpts(),
      datalabels: { display: false },
      tooltip: { ...BASE_TOOLTIP },
      ...(extraPlugins || {}),
    },
    ...extraRest,
  };
}

/* shared datalabel for bar/line ends */
function endLabel(color, unit='') {
  return {
    display: function(ctx) {
      const v = ctx.dataset.data[ctx.dataIndex];
      return v != null && v !== 0; // hide on zero/null
    },
    anchor:'end', align:'end', offset:2, clamp:true,
    color, font:{weight:'bold', size:9},
    formatter: v => v != null && v !== 0 ? smartVal(v) + unit : ''
  };
}
/* weight-specific datalabel — uses fmtKg (auto kg/t) instead of smartVal+'kg' which produced "1.2K kg" */
function endLabelKg(color) {
  return {
    display: function(ctx) {
      const v = ctx.dataset.data[ctx.dataIndex];
      return v != null && v !== 0;
    },
    anchor:'end', align:'end', offset:2, clamp:true,
    color, font:{weight:'bold', size:9},
    formatter: v => v != null && v !== 0 ? fmtKg(v) : ''
  };
}
/* shared datalabel for pie/doughnut slices — only on slices big enough to hold the text */
function pctLabel() {
  return {
    color: '#fff',
    font: { weight: 'bold', size: 10 },
    anchor: 'center',
    align: 'center',
    offset: 0,
    // White outline so text is readable on any slice color and doesn't bleed into legend
    textStrokeColor: 'rgba(0,0,0,0.25)',
    textStrokeWidth: 2,
    display: function(context) {
      const data = context.dataset.data || [];
      const toN  = v => { const n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? n : 0; };
      const tot  = data.reduce((s, v) => s + toN(v), 0);
      const val  = toN(data[context.dataIndex]);
      // Only render inside slices that are ≥ 10% — below that the label won't fit and spills onto legend
      return tot > 0 && (val / tot) >= 0.10;
    },
    formatter: function(value, context) {
      const toN = v => { const n = typeof v === 'number' ? v : parseFloat(v); return Number.isFinite(n) ? n : 0; };
      const tot = (context.dataset.data || []).reduce((s, v) => s + toN(v), 0);
      if (!tot) return '';
      const val = toN(context.parsed ?? value);
      return ((val / tot) * 100).toFixed(1) + '%';
    }
  };
}

function applyPreset(days, btn) {
  document.querySelectorAll('.period-preset').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  function localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  const today = new Date();
  let fromD, toD;
  if (days === 'this_month') {
    // 1st of current month → today (days so far this month)
    fromD = new Date(today.getFullYear(), today.getMonth(), 1);
    toD   = today;
  } else if (days === 'last_month') {
    // full previous calendar month: 1st → last day
    fromD = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    toD   = new Date(today.getFullYear(), today.getMonth(), 0);
  } else {
    toD   = today;
    fromD = days === 0 ? new Date(today) : new Date(today.getFullYear(), today.getMonth(), today.getDate() - (days - 1));
  }
  document.getElementById('toDate').value   = localDateStr(toD);
  document.getElementById('fromDate').value = localDateStr(fromD);
  sessionStorage.setItem('dash_fromDate', localDateStr(fromD));
  sessionStorage.setItem('dash_toDate',   localDateStr(toD));
  loadDash();
}

function _granularity(from, to) {
  // Parse YYYY-MM-DD as local date (not UTC) to avoid timezone-induced off-by-one
  function _parseLocal(s) {
    const [y,m,d] = s.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  const d = Math.round((_parseLocal(to)-_parseLocal(from))/864e5)+1;
  if (d<=1)   return 'Daily';
  if (d<=31)  return 'Daily';
  if (d<=90)  return 'Weekly';
  if (d<=365) return 'Monthly';
  return 'Quarterly';
}

let _dashLoading = false;
async function loadDash(){
  if(_dashLoading) return;
  if(user.role!=='owner') return;
  const from=document.getElementById('fromDate')?.value;
  const to=document.getElementById('toDate')?.value;
  if(!from||!to) return;
  _dashLoading = true;

  // Show skeleton + chart loaders immediately — no idle white screen
  showSkeletonKpis();
  showAllChartLoaders();
  PageProgress.show(5, 'Loading dashboard…');

  const gran=_granularity(from,to);
  const gw=document.getElementById('granWrap'), gb=document.getElementById('granBadge');
  if(gw&&gb){gw.style.display='flex';gb.textContent=gran;}

  try {
    // Fire all 5 fetches in parallel; update progress as each resolves
    PageProgress.show(12, 'Fetching KPIs…');
    const [d, inv, wp, sp, rb] = await Promise.all([
      api('GET',`/dashboard?from=${from}&to=${to}`).then(r=>{ PageProgress.show(35,'Loading inventory…'); return r; }),
      api('GET','/inventory').then(r=>{ PageProgress.show(50,'Loading worker data…'); return r; }),
      api('GET',`/worker-production?from=${from}&to=${to}`).then(r=>{ PageProgress.show(65,'Loading sales mix…'); return r; }),
      api('GET',`/sales-by-piece?from=${from}&to=${to}`).then(r=>{ PageProgress.show(80,'Loading revenue breakdown…'); return r; }),
      api('GET',`/revenue-breakdown?from=${from}&to=${to}`).then(r=>{ PageProgress.show(92,'Rendering charts…'); return r; }),
    ]);

    // api() returns null when the server responds with 401 (session expired).
    // The handle401() in shared.js already shows the modal and redirects —
    // just stop here silently so we don't crash into "Failed to load dashboard data".
    if (!d || !inv || !wp || !sp || !rb) return;

    // Check for zero-data period (all KPIs are zero, no trends)
    const hasData = d.kpis && (d.kpis.total_revenue > 0 || d.kpis.total_purchases > 0 || d.kpis.total_production > 0);
    if (!hasData && (!d.trends || d.trends.length === 0)) {
      document.getElementById('kpiGrid').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:2.5rem 1rem;color:var(--muted)">
          <div style="font-size:2rem;margin-bottom:.5rem">📭</div>
          <div style="font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:.25rem">No data for this period</div>
          <div style="font-size:.85rem">No sales, purchases or production entries found between <strong>${from}</strong> and <strong>${to}</strong>.</div>
          <div style="font-size:.8rem;margin-top:.5rem">Try a wider date range or check the Daily Entry page.</div>
        </div>`;
      hideAllChartLoaders();
      PageProgress.done();
      return;
    }
    const k=d.kpis, raw=inv.raw_material;

    // ── Show Rent toggle ─────────────────────────────────────────────────────
    // Uses the shared loadGlobalConfig / getConfig pattern from shared.js.
    // No extra network call — config is cached after first load.
    await loadGlobalConfig();
    const showRent = (getConfig('show_rent_dashboard', '0') === '1');
    // ────────────────────────────────────────────────────────────────────────

    hideAllChartLoaders();
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    // Outstanding figures are all-time snapshots, not period-filtered
    const recvAmt  = d.summary?.invoices?.outstanding_amount || 0;
    const recvCnt  = d.summary?.invoices?.partial_count || 0;
    const payAmt   = showRent
      ? d.summary?.purchases?.outstanding_payable || 0
      : (d.summary?.purchases?.outstanding_payable || 0) - (d.summary?.purchases?.rent_outstanding || 0);
    const suppOut  = d.summary?.purchases?.supplier_outstanding || 0;
    const wageOut  = d.summary?.purchases?.wages_outstanding || 0;
    const rentOut  = d.summary?.purchases?.rent_outstanding || 0;
    const sackOut  = d.summary?.purchases?.sack_outstanding || 0;
    const tranOut  = d.summary?.purchases?.transport_outstanding || 0;

    document.getElementById('kpiGrid').innerHTML=`
      <div class="kpi" title="Cash collected from customers · ${from} → ${to}">
        <div class="kpi-icon">💰</div>
        <div class="kpi-body">
          <div class="kpi-label">Revenue Received</div>
          <div class="kpi-value">${tipSpan(compactKES(k.total_revenue), fmtMoneyExact(k.total_revenue))}</div>
          <div class="kpi-sub ok"><span class="dot" style="background:var(--g500)"></span><span>Cash received · ${from} to ${to}</span></div>
        </div>
      </div>
      <div class="kpi ${(showRent?k.net_profit:k.gross_profit)<0?'danger':''}" title="${showRent?'Revenue minus Cost of Sales minus Rent Expense (Selected Period)':'Revenue minus Cost of Sales · Rent hidden (enable in Configuration)'} · ${from} → ${to}">
        <div class="kpi-icon">${(showRent?k.net_profit:k.gross_profit)<0?'📉':'📈'}</div>
        <div class="kpi-body">
          <div class="kpi-label">${showRent?'Net Profit':'Gross Profit'}</div>
          <div class="kpi-value">${tipSpan(compactKES(showRent?k.net_profit:k.gross_profit), fmtMoneyExact(showRent?k.net_profit:k.gross_profit))}</div>
          <div class="kpi-sub ${(showRent?k.net_profit:k.gross_profit)<0?'danger':'ok'}"><span class="dot" style="background:${(showRent?k.net_profit:k.gross_profit)<0?'var(--red)':'var(--g500)'}"></span><span>${showRent?k.net_margin_pct:k.gross_margin_pct}% ${showRent?'net':'gross'} margin</span></div>
        </div>
      </div>
      <div class="kpi" title="${showRent?'Wire + labour + sacks + transport + rent expense on items SOLD this period':'Wire + labour + sacks + transport on items SOLD this period · Rent is a separate overhead'}. Wire portion uses a period weighted-average cost/kg (KES ${fmt(k.weighted_wire_cost_per_kg,2)}/kg) since sold pieces aren't traced to one wire batch — this is a different figure from the Production tab's per-batch real cost. · ${from} → ${to}">
        <div class="kpi-icon">🧾</div>
        <div class="kpi-body">
          <div class="kpi-label">Cost of Sales</div>
          <div class="kpi-value">${tipSpan(compactKES(showRent?(k.direct_costs_sold+(parseFloat(rb.cost_breakdown?.rent_cost?.amount)||0)):k.direct_costs_sold), fmtMoneyExact(showRent?(k.direct_costs_sold+(parseFloat(rb.cost_breakdown?.rent_cost?.amount)||0)):k.direct_costs_sold))}</div>
          <div class="kpi-sub"><span class="dot"></span><span>${k.total_revenue>0?(100-k.net_margin_pct).toFixed(1):0}% of revenue · est.</span></div>
        </div>
      </div>
      <div class="kpi" title="Wire used in production (real batch cost, same figure as the Production tab total) · ${from} → ${to}">
        <div class="kpi-icon">⚙️</div>
        <div class="kpi-body">
          <div class="kpi-label">Production</div>
          <div class="kpi-value">${tipSpan(fmtKg(k.total_kgs_produced), fmtKgExact(k.total_kgs_produced))}</div>
          <div class="kpi-sub"><span class="dot"></span><span>${tipSpan(compactKES(k.total_production_cost), fmtMoneyExact(k.total_production_cost))} cost · ${k.total_pieces_sold} sold</span></div>
        </div>
      </div>
      <div class="kpi ${raw.low_stock?(raw.out_of_stock?'danger':'warning'):''}" title="All-time · Bought: ${fmtKg(raw.total_bought_kgs)} · Used: ${fmtKg(raw.total_used_kgs)}">
        <div class="kpi-icon">${raw.out_of_stock?'🚨':raw.low_stock?'⚠️':'📦'}</div>
        <div class="kpi-body">
          <div class="kpi-label">Raw Stock</div>
          <div class="kpi-value">${tipSpan(fmtKg(raw.remaining_kgs), fmtKgExact(raw.remaining_kgs))}</div>
          <div class="kpi-sub ${raw.out_of_stock?'danger':raw.low_stock?'warn':''}"><span class="dot" style="background:${raw.out_of_stock?'var(--red)':raw.low_stock?'var(--amber)':'var(--g500)'}"></span><span>${raw.out_of_stock?'Out of stock':raw.remaining_pct+'% remaining'}</span></div>
        </div>
      </div>

      <div class="kpi info" title="Highest revenue piece this period · ${from} → ${to}">
        <div class="kpi-icon">🏆</div>
        <div class="kpi-body">
          <div class="kpi-label">Top Piece</div>
          <div class="kpi-value text-val">${escHtml(k.best_piece||'—')}</div>
          <div class="kpi-sub ok"><span class="dot" style="background:var(--blue)"></span><span>${compactKES(k.best_piece_revenue)}</span></div>
        </div>
      </div>
      <div class="kpi info" title="Highest paying customer this period · ${from} → ${to}">
        <div class="kpi-icon">⭐</div>
        <div class="kpi-body">
          <div class="kpi-label">Top Customer</div>
          <div class="kpi-value text-val">${escHtml(k.best_customer||'—')}</div>
          <div class="kpi-sub ok"><span class="dot" style="background:var(--blue)"></span><span>${compactKES(k.best_customer_revenue)}</span></div>
        </div>
      </div>
      <div class="kpi ${recvAmt>0?'amber':''}" title="Invoices in this period with outstanding balances · ${from} → ${to}">
        <div class="kpi-icon">📥</div>
        <div class="kpi-body">
          <div class="kpi-label">Receivables</div>
          <div class="kpi-value">${compactKES(recvAmt)}</div>
          <div class="kpi-sub ${recvAmt>0?'warn':'ok'}"><span class="dot" style="background:${recvAmt>0?'var(--amber)':'var(--g500)'}"></span><span>${recvCnt} invoice${recvCnt!==1?'s':''} outstanding</span></div>
        </div>
      </div>
      <div class="kpi ${payAmt>0?'danger':''}" title="Period costs incurred vs paid · Suppliers: ${fmtKES(suppOut)} · Wages: ${fmtKES(wageOut)} · Transport: ${fmtKES(tranOut)} · Sack: ${fmtKES(sackOut)}${showRent?' · Outstanding Rent Balance: '+fmtKES(rentOut):''}">
        <div class="kpi-icon">📤</div>
        <div class="kpi-body">
          <div class="kpi-label">Payables</div>
          <div class="kpi-value">${compactKES(payAmt)}</div>
          <div class="kpi-sub ${payAmt>0?'danger':'ok'}"><span class="dot" style="background:${payAmt>0?'var(--red)':'var(--g500)'}"></span><span>${payAmt>0?'Unpaid this period':'All settled'}</span></div>
        </div>
      </div>`;

    const trendRows = compactTrendData(d.trends || [])
      .filter(t => t.revenue > 0 || t.production > 0); // skip days with no activity
    const labels = trendRows.map(t=>t.label);
    const revs   = trendRows.map(t=>t.revenue);
    const prods  = trendRows.map(t=>t.production);

    /* Revenue trend — line */
    destroyChart('revenueChart');
    const revHasData = labels.length > 0;
    setChartViewport('revenueChart', { xPoints: labels.length });
    if (!revHasData) {
      showNoData('revenueChart');
    } else {
      chartRegistry.set('revenueChart', new Chart(document.getElementById('revenueChart'),{
        type:'line',
        data:{ labels, datasets:[{
          label:'Revenue', data:revs, borderColor:'#1e9a62',
          backgroundColor:'rgba(30,154,98,.08)', borderWidth:2.5,
          fill:true, tension:.4, spanGaps:true,
          pointRadius:labels.length > 60 ? 1 : 3, pointHoverRadius:5,
          pointBackgroundColor:'#1e9a62', pointBorderColor:'#fff', pointBorderWidth:2
        }]},
        options: cartesianOpts({
          plugins:{
            datalabels: labels.length > 30 ? { display: false } : endLabel('#1e9a62'),
            tooltip:{ callbacks:{ label: ctx=> ctx.parsed.y !== null ? 'Revenue: '+fmtMoneyExact(ctx.parsed.y) : 'No data' }}
          },
          scales:{ x:BASE_SCALES.x, y:{...BASE_SCALES.y, min:0, ticks:{...BASE_SCALES.y.ticks, callback:v=>smartVal(v)}} }
        }, labels.length)
      }));
    }

    /* Production — bar */
    destroyChart('prodChart');
    const prodHasData = labels.length > 0;
    setChartViewport('prodChart', { xPoints: labels.length });
    if (!prodHasData) {
      showNoData('prodChart');
    } else {
      chartRegistry.set('prodChart', new Chart(document.getElementById('prodChart'),{
        type:'bar',
        data:{ labels, datasets:[{
          label:'Wire Used', data:prods,
          backgroundColor:'rgba(217,119,6,.65)', borderRadius:labels.length > 30 ? 2 : 4,
          hoverBackgroundColor:'rgba(217,119,6,.85)'
        }]},
        options: cartesianOpts({
          plugins:{
            datalabels: labels.length > 30 ? { display: false } : endLabelKg('#d97706'),
            tooltip:{ callbacks:{ label: ctx=> ctx.parsed.y !== null ? 'Wire: '+fmtKgExact(ctx.parsed.y) : 'No data' }}
          },
          scales:{ x:BASE_SCALES.x, y:{...BASE_SCALES.y, min:0, ticks:{...BASE_SCALES.y.ticks, callback:v=>fmtKg(v)}} }
        }, labels.length)
      }));
    }

    /* Top Customers — horizontal bar */
    destroyChart('bestCustomersChart');
    const custData=d.analytics?.best_customers || [];
    setChartViewport('bestCustomersChart');
    chartRegistry.set('bestCustomersChart', new Chart(document.getElementById('bestCustomersChart'),{
      type:'bar',
      data:{
        labels:custData.map(c=>c.customer_name||'Unknown'),
        datasets:[{ label:'Revenue', data:custData.map(c=>numVal(c.total_revenue)),
          backgroundColor:'rgba(34,197,94,.65)', borderRadius:4, hoverBackgroundColor:'rgba(34,197,94,.85)' }]
      },
      options: cartesianOpts({
        indexAxis:'y',
        plugins:{
          datalabels: endLabel('#1e9a62'),
          tooltip:{ callbacks:{ label: ctx=>{
            const tot=(ctx.dataset.data || []).reduce((sum, item) => sum + numVal(item), 0);
            return [`Revenue: ${fmtMoneyExact(ctx.parsed.x)}`,`Share: ${((ctx.parsed.x/tot)*100).toFixed(1)}%`];
          }}},
          zoom: {
            pan:  { enabled: true, mode: 'y', modifierKey: null },
            zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'y' },
            limits: { y: { min: 'original', max: 'original' } }
          }
        },
        scales:{
          x:{...BASE_SCALES.x, grid:{color:'#f1f5f9',borderDash:[2,2]}, ticks:{...BASE_SCALES.x.ticks, callback:v=>smartVal(v)}},
          y:{...BASE_SCALES.y, grid:{display:false}}
        }
      })
    }));

    /* Revenue by Gauge — doughnut */
    destroyChart('gaugeBreakdownChart');
    const gd=d.analytics?.gauge_breakdown || [];
    setChartViewport('gaugeBreakdownChart', { circularItems: gd.length });
    chartRegistry.set('gaugeBreakdownChart', new Chart(document.getElementById('gaugeBreakdownChart'),{
      type:'doughnut',
      data:{ labels:gd.map(g=>g.gauge_source),
             datasets:[{ data:gd.map(g=>numVal(g.total_revenue)), backgroundColor:PALETTE, borderWidth:0 }] },
      options: circularOpts({
        plugins:{
          legend: legendOpts(),
          datalabels: pctLabel(),
          tooltip:{ callbacks:{ label: ctx=>{
            const tot=(ctx.dataset.data || []).reduce((sum, item) => sum + numVal(item), 0);
            return `${ctx.label}: ${fmtMoneyExact(ctx.parsed)} (${((ctx.parsed/tot)*100).toFixed(1)}%)`;
          }}}
        }
      })
    }));

    /* Production Staff Output — bar */
    destroyChart('workerProductionChart');
    const wkrs=[
      ...(wp.operators||[]).map(o=>({...o,label:`${o.worker_name} (Op)`})),
      ...(wp.knucklers||[]).map(k=>({...k,label:`${k.worker_name} (Kn)`}))
    ];
    setChartViewport('workerProductionChart', { xPoints: wkrs.length });
    chartRegistry.set('workerProductionChart', new Chart(document.getElementById('workerProductionChart'),{
      type:'bar',
      data:{
        labels:wkrs.map(w=>w.label),
        datasets:[{ label:'Pieces', data:wkrs.map(w=>numVal(w.total_pieces)),
          backgroundColor:'rgba(99,102,241,.65)', borderRadius:3 }]
      },
      options: cartesianOpts({
        plugins:{ datalabels: endLabel('#6366f1') },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10},color:'#5a7a68',maxRotation:45}},
          y:{grid:{color:'#dde9e3'},ticks:{font:{size:10},color:'#6366f1'}}
        }
      })
    }));

    /* Sales Mix — pie */
    destroyChart('salesByPieceChart');
    const topP=sp.sales_data || [];
    setChartViewport('salesByPieceChart', { circularItems: topP.length });
    chartRegistry.set('salesByPieceChart', new Chart(document.getElementById('salesByPieceChart'),{
      type:'pie',
      data:{
        labels:topP.map(p=>`${p.piece_name} (${p.length_m}m)`),
        datasets:[{ data:topP.map(p=>numVal(p.total_pieces)), backgroundColor:PALETTE, borderWidth:0 }]
      },
      options: circularOpts({
        plugins:{
          legend: legendOpts(),
          datalabels: pctLabel(),
          tooltip:{ callbacks:{ label: ctx=>{
            const tot=(ctx.dataset.data || []).reduce((sum, item) => sum + (parseFloat(item) || 0), 0);
            const current=parseFloat(ctx.parsed) || 0;
            const pct=tot ? ((current / tot) * 100).toFixed(1) : '0.0';
            const salesItem = topP[ctx.dataIndex] || {};
            const salesValue = parseFloat(salesItem.total_revenue) || 0;
            return [
              `${ctx.label}`,
              `Pieces sold: ${current}`,
              `Sales: ${fmtMoneyExact(salesValue)}`,
              `Share: ${pct}%`
            ];
          }}}
        }
      })
    }));

    /* Revenue Breakdown — doughnut
       When rent is ON:  Wire | Labour | Transport | Rent Expense (Period) | Net Profit
       When rent is OFF: Wire | Labour | Transport | Gross Profit
       Controlled by show_rent_dashboard config — no backend logic changed. */
    destroyChart('revenueBreakdownChart');
    const bd=rb.cost_breakdown;
    const bdLabels = showRent
      ? ['Wire Cost','Labour & Sacks','Transport to Market','Rent Expense (Period)','Net Profit']
      : ['Wire Cost','Labour & Sacks','Transport to Market','Gross Profit'];
    const bdData = showRent
      ? [bd.wire_cost.amount, bd.conversion_cost.amount, bd.transport_cost.amount, bd.rent_cost.amount, bd.net_profit.amount]
      : [bd.wire_cost.amount, bd.conversion_cost.amount, bd.transport_cost.amount, rb.summary.total_revenue - (bd.wire_cost.amount + bd.conversion_cost.amount + bd.transport_cost.amount)];
    const bdPcts = showRent
      ? [bd.wire_cost.percentage, bd.conversion_cost.percentage, bd.transport_cost.percentage, bd.rent_cost.percentage, bd.net_profit.percentage]
      : [bd.wire_cost.percentage, bd.conversion_cost.percentage, bd.transport_cost.percentage,
         rb.summary.total_revenue > 0 ? parseFloat(((rb.summary.total_revenue - bd.wire_cost.amount - bd.conversion_cost.amount - bd.transport_cost.amount) / rb.summary.total_revenue * 100).toFixed(1)) : 0];
    const bdColors = showRent
      ? ['#dc2626','#f59e0b','#3b82f6','#8b5cf6','#10b981']
      : ['#dc2626','#f59e0b','#3b82f6','#10b981'];
    chartRegistry.set('revenueBreakdownChart', new Chart(document.getElementById('revenueBreakdownChart'),{
      type:'doughnut',
      data:{
        labels: bdLabels,
        datasets:[{ data: bdData, backgroundColor: bdColors, borderWidth:0 }]
      },
      options: circularOpts({
        plugins:{
          legend: legendOpts(),
          datalabels: pctLabel(),
          tooltip:{ callbacks:{ label: ctx=>{
            return `${ctx.label}: ${fmtMoneyExact(ctx.parsed)} (${bdPcts[ctx.dataIndex]}%)`;
          }}}
        }
      })
    }));

    /* Cost Breakdown — bar
       When rent is ON:  Wire | Labour | Transport | Rent Expense (Period)
       When rent is OFF: Wire | Labour | Transport (rent bar completely hidden) */
    destroyChart('costAnalysisChart');
    const barLabels = showRent
      ? ['Wire Cost','Labour & Sacks','Transport to Market','Rent Expense (Period)']
      : ['Wire Cost','Labour & Sacks','Transport to Market'];
    const barData = showRent
      ? [bd.wire_cost.amount, bd.conversion_cost.amount, bd.transport_cost.amount, bd.rent_cost.amount]
      : [bd.wire_cost.amount, bd.conversion_cost.amount, bd.transport_cost.amount];
    const barColors = showRent
      ? ['rgba(220,38,38,.65)','rgba(245,158,11,.65)','rgba(59,130,246,.65)','rgba(139,92,246,.65)']
      : ['rgba(220,38,38,.65)','rgba(245,158,11,.65)','rgba(59,130,246,.65)'];
    chartRegistry.set('costAnalysisChart', new Chart(document.getElementById('costAnalysisChart'),{
      type:'bar',
      data:{
        labels: barLabels,
        datasets:[{ label:'Cost (KES)',
          data:    barData,
          backgroundColor: barColors,
          borderRadius:3
        }]
      },
      options: cartesianOpts({
        plugins:{ datalabels: endLabel('#374151') },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10},color:'#5a7a68'}},
          y:{grid:{color:'#dde9e3'},ticks:{font:{size:10},color:'#64748b',callback:v=>smartVal(v)}}
        }
      })
    }));

    /* Stock overview */
    const fg=inv.finished_goods||[];
    inv.total_stock_value = fg.reduce((s,f)=>s+(parseFloat(f.stock_value)||0),0);
    document.getElementById('stockOverview').innerHTML=`
      <div style="margin-bottom:1rem">
        <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:.35rem">
          <span>Raw wire stock</span><span>${fmtKg(raw.remaining_kgs)} of ${fmtKg(raw.total_bought_kgs)}</span>
        </div>
        <div style="background:var(--border);border-radius:99px;height:10px;overflow:hidden">
          <div style="width:${Math.min(raw.remaining_pct,100)}%;height:100%;border-radius:99px;transition:.4s;
            background:${raw.out_of_stock?'var(--red)':raw.low_stock?'var(--amber)':'var(--g500)'}"></div>
        </div>
        ${raw.low_stock?`<div style="font-size:.75rem;color:${raw.out_of_stock?'var(--red)':'var(--amber)'};margin-top:.35rem">
          ${raw.out_of_stock?'⚠ Out of stock!':'⚠ Low stock — below threshold of '+fmtKg(raw.threshold)}</div>`:''}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:.75rem">
        ${fg.map(f=>`<div style="background:var(--g50);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem">
            <div style="font-size:.8rem;font-weight:600;color:var(--ink);margin-bottom:.15rem">${escHtml(f.name)}</div>
            <div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem;display:flex;align-items:center;gap:.3rem">
              <span style="background:var(--border);border-radius:4px;padding:.05rem .35rem;font-weight:600;color:var(--ink);letter-spacing:.03em">G${escHtml(f.gauge||'—')}</span>
              <span>gauge</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted)">
              <span>Available</span><span class="mono" style="color:var(--ink);font-weight:600">${fmt(f.available_pieces)} pcs</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-top:.2rem">
              <span>Value</span><span class="mono">${smartVal(f.stock_value)} KES</span>
            </div>
            <div style="margin-top:.4rem">
              ${f.available_pieces<=0?'<span class="badge badge-red">Out of Stock</span>':
                f.available_pieces<5?'<span class="badge badge-amber">Low</span>':
                '<span class="badge badge-green">In Stock</span>'}
            </div>
          </div>`).join('')}
      </div>
      <div style="margin-top:.75rem;font-size:.8rem;color:var(--muted)">
        Total stock value: <strong class="mono">${smartVal(inv.total_stock_value)} KES</strong>
      </div>`;

    PageProgress.done();
    await loadStatus();

    // ── Smart bell notifications — fire from fresh dashboard data ────────────
    _fireSmartNotifs({ d, inv, k, raw, recvAmt, recvCnt, payAmt });
  } catch(e){
    console.error('Dashboard load error:',e);
    PageProgress.error();
    showToast('Failed to load dashboard data','error');
  } finally {
    _dashLoading = false;
  }
}

async function loadStatus(){
  try{
    const s=await api('GET','/daily/status');
    const render=(obj,id)=>{
      const el=document.getElementById(id); if(!el)return;
      el.innerHTML=[
        obj.purchases ?'<span style="color:var(--g600)">✓ Purchases</span>':'<span style="color:var(--amber)">⚠ Purchases</span>',
        obj.production?'<span style="color:var(--g600)">✓ Production</span>':'<span style="color:var(--amber)">⚠ Production</span>',
        obj.sales     ?'<span style="color:var(--g600)">✓ Sales</span>'    :'<span style="color:var(--amber)">⚠ Sales</span>',
      ].join(' ');
    };
    render(s.yesterday,'yStatus'); render(s.today,'tStatus');
  }catch(e){}
}

/* ═══════════════════════════════════════════════════════════════
   SMART BELL NOTIFICATIONS — fired on each dashboard load
   Only posts if condition is notable; deduped by title+day
═══════════════════════════════════════════════════════════════ */
const _notifPosted = new Set(); // session-level dedup (reset on page load)
async function _postSmartNotif(payload) {
  const key = (payload.title || '') + new Date().toDateString();
  if (_notifPosted.has(key)) return;
  _notifPosted.add(key);
  try {
    await api('POST', '/notifications', { ...payload, roleTarget: 'owner' });
    if (typeof _loadGlobalNotifs === 'function') setTimeout(_loadGlobalNotifs, 500);
  } catch(_) {}
}

async function _fireSmartNotifs({ d, inv, k, raw, recvAmt, recvCnt, payAmt }) {
  const fg = inv.finished_goods || [];

  // 1. Stock outs — each out-of-stock product gets its own alert
  const stockOuts = fg.filter(f => (f.available_pieces || 0) <= 0);
  for (const f of stockOuts) {
    await _postSmartNotif({
      type: 'alert', category: 'stock_out',
      title: `🚨 Stock Out — ${f.name}`,
      message: `${f.name} (Gauge ${f.gauge || '—'}) is completely out of stock. Restock immediately.`,
    });
  }

  // 2. Low stock (not zero) — single summary if multiple items low
  const lowStock = fg.filter(f => f.available_pieces > 0 && f.available_pieces < 5);
  if (lowStock.length) {
    await _postSmartNotif({
      type: 'warn', category: 'stock_low',
      title: `⚠ Low Stock — ${lowStock.length} product${lowStock.length > 1 ? 's' : ''}`,
      message: lowStock.map(f => `${f.name}: ${f.available_pieces} pcs left`).join(' · '),
    });
  }

  // 3. Raw wire low or out
  if (raw.out_of_stock) {
    await _postSmartNotif({
      type: 'alert', category: 'stock_out',
      title: '🚨 Raw Wire — Out of Stock',
      message: `Wire stock is at 0 kg. Production is at risk. Buy wire urgently.`,
    });
  } else if (raw.low_stock) {
    await _postSmartNotif({
      type: 'warn', category: 'stock_low',
      title: `⚠ Raw Wire Low — ${fmtKg(raw.remaining_kgs)} remaining`,
      message: `Only ${raw.remaining_pct}% of wire stock left (threshold: ${fmtKg(raw.threshold)}). Consider restocking.`,
    });
  }

  // 4. Outstanding receivables (period-filtered — only invoices in selected period)
  if (recvAmt > 0 && recvCnt > 0) {
    await _postSmartNotif({
      type: recvAmt > 50000 ? 'alert' : 'warn', category: 'sales',
      title: `📥 Receivables — ${fmtKES(recvAmt)} This Period`,
      message: `${recvCnt} invoice${recvCnt !== 1 ? 's' : ''} raised this period still unpaid, totalling ${fmtKES(recvAmt)}. Follow up with customers.`,
    });
  }

  // 5. Outstanding payables (period-filtered — costs incurred vs paid in selected period)
  if (payAmt > 0) {
    await _postSmartNotif({
      type: payAmt > 100000 ? 'alert' : 'warn', category: 'sales',
      title: `📤 Payables — ${fmtKES(payAmt)} This Period`,
      message: `Period costs outstanding: ${fmtKES(payAmt)} (suppliers, wages, transport, sack). Check obligations for this period.`,
    });
  }

  // 6. Best customer highlight (when there is meaningful revenue)
  if (k.best_customer && k.best_customer_revenue > 0) {
    await _postSmartNotif({
      type: 'info', category: 'sales',
      title: `⭐ Top Customer — ${k.best_customer}`,
      message: `${k.best_customer} is your highest-value customer this period with ${fmtKES(k.best_customer_revenue)} in revenue.`,
    });
  }

  // 7. Best performing gauge (highest revenue gauge from gauge_breakdown)
  const gd = d.analytics?.gauge_breakdown || [];
  if (gd.length) {
    const topG = gd.reduce((a, b) => (parseFloat(b.total_revenue) > parseFloat(a.total_revenue) ? b : a), gd[0]);
    if (topG && parseFloat(topG.total_revenue) > 0) {
      await _postSmartNotif({
        type: 'info', category: 'sales',
        title: `📊 Top Gauge — ${topG.gauge_source}`,
        message: `Gauge ${topG.gauge_source} is your best performer this period with ${fmtKES(topG.total_revenue)} in sales.`,
      });
    }
  }

  // 8. Best performing piece type
  if (k.best_piece && k.best_piece_revenue > 0) {
    await _postSmartNotif({
      type: 'info', category: 'sales',
      title: `🏆 Top Piece — ${k.best_piece}`,
      message: `${k.best_piece} is your best-selling piece type with ${fmtKES(k.best_piece_revenue)} revenue this period.`,
    });
  }
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
// Global bell with analytic tips is handled by layout.js _injectGlobalAnalyticTips()

if (user.role==='admin') {
  loadAdminDashboard();
} else if (user.role==='owner') {
  function _localDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  // Restore last-used period from sessionStorage, but only if toDate is still today
  // (stale sessions from yesterday would shift all dates one day behind)
  const _savedFrom = sessionStorage.getItem('dash_fromDate');
  const _savedTo   = sessionStorage.getItem('dash_toDate');
  const toD = new Date();
  const _todayStr = _localDateStr(toD);
  const _isStale  = _savedTo && _savedTo !== _todayStr;
  // 7 Days = today-6 to today = 7 inclusive calendar days (same fix as applyPreset)
  const fromD = new Date(toD.getFullYear(), toD.getMonth(), toD.getDate()-6);
  document.getElementById('toDate').value   = (!_isStale && _savedTo)   ? _savedTo   : _todayStr;
  document.getElementById('fromDate').value = (!_isStale && _savedFrom) ? _savedFrom : _localDateStr(fromD);
  if (_isStale) {
    // Saved dates are from a previous day — clear them so presets recalculate from today
    sessionStorage.removeItem('dash_fromDate');
    sessionStorage.removeItem('dash_toDate');
  }
  if (!_isStale && (_savedFrom || _savedTo)) {
    document.querySelectorAll('.period-preset').forEach(b => b.classList.remove('active'));
  }
  document.getElementById('fromDate').addEventListener('change', () => {
    document.querySelectorAll('.period-preset').forEach(b => b.classList.remove('active'));
    sessionStorage.setItem('dash_fromDate', document.getElementById('fromDate').value);
  });
  document.getElementById('toDate').addEventListener('change', () => {
    document.querySelectorAll('.period-preset').forEach(b => b.classList.remove('active'));
    sessionStorage.setItem('dash_toDate', document.getElementById('toDate').value);
  });
  loadDash();
} else {
  loadWorkerDashboard();
  setInterval(loadWorkerDashboard, 30000);
  window.addEventListener('focus', loadWorkerDashboard);
}

window.addEventListener('beforeunload',()=>{chartRegistry.forEach(c=>{try{c.destroy();}catch(e){}});chartRegistry.clear();});

/* ═══════════════════════════════════════════════════════════════
   P&L PDF EXPORT — mirrors exactly what the dashboard shows
═══════════════════════════════════════════════════════════════ */
async function exportPnLPDF() {
  const from = document.getElementById('fromDate')?.value;
  const to   = document.getElementById('toDate')?.value;
  if (!from || !to) { showToast('Please select a date range first.', 'error'); return; }

  const btn = document.getElementById('plPdfBtn');
  const origHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span>&#x23F3;</span>Wait...';

  try {
    await loadGlobalConfig();
    const showRent = (getConfig('show_rent_dashboard', '0') === '1');

    const [d, rb] = await Promise.all([
      api('GET', `/dashboard?from=${from}&to=${to}`),
      api('GET', `/revenue-breakdown?from=${from}&to=${to}`),
    ]);
    if (!d || !rb) { showToast('Could not load data for P&L report.', 'error'); return; }

    const k  = d.kpis;
    const bd = rb.cost_breakdown;

    const bizName   = getConfig('business_name',  'IMARA LINKS') || 'IMARA LINKS';
    const bizSlogan = getConfig('business_slogan', 'Built Strong By IMARA') || 'Built Strong By IMARA';

    // Figures
    const revenue     = parseFloat(k.total_revenue)            || 0;
    const costOfSales = parseFloat(k.direct_costs_sold)        || 0;
    const grossProfit = parseFloat(k.gross_profit)             || 0;
    const grossMargin = parseFloat(k.gross_margin_pct)         || 0;
    const netProfit   = parseFloat(k.net_profit)               || 0;
    const netMargin   = parseFloat(k.net_margin_pct)           || 0;
    const wireCost    = parseFloat(bd.wire_cost?.amount)       || 0;
    const convCost    = parseFloat(bd.conversion_cost?.amount) || 0;
    const tranCost    = parseFloat(bd.transport_cost?.amount)  || 0;
    const rentCost    = parseFloat(bd.rent_cost?.amount)       || 0;

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF('p', 'mm', 'a4');
    const PW = 210, PH = 297, ML = 14, MR = 196, TW = MR - ML;

    // Palette
    const G    = [30, 154, 98];   // primary green
    const DG   = [20, 100, 65];   // dark green
    const W    = [255, 255, 255];
    const INK  = [22, 22, 22];
    const MUTE = [100, 100, 100];
    const PALE = [210, 240, 225];
    const BGLT = [240, 250, 245];
    const RED  = [190, 30, 30];

    const fmtK = v => 'KES ' + Number(v).toLocaleString('en-KE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const pct  = v => Number(v).toFixed(1) + '%';

    // ═══════════════════════════════════════════
    // HEADER — full bleed green, no divider line
    // ═══════════════════════════════════════════
    const BAND = 52;
    doc.setFillColor(...G);
    doc.rect(0, 0, PW, BAND, 'F');

    // Subtle dark accent strip at very top
    doc.setFillColor(...DG);
    doc.rect(0, 0, PW, 3, 'F');

    // ── Logo (circular) ─────────────────────
    const LX = 10, LY = 8, LD = 36;
    let logoLoaded = false;
    try {
      const logoDataUrl = await new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        const t = setTimeout(() => rej('timeout'), 5000);
        img.onload = () => {
          clearTimeout(t);
          const cv = document.createElement('canvas');
          const cx = cv.getContext('2d');
          const sz = 500; cv.width = cv.height = sz;
          cx.beginPath(); cx.arc(sz/2, sz/2, sz/2, 0, Math.PI*2); cx.closePath(); cx.clip();
          const ar = img.width / img.height;
          const zoom = 1.26; // crop out the white margin around the circular badge
          let dW, dH, dX, dY;
          if (ar > 1) { dH=sz*zoom; dW=sz*ar*zoom; dX=-(dW-sz)/2; dY=-(dH-sz)/2; }
          else        { dW=sz*zoom; dH=sz/ar*zoom; dX=-(dW-sz)/2; dY=-(dH-sz)/2; }
          cx.drawImage(img, dX, dY, dW, dH);
          res(cv.toDataURL('image/png'));
        };
        img.onerror = () => { clearTimeout(t); rej('err'); };
        img.src = 'logo.png?' + Date.now();
      });
      doc.addImage(logoDataUrl, 'PNG', LX, LY, LD, LD);
      logoLoaded = true;
    } catch(e) {}

    // ── Business name + slogan (LEFT of header) ─
    const NX = logoLoaded ? LX + LD + 6 : LX;
    const NY = LY + 9;

    // Business name — large, white, bold
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.setTextColor(...W);
    doc.text(bizName.toUpperCase(), NX, NY);

    // Hairline under name
    const nameW = doc.getTextWidth(bizName.toUpperCase());
    doc.setDrawColor(...PALE); doc.setLineWidth(0.3);
    doc.line(NX, NY + 1.5, NX + nameW, NY + 1.5);

    // Slogan — lighter, smaller
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...PALE);
    doc.text(bizSlogan, NX, NY + 9);

    // ── Report type + period (RIGHT of header) ─
    // RIGHT column starts at midpoint
    const RX = PW / 2 + 8;
    const RY = LY + 8;

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(14);
    doc.setTextColor(...W);
    doc.text('PROFIT & LOSS STATEMENT', MR, RY, { align: 'right' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...PALE);
    doc.text('Period:  ' + from + '  to  ' + to, MR, RY + 9, { align: 'right' });
    doc.text(
      'Generated:  ' + new Date().toLocaleDateString('en-KE') + '  ' +
      new Date().toLocaleTimeString('en-KE', { hour: '2-digit', minute: '2-digit' }),
      MR, RY + 16, { align: 'right' }
    );

    let y = BAND + 10;

    // ═══════════════════════════════════════════
    // TABLE HELPER using autoTable
    // Each section is one autoTable call — clean
    // columns: label (left) | amount (right)
    // ═══════════════════════════════════════════

    const COL_L = TW * 0.62;  // label column width
    const COL_R = TW * 0.38;  // amount column width

    // Section header row style
    const sHead = (title) => [{
      label: title, amount: ''
    }];

    // Draw a section block as a real autoTable
    const drawTable = (rows, opts = {}) => {
      doc.autoTable({
        startY: y,
        margin: { left: ML, right: PW - MR },
        tableWidth: TW,
        columns: [
          { dataKey: 'label',  header: '' },
          { dataKey: 'amount', header: '' },
        ],
        body: rows,
        styles: {
          font: 'helvetica',
          fontSize: 9.5,
          cellPadding: { top: 2.8, bottom: 2.8, left: 4, right: 4 },
          lineColor: [220, 238, 228],
          lineWidth: 0.2,
          textColor: [...INK],
          valign: 'middle',
        },
        columnStyles: {
          label:  { cellWidth: COL_L, fontStyle: 'normal', textColor: [...MUTE] },
          amount: { cellWidth: COL_R, halign: 'right',     fontStyle: 'normal', textColor: [...INK] },
        },
        // Override per-row via didParseCell
        didParseCell: function(data) {
          const r = data.row.raw;
          if (r._type === 'section') {
            data.cell.styles.fillColor   = [...G];
            data.cell.styles.textColor   = [...W];
            data.cell.styles.fontStyle   = 'bold';
            data.cell.styles.fontSize    = 9.5;
            data.cell.styles.lineWidth   = 0;
            data.cell.styles.cellPadding = { top: 3, bottom: 3, left: 4, right: 4 };
          } else if (r._type === 'total') {
            data.cell.styles.fillColor   = [...BGLT];
            data.cell.styles.fontStyle   = 'bold';
            data.cell.styles.fontSize    = 10;
            data.cell.styles.textColor   = r._neg ? [...RED] : [...G];
            data.cell.styles.lineWidth   = 0.3;
            data.cell.styles.lineColor   = [...G];
          } else if (r._type === 'item') {
            data.cell.styles.fillColor   = [255, 255, 255];
            data.cell.styles.textColor   = data.column.dataKey === 'label' ? [...MUTE] : [...INK];
            data.cell.styles.fontStyle   = 'normal';
            data.cell.styles.lineColor   = [225, 240, 232];
          }
        },
        showHead: false,
      });
      y = doc.lastAutoTable.finalY + 6;
    };

    // ── INCOME ───────────────────────────────
    drawTable([
      { label: 'REVENUE', amount: '', _type: 'section' },
      { label: 'Revenue Received (Cash from Customers)', amount: fmtK(revenue), _type: 'total', _neg: false },
    ]);

    // ── COST OF SALES ─────────────────────────
    drawTable([
      { label: 'COST OF SALES', amount: '', _type: 'section' },
      { label: 'Wire / Raw Material Cost',         amount: fmtK(wireCost),    _type: 'item' },
      { label: 'Labour & Sacks (Conversion Cost)', amount: fmtK(convCost),    _type: 'item' },
      { label: 'Transport to Market',              amount: fmtK(tranCost),    _type: 'item' },
      { label: 'Total Cost of Sales',              amount: fmtK(costOfSales), _type: 'total', _neg: false },
    ]);

    // ── GROSS PROFIT ──────────────────────────
    drawTable([
      { label: 'GROSS PROFIT', amount: '', _type: 'section' },
      { label: 'Gross Profit  (' + pct(grossMargin) + ' gross margin)', amount: fmtK(grossProfit), _type: 'total', _neg: grossProfit < 0 },
    ]);

    // ── OPERATING EXPENSES (rent only if enabled) ─
    if (showRent && rentCost > 0) {
      drawTable([
        { label: 'OPERATING EXPENSES', amount: '', _type: 'section' },
        { label: 'Rent Expense (Period)',      amount: fmtK(rentCost), _type: 'item'  },
        { label: 'Total Operating Expenses',   amount: fmtK(rentCost), _type: 'total', _neg: false },
      ]);
    }

    // ── NET / BOTTOM-LINE PROFIT ──────────────
    const dispProfit = showRent ? netProfit   : grossProfit;
    const dispMargin = showRent ? netMargin   : grossMargin;
    const dispLabel  = showRent ? 'Net Profit': 'Gross Profit';
    const dispType   = showRent ? 'net'       : 'gross';
    drawTable([
      { label: showRent ? 'NET PROFIT' : 'BOTTOM LINE', amount: '', _type: 'section' },
      { label: dispLabel + '  (' + pct(dispMargin) + ' ' + dispType + ' margin)', amount: fmtK(dispProfit), _type: 'total', _neg: dispProfit < 0 },
    ]);

    // ═══════════════════════════════════════════
    // FOOTER — dark green band, slogan centred
    // ═══════════════════════════════════════════
    const FH   = 22;
    const FY   = PH - FH;
    doc.setFillColor(...DG);
    doc.rect(0, FY, PW, FH, 'F');

    // Accent strip at very bottom
    doc.setFillColor(...G);
    doc.rect(0, PH - 3, PW, 3, 'F');

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.setTextColor(...W);
    doc.text(bizSlogan.toUpperCase(), PW / 2, FY + 9, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    doc.setTextColor(...PALE);
    doc.text(
      bizName.toUpperCase() + '   |   ' + from + ' to ' + to,
      PW / 2, FY + 16, { align: 'center' }
    );

    const fileName = bizName.replace(/\s+/g, '_') + '_PnL_' + from + '_to_' + to + '.pdf';
    doc.save(fileName);
    showToast('P&L PDF exported');
  } catch(e) {
    console.error('P&L PDF error:', e);
    showToast('Failed to generate P&L PDF: ' + (e.message || 'Unknown error'), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHTML;
  }
}
</script>
