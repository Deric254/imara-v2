<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>System Health — IMARA LINKS</title>
<link rel="stylesheet" href="shared.css">
<style>
.health-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;margin-bottom:2rem}
.health-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.health-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px);transition:all .2s}
.status-indicator{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:.5rem;animation:pulse .2s}
.status-ok{background:#22c55e}
.status-warn{background:#f59e0b}
.status-error{background:#dc2626}
@keyframes pulse{0%{opacity:1}50%{opacity:.6}100%{opacity:1}}
.metric-label{font-size:.85rem;color:var(--muted);font-weight:500;margin-bottom:.25rem}
.metric-value{font-size:1.75rem;font-weight:700;margin-bottom:.5rem}
.metric-sub{font-size:.75rem;color:var(--g600);margin-top:.25rem}
.logs-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;max-height:400px;overflow-y:auto}
.log-entry{padding:.75rem;border-bottom:1px solid var(--border);font-size:.85rem;font-family:monospace}
.log-entry.error{background:rgba(220,38,38,.05);color:#dc2626}
.log-entry.warn{background:rgba(245,158,11,.05);color:#f59e0b}
.log-entry.info{background:rgba(59,130,246,.05);color:#3b82f6}
.log-time{color:var(--muted);margin-right:.5rem}
.btn-refresh{background:var(--g500);color:#fff;border:none;padding:.75rem 1.5rem;border-radius:6px;cursor:pointer;font-weight:600;transition:all .2s}
.btn-refresh:hover{background:var(--g600);transform:scale(1.02)}
.section-title{font-size:1.25rem;font-weight:700;margin-bottom:1rem;color:var(--ink)}
</style>
</head>
<body>
<div id="app"></div>
<script src="shared.js"></script>
<script src="layout.js"></script>
<script>
async function loadSystemHealth() {
  showPageLoader('Loading system health...');
  const user = requireAuth(['admin', 'owner']);
  if (!user) return;
  
  try {
    await loadGlobalConfig();
    
    // Fetch health data from all endpoints
    const [users, production, sales, invoices, payments, dbStats] = await Promise.all([
      api('GET', '/users').catch(() => []),
      api('GET', '/daily/production?from=2000-01-01&to=2099-12-31').catch(() => []),
      api('GET', '/daily/sales?from=2000-01-01&to=2099-12-31').catch(() => []),
      api('GET', '/invoices?from=2000-01-01&to=2099-12-31').catch(() => []),
      api('GET', '/reconciliation/summary?from=2000-01-01&to=2099-12-31').catch(() => {}),
      api('GET', '/db-stats').catch(() => null),
    ]);

    const activeUsers = (users || []).filter(u => u.active).length;
    const totalProduction = (production || []).length;
    const totalSales = (sales || []).length;
    const totalInvoices = (invoices || []).length;

    // Format DB file size
    function fmtBytes(b) {
      if (!b) return 'Unknown';
      if (b < 1024) return b + ' B';
      if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
      return (b/1048576).toFixed(2) + ' MB';
    }
    const dbSize = dbStats ? fmtBytes(dbStats.file_size_bytes) : 'N/A';
    const auditRows = dbStats?.counts?.audit_log ?? '—';
    const oldestRec = dbStats?.oldest_record || 'No records yet';

    const html = `
      <main class="page-content" style="padding:2rem">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem">
          <h1 style="margin:0">System Health Dashboard</h1>
          <button class="btn-refresh" onclick="location.reload()">🔄 Refresh</button>
        </div>

        <div class="section-title">Core Metrics</div>
        <div class="health-grid">
          <div class="health-card">
            <div class="metric-label">Active Users</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>${activeUsers}</div>
            <div class="metric-sub">out of ${(users || []).length} total</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Production Records</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>${totalProduction}</div>
            <div class="metric-sub">all time</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Sales Records</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>${totalSales}</div>
            <div class="metric-sub">all time</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Invoices</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>${totalInvoices}</div>
            <div class="metric-sub">all time</div>
          </div>
        </div>

        <div class="section-title" style="margin-top:2rem;display:flex;align-items:center;justify-content:space-between">
          <span>System Tester</span>
          <button class="btn-refresh" id="runCheckBtn" onclick="runSystemCheck()" style="padding:.5rem 1rem;font-size:.85rem">▶ Run Check</button>
        </div>
        <p style="font-size:.82rem;color:var(--muted);margin:-.6rem 0 1rem">
          Runs live checks against the real database — stock never oversold, wire used never exceeds wire
          bought, converted orders have a real sale behind them, invoices match their payments, no orphaned
          records. This reports exactly what it finds, including problems — it does not just show green.
        </p>
        <div id="systemCheckSummary" style="margin-bottom:1rem"></div>
        <div class="logs-container" id="systemCheckContainer">
          <div style="text-align:center;color:var(--muted);padding:2rem">Click "Run Check" to test the system now.</div>
        </div>

        <div class="section-title" style="margin-top:2rem">Database Health</div>
        <div class="health-grid">
          <div class="health-card">
            <div class="metric-label">DB File Size</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>${dbSize}</div>
            <div class="metric-sub">SQLite on disk</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Audit Log Rows</div>
            <div class="metric-value"><span class="status-indicator ${typeof auditRows === 'number' && auditRows > 5000 ? 'status-warn' : 'status-ok'}"></span>${auditRows}</div>
            <div class="metric-sub">${typeof auditRows === 'number' && auditRows > 5000 ? 'Growing large — consider export' : 'Healthy size'}</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Oldest Business Record</div>
            <div class="metric-value" style="font-size:1rem"><span class="status-indicator status-ok"></span>${oldestRec}</div>
            <div class="metric-sub">First sale/purchase/production</div>
          </div>
        </div>

        <div class="section-title" style="margin-top:2rem">System Status</div>
        <div class="health-grid">
          <div class="health-card">
            <div class="metric-label">API Connection</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>Connected</div>
            <div class="metric-sub">All ${(users||[]).length} users reachable</div>
          </div>
          <div class="health-card">
            <div class="metric-label">Database</div>
            ${dbStats
              ? (() => {
                  const sizeMB = dbStats.file_size_bytes / 1048576;
                  const auditHigh = (dbStats.counts?.audit_log || 0) > 5000;
                  const sizeHigh  = sizeMB > 50;
                  const warn = auditHigh || sizeHigh;
                  return `<div class="metric-value"><span class="status-indicator ${warn ? 'status-warn' : 'status-ok'}"></span>${warn ? 'Attention' : 'Healthy'}</div>
                  <div class="metric-sub">${sizeHigh ? `File is ${sizeMB.toFixed(1)} MB — consider archiving` : auditHigh ? 'Audit log is large — auto-trim active' : 'Size and records normal'}</div>`;
                })()
              : `<div class="metric-value"><span class="status-indicator status-ok"></span>Operational</div><div class="metric-sub">Stats unavailable</div>`
            }
          </div>
          <div class="health-card">
            <div class="metric-label">Authentication</div>
            <div class="metric-value"><span class="status-indicator status-ok"></span>Active</div>
            <div class="metric-sub">Signed in as ${escHtml(user.full_name || user.username)}</div>
          </div>
        </div>

        <div class="section-title" style="margin-top:2rem">Recent Activity</div>
        <div class="logs-container" id="logsContainer">
          <div style="text-align:center;color:var(--muted);padding:2rem">
            <div class="spinner" style="margin-bottom:1rem"></div>
            Loading activity log...
          </div>
        </div>

        <div class="section-title" style="margin-top:2rem;display:flex;align-items:center;justify-content:space-between">
          <span>Browser Errors (this device)</span>
          <button class="btn btn-sm" onclick="ErrorTracker.clearLocalErrors(); renderLocalErrors();">Clear</button>
        </div>
        <p style="font-size:.82rem;color:var(--muted);margin:-.4rem 0 .8rem">
          Anything that broke silently in this browser — e.g. a page that froze or a field that stopped
          responding — gets captured here automatically. If something misbehaves, check here right after;
          this list is specific to this device and isn't shared with the server logs above.
        </p>
        <div class="logs-container" id="localErrorsContainer"></div>
      </main>
    `;

    const content = renderLayout('system-health.html');
    if (content) {
      content.innerHTML = html;
      await loadAuditLog();
      renderLocalErrors();
    }
  } catch (e) {
    console.error('Failed to load system health:', e);
    showToast('Failed to load system health', 'error');
  } finally {
    hidePageLoader();
  }
}

async function runSystemCheck() {
  const btn = document.getElementById('runCheckBtn');
  const container = document.getElementById('systemCheckContainer');
  const summaryEl = document.getElementById('systemCheckSummary');
  btn.disabled = true; btn.textContent = '⏳ Running…';
  container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:2rem"><div class="spinner" style="margin-bottom:1rem"></div>Running live checks against the real database…</div>';
  summaryEl.innerHTML = '';

  try {
    const res = await api('GET', '/system-check');
    if (!res) return;
    const { summary, checks, generated_at } = res;

    const badge = (n, cls, label) => n > 0 ? `<span style="display:inline-flex;align-items:center;gap:.3rem;margin-right:1rem;font-weight:700;color:${cls}"><span class="status-indicator status-${cls==='#dc2626'?'error':cls==='#f59e0b'?'warn':'ok'}"></span>${n} ${label}</span>` : '';
    summaryEl.innerHTML = `
      <div style="font-size:.9rem">
        ${badge(summary.fail, '#dc2626', summary.fail === 1 ? 'issue needs attention' : 'issues need attention')}
        ${badge(summary.warn, '#f59e0b', summary.warn === 1 ? 'worth a look' : 'worth a look')}
        ${badge(summary.pass, '#16a34a', 'passing')}
      </div>
      <div style="font-size:.75rem;color:var(--muted);margin-top:.3rem">Checked ${fmtLocalDateTime(generated_at)}</div>`;

    container.innerHTML = checks.map(c => {
      const cls = c.status === 'fail' ? 'error' : c.status === 'warn' ? 'warn' : 'info';
      const icon = c.status === 'fail' ? '✕ NEEDS ATTENTION' : c.status === 'warn' ? '⚠ WORTH A LOOK' : '✓ PASS';
      return `
        <div class="log-entry ${cls}">
          <strong>${icon} — ${escHtml(c.label)}</strong>
          <div style="margin-top:.25rem;font-family:var(--font, inherit);font-size:.82rem">${escHtml(c.detail)}</div>
        </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<div style="text-align:center;color:var(--red);padding:2rem">Could not run the check: ${escHtml(e.error || 'unknown error')}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '▶ Run Check';
  }
}

function renderLocalErrors() {
  const container = document.getElementById('localErrorsContainer');
  if (!container) return;
  const errors = ErrorTracker.getLocalErrors();
  if (!errors.length) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">No errors captured on this device</div>';
    return;
  }
  container.innerHTML = errors.map(e => `
    <div class="log-entry error">
      <span class="log-time">[${fmtLocalDateTime(e.timestamp)}]</span>
      <strong>${escHtml(e.error || 'Error')}</strong>
      ${e.context?.kind ? ' · ' + escHtml(e.context.kind) : ''}
      ${e.context?.file ? ` · ${escHtml(e.context.file)}:${e.context.line || ''}` : ''}
      ${e.url ? `<div style="font-size:.75rem;color:var(--muted);margin-top:.15rem">${escHtml(e.url)}</div>` : ''}
    </div>
  `).join('');
}

async function loadAuditLog() {
  try {
    const logs = await api('GET', '/audit?limit=20');
    const container = document.getElementById('logsContainer');
    if (!container) return;
    
    if (!logs || logs.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">No activity yet</div>';
      return;
    }

    const html = logs.map(log => {
      const ts = fmtLocalDateTime(log.logged_at, {
        year: '2-digit', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
      const severity = log.action.includes('DELETE') ? 'error' : log.action.includes('CREATE') ? 'warn' : 'info';
      return `
        <div class="log-entry ${severity}">
          <span class="log-time">[${ts}]</span>
          <strong>${escHtml(log.action)}</strong>
          ${log.table ? ' on ' + escHtml(log.table) : ''}
          ${log.user_name ? ' by ' + escHtml(log.user_name) : ''}
        </div>
      `;
    }).join('');
    
    container.innerHTML = html;
  } catch (e) {
    console.error('Failed to load audit:', e);
  }
}

loadSystemHealth();
</script>
</body>
</html>
